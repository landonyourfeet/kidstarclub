<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>STARVILLE ISLAND</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0a1a2f;font-family:system-ui,-apple-system,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block}
  /* ---------- loading / title ---------- */
  #title{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5vh;
    background:linear-gradient(180deg,rgba(12,42,82,.88) 0%,rgba(26,106,168,.42) 45%,rgba(62,201,176,0) 78%);color:#fff;text-align:center;transition:opacity .6s;pointer-events:none}
  #title h1,#title p,#picker,#playBtn,#loadBar,#loadPct,#hero{pointer-events:auto}
  #title h1{font-size:clamp(34px,8vw,72px);margin:0;letter-spacing:.06em;text-shadow:0 4px 0 rgba(0,0,0,.25)}
  #title p{opacity:.9;margin:10px 0 26px;font-size:15px}
  #playBtn{font-size:20px;font-weight:800;padding:16px 40px;border-radius:999px;border:3px solid #fff;cursor:pointer;
    background:#ffb62e;color:#4a2c00;box-shadow:0 6px 0 rgba(0,0,0,.25);display:none}
  #playBtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.25)}
  #loadBar{width:min(70vw,340px);height:12px;border-radius:999px;background:rgba(255,255,255,.25);overflow:hidden}
  #loadBar i{display:block;height:100%;width:0%;background:#ffe14d;border-radius:999px;transition:width .2s}
  #loadPct{margin-top:8px;font-size:13px;opacity:.85}
  #hero{font-size:64px;margin-bottom:6px;filter:drop-shadow(0 4px 4px rgba(0,0,0,.3))}
  /* ---------- HUD ---------- */
  .hud{position:fixed;z-index:10;pointer-events:none}
  #hint{left:50%;transform:translateX(-50%);bottom:14px;background:rgba(6,20,40,.65);color:#fff;
    padding:8px 16px;border-radius:999px;font-size:13px;white-space:nowrap}
  #tag{right:12px;top:58px;background:rgba(6,20,40,.5);color:#9fd8ff;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}
  /* ---------- touch controls ---------- */
  #joy{position:fixed;left:26px;bottom:26px;width:118px;height:118px;border-radius:50%;z-index:11;
    background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.35);display:none}
  #joy i{position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px 0 0 -26px;border-radius:50%;
    background:rgba(255,255,255,.55)}
  #jump{position:fixed;right:26px;bottom:34px;width:76px;height:76px;border-radius:50%;z-index:11;display:none;
    background:rgba(255,182,46,.85);border:3px solid #fff;font-size:30px;line-height:70px;text-align:center;color:#4a2c00}
  @media (pointer:coarse){#joy,#jump{display:block}}
  #board{min-width:270px !important;border:1.5px solid rgba(79,216,255,.4);box-shadow:0 0 16px rgba(43,217,255,.25)}
  @keyframes lbPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">
  <div id="hero">🏝️</div>
  <h1>STARVILLE ISLAND</h1>
  <p>pick your hero · your Shiba comes too</p>
  <div id="picker" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;margin-bottom:18px"></div>
  <div id="loadBar"><i></i></div><div id="loadPct">0%</div>
  <button id="playBtn">▶ &nbsp;EXPLORE THE ISLAND</button>
</div>
<div class="hud" id="hint">collect 💎 & slay ☠️ raiders (+25) · first to 100 WINS · KO = lose everything</div>

<button id="exitBtn" style="position:fixed;right:12px;top:12px;z-index:12;padding:8px 14px;border-radius:999px;border:2px solid rgba(255,255,255,.6);background:rgba(6,20,40,.7);color:#ffe14d;font-weight:800;font-size:13px;cursor:pointer">← Arcade</button>
<div class="hud" id="stars" style="left:14px;top:12px;background:rgba(6,20,40,.65);color:#6fe0ff;padding:8px 16px;border-radius:999px;font-weight:800;font-size:16px">💎 0</div>
<div class="hud" id="board" style="left:50%;transform:translateX(-50%);top:12px;background:rgba(6,20,40,.7);color:#fff;padding:7px 16px;border-radius:14px;font-size:12px;font-weight:700;min-width:150px;text-align:left;line-height:1.55"></div>
<button id="mic" style="position:fixed;left:14px;top:56px;z-index:12;width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,.7);background:rgba(6,20,40,.7);font-size:20px;opacity:.65">🎙️</button>
<div id="vchips" style="position:fixed;left:14px;top:108px;z-index:11;display:flex;flex-direction:column;gap:4px;pointer-events:none"></div>
<div id="joy"><i></i></div>
<button id="emote" style="position:fixed;right:26px;bottom:124px;z-index:11;width:56px;height:56px;border-radius:50%;border:2px solid #fff;background:rgba(157,92,255,.85);font-size:24px">🎉</button>
<button id="atk" style="position:fixed;right:108px;bottom:44px;z-index:11;width:74px;height:74px;border-radius:50%;border:3px solid #fff;background:rgba(232,72,63,.9);font-size:32px">⚔️</button>
<div class="hud" id="hpwrap" style="left:14px;top:158px;width:150px;height:16px;border-radius:999px;background:rgba(6,20,40,.65);border:2px solid rgba(255,255,255,.5);overflow:hidden">
  <div id="hpbar" style="height:100%;width:100%;background:linear-gradient(90deg,#4ade80,#a3e635);border-radius:999px;transition:width .18s"></div>
</div>
<div id="jump">⬆︎</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/vendor/GLTFLoader.js"></script>
<script src="/vendor/DRACOLoader.js"></script>
<script src="/vendor/SkeletonUtils.js"></script>
<script src="/vendor/Sky.js"></script>
<script>
'use strict';
/* ============================================================
   STARVILLE ISLAND · clean rebuild
   Everything here uses the pipeline proven on 2026-07-12:
   · factory-wired GLBs (textures embedded from Synty's prefabs)
   · retarget: body rest-delta + raw arm locals (6 rigs verified)
   · linear color space everywhere, ACES, warm sun 1.05 / hemi 0.5
   ============================================================ */
const lin=h=>new THREE.Color(h).convertSRGBToLinear();

/* ---------- renderer ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(2,window.devicePixelRatio));
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(lin(0xaad6f2),0.0019); // tropical haze (key-art softness)
const cam=new THREE.PerspectiveCamera(50,1,0.1,1600);

function resize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h,false);
  cam.aspect=w/h;cam.updateProjectionMatrix();
}
addEventListener('resize',resize);resize();

/* ---------- lighting: golden hour, values from the closed-form palette check ---------- */
const sun=new THREE.DirectionalLight(lin(0xffe2a8),1.05);
sun.position.set(60,90,40);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-200;sun.shadow.camera.right=200;
sun.shadow.camera.top=200;sun.shadow.camera.bottom=-200;
sun.shadow.camera.far=400;sun.shadow.bias=-0.0006;
const hemi=new THREE.HemisphereLight(lin(0x9ecfff),lin(0x3e7a36),0.5);
scene.add(sun,hemi,new THREE.AmbientLight(0xffffff,0.05));

/* ---------- hand-painted tropical sky: rich colors by choice, not chance ---------- */
{
  const cv=document.createElement('canvas');cv.width=64;cv.height=1024;
  const g=cv.getContext('2d');
  const gr=g.createLinearGradient(0,0,0,1024);
  gr.addColorStop(0.00,'#0e4fc4');  // deep azure zenith
  gr.addColorStop(0.30,'#2a7de0');  // classic sky blue
  gr.addColorStop(0.55,'#59b6f0');  // bright tropical
  gr.addColorStop(0.74,'#a8e4f5');  // pale turquoise
  gr.addColorStop(0.86,'#ffe9c2');  // warm cream horizon
  gr.addColorStop(1.00,'#ffcf9e');  // peach at the waterline
  g.fillStyle=gr;g.fillRect(0,0,64,1024);
  const tex=new THREE.CanvasTexture(cv);tex.encoding=THREE.sRGBEncoding;
  const dome=new THREE.Mesh(new THREE.SphereGeometry(1200,24,20),
    new THREE.MeshBasicMaterial({map:tex,side:THREE.BackSide,fog:false}));
  scene.add(dome);
  // ☀️ the sun: bright core + soft golden glow, placed where the light comes from
  const sunDir=new THREE.Vector3(60,90,40).normalize();
  const mkGlow=(size,inner,outer,op)=>{
    const c2=document.createElement('canvas');c2.width=128;c2.height=128;
    const gg=c2.getContext('2d');
    const rg=gg.createRadialGradient(64,64,4,64,64,62);
    rg.addColorStop(0,inner);rg.addColorStop(1,outer);
    gg.fillStyle=rg;gg.fillRect(0,0,128,128);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c2),transparent:true,opacity:op,fog:false,depthWrite:false}));
    sp.scale.setScalar(size);
    sp.position.copy(sunDir).multiplyScalar(1100);
    scene.add(sp);
    return sp;
  };
  mkGlow(420,'rgba(255,244,200,0.9)','rgba(255,214,140,0)',0.85); // outer glow
  mkGlow(120,'rgba(255,255,240,1)','rgba(255,240,190,0)',1);      // the sun itself
  sun.position.copy(sunDir).multiplyScalar(160);
  // stylised cloud strips (flattened white blobs, slow drift)
  window.CLOUDS=[];
  const cm=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.92,fog:false});
  for(let i=0;i<16;i++){
    const w=30+Math.random()*70;
    const cl=new THREE.Mesh(new THREE.SphereGeometry(1,10,6),cm);
    cl.scale.set(w,4+Math.random()*4,10+Math.random()*10);
    const a=Math.random()*Math.PI*2,r=180+Math.random()*320;
    cl.position.set(Math.cos(a)*r,70+Math.random()*70,Math.sin(a)*r);
    cl.userData.sp=0.5+Math.random();
    scene.add(cl);CLOUDS.push(cl);
  }
}

/* ============================================================
   THE ISLAND · heightfield (lobed coast, volcano, terrace)
   ============================================================ */
const IC={x:0,z:0,R:156}; // 4x the island, same soul
const VOLC={x:16,z:-88,R:36,H:34};
function isleR(a){return IC.R+Math.sin(a*3+1.2)*16+Math.sin(a*7+0.5)*7}
function groundAt(x,z){
  const dx=x-IC.x,dz=z-IC.z,d=Math.hypot(dx,dz);
  let h=0;
  if(d<IC.R+14){
    const R=isleR(Math.atan2(dz,dx));
    if(d<R){
      h=Math.max(0.15,4.2*(1-Math.pow(d/R,1.6)));           // gentle dome
      if(dz<-8&&dx>-28){                                     // NE jungle terrace
        const s=Math.min(1,Math.max(0,(80-d)/8))*Math.min(1,Math.max(0,(d-48)/8));
        h=Math.max(h,4.0+s*3.0);
      }
      if(d>R-22)h*=Math.max(.06,(R-d)/22);                   // beach taper
    }
  }
  const vd=Math.hypot(x-VOLC.x,z-VOLC.z);                    // the volcano
  if(vd<VOLC.R){
    const t=1-vd/VOLC.R;
    h=Math.max(h,Math.pow(t,1.35)*VOLC.H*(vd<6?0.86:1));   // crater dip at the top
  }
  return h;
}
const inOcean=(x,z)=>groundAt(x,z)<0.12;

/* ---------- island mesh with painted vertex colours ---------- */
{
  const S=400,SEG=150;
  const g=new THREE.PlaneGeometry(S,S,SEG,SEG);
  g.rotateX(-Math.PI/2);
  const pos=g.attributes.position;
  const cols=new Float32Array(pos.count*3);
  const sand=lin(0xecd29b),grass=lin(0x3fa14b),jung=lin(0x2f7d3a),rock=lin(0xc7a184),ash=lin(0x8a6f5e);
  const c=new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i);
    const h=groundAt(x,z);
    pos.setY(i,h);
    const vd=Math.hypot(x-VOLC.x,z-VOLC.z);
    if(vd<VOLC.R&&h>4.5)c.copy(rock).lerp(ash,Math.min(1,(h-4.5)/16));
    else if(h<0.75)c.copy(sand);
    else if(h<1.4)c.copy(sand).lerp(grass,(h-0.75)/0.65);
    else c.copy(grass).lerp(jung,Math.min(1,(h-1.4)/3));
    // hand-jitter so the ground never reads flat
    const j=(Math.sin(x*12.9+z*7.7)*0.5+0.5)*0.08;
    cols[i*3]=c.r*(1-j);cols[i*3+1]=c.g*(1-j*0.6);cols[i*3+2]=c.b*(1-j);
  }
  g.setAttribute('color',new THREE.BufferAttribute(cols,3));
  g.computeVertexNormals();
  const isle=new THREE.Mesh(g,new THREE.MeshLambertMaterial({vertexColors:true}));
  isle.receiveShadow=true;
  scene.add(isle);
}

/* ---------- the sea: depth-gradient, gentle swell, shore foam ---------- */
let ocean,oceanPos,oceanPhase;
{
  const g=new THREE.PlaneGeometry(2400,2400,110,110);
  g.rotateX(-Math.PI/2);
  oceanPos=g.attributes.position;
  oceanPhase=new Float32Array(oceanPos.count);
  const cols=new Float32Array(oceanPos.count*3);
  const shallow=lin(0x66e6cf),deep=lin(0x0b5a9e),c=new THREE.Color();
  for(let i=0;i<oceanPos.count;i++){
    const x=oceanPos.getX(i),z=oceanPos.getZ(i);
    const R=isleR(Math.atan2(z-IC.z,x-IC.x));
    const dd=Math.max(0,Math.hypot(x-IC.x,z-IC.z)-R);
    c.copy(shallow).lerp(deep,Math.pow(Math.min(1,dd/58),0.72));
    cols[i*3]=c.r;cols[i*3+1]=c.g;cols[i*3+2]=c.b;
    oceanPhase[i]=Math.random()*6.28;
  }
  g.setAttribute('color',new THREE.BufferAttribute(cols,3));
  const oceanMat=new THREE.MeshPhongMaterial({color:0xffffff,vertexColors:true,
    shininess:220,specular:lin(0xdff2ff),transparent:true,opacity:.92});
  oceanMat.onBeforeCompile=(sh)=>{ // 🌊 stylized Gerstner waves + Fresnel rim — the free 'Water Pro' look
    sh.uniforms.uTime={value:0};
    oceanMat.userData.sh=sh;
    sh.vertexShader='uniform float uTime;\n'+sh.vertexShader
      .replace('#include <begin_vertex>',
`#include <begin_vertex>
{
  vec3 wp = (modelMatrix * vec4(transformed,1.0)).xyz;
  float w1 = sin(dot(wp.xz, vec2(0.16,0.11)) + uTime*1.15);
  float w2 = sin(dot(wp.xz, vec2(-0.07,0.19)) + uTime*0.8);
  float w3 = sin(dot(wp.xz, vec2(0.045,-0.06)) + uTime*0.5);
  transformed.y += w1*0.14 + w2*0.10 + w3*0.16;
  transformed.x += cos(dot(wp.xz, vec2(0.16,0.11)) + uTime*1.15)*0.08;
}`);
    sh.fragmentShader=sh.fragmentShader
      .replace('#include <output_fragment>',
`{
  float fres = pow(1.0 - abs(dot(normalize(vViewPosition), vec3(0.0,0.0,1.0))), 3.0);
  outgoingLight += vec3(0.55,0.75,0.85) * fres * 0.35;   // horizon sheen
}
#include <output_fragment>`);
  };
  ocean=new THREE.Mesh(g,oceanMat);
  ocean.position.y=0.42;
  scene.add(ocean);
  // seabed
  const bed=new THREE.Mesh(new THREE.PlaneGeometry(2400,2400),
    new THREE.MeshLambertMaterial({color:lin(0xd9c08c)}));
  bed.rotation.x=-Math.PI/2;bed.position.y=-0.7;scene.add(bed);
  // foam ring following the lobed shoreline
  const fg=new THREE.BufferGeometry();
  const N=160,fpos=new Float32Array(N*2*3),idx=[];
  for(let i=0;i<N;i++){
    const a=i/N*Math.PI*2,R=isleR(a);
    for(const [k,rr] of [[0,R+0.4],[1,R+2.6]]){
      fpos[(i*2+k)*3]=IC.x+Math.cos(a)*rr;
      fpos[(i*2+k)*3+1]=0.5;
      fpos[(i*2+k)*3+2]=IC.z+Math.sin(a)*rr;
    }
    const a0=i*2,b0=i*2+1,a1=((i+1)%N)*2,b1=((i+1)%N)*2+1;
    idx.push(a0,b0,a1,b0,b1,a1);
  }
  fg.setAttribute('position',new THREE.BufferAttribute(fpos,3));
  fg.setIndex(idx);
  window.foam=new THREE.Mesh(fg,new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.3,depthWrite:false}));
  scene.add(foam);
}

/* ---------- volcano dressing: crater, ember, smoke ---------- */
let smoke=[],craterGlow;
{
  const peak=groundAt(VOLC.x,VOLC.z);
  const maw=new THREE.Mesh(new THREE.CircleGeometry(3.2,16),new THREE.MeshLambertMaterial({color:lin(0x241a18)}));
  maw.rotation.x=-Math.PI/2;maw.position.set(VOLC.x,peak+0.15,VOLC.z);scene.add(maw);
  const ember=new THREE.Mesh(new THREE.CircleGeometry(1.6,14),
    new THREE.MeshBasicMaterial({color:0xff5a1a,transparent:true,opacity:.9}));
  ember.rotation.x=-Math.PI/2;ember.position.set(VOLC.x,peak+0.22,VOLC.z);scene.add(ember);
  craterGlow=new THREE.PointLight(0xff6a22,0.45,40);
  craterGlow.position.set(VOLC.x,peak+3,VOLC.z);scene.add(craterGlow);
  const cv=document.createElement('canvas');cv.width=64;cv.height=64;
  const g=cv.getContext('2d');
  const gr=g.createRadialGradient(32,32,4,32,32,30);
  gr.addColorStop(0,'rgba(96,90,92,.9)');gr.addColorStop(1,'rgba(96,90,92,0)');
  g.fillStyle=gr;g.fillRect(0,0,64,64);
  const tx=new THREE.CanvasTexture(cv);
  for(let i=0;i<5;i++){
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,opacity:.5,depthWrite:false}));
    sp.userData.ph=i/5;
    scene.add(sp);smoke.push(sp);
  }
}

/* ============================================================
   ASSETS · the factory-wired Synty GLBs already on the server
   ============================================================ */
const ASSET_V='ISL-19'; // bump with every asset change: guarantees fresh files
const FILES={
  tree1:'CommonTree_1.glb',tree2:'CommonTree_3.glb',tree3:'CommonTree_5.glb',
  pine1:'PineTree_1.glb',pine2:'PineTree_3.glb',birch:'BirchTree_1.glb',willow:'Willow_1.glb',
  bush:'Bush_1.glb',flowers:'Flowers.glb',grass:'Grass.glb',
  rock1:'Rock_1.glb',rock2:'Rock_Moss_1.glb',
  kkSkel:'kk_skel.glb',
  kkKnight:'kk_knight.glb',kkBarb:'kk_barb.glb',kkMage:'kk_mage.glb',kkRogue:'kk_rogue.glb',kkHood:'kk_hood.glb',
  shiba:'animals_pack_ShibaInu.glb',
  deer:'Deer.glb',stag:'Stag.glb',flamingo:'hero_flamingo.glb',
}
const assets={};
function loadAll(onProgress){
  const loader=new THREE.GLTFLoader();
  const draco=new THREE.DRACOLoader();
  draco.setDecoderPath('/vendor/draco/');
  loader.setDRACOLoader(draco);
  const names=Object.values(FILES);
  let done=0;
  return Promise.all(names.map(f=>new Promise(res=>{
    loader.load('/assets/'+f+'?v='+ASSET_V,g=>{
      g.scene.traverse(m=>{if(m.isMesh){m.castShadow=true;
        const mats=Array.isArray(m.material)?m.material:[m.material];
        for(const mm of mats){
          if(!mm)continue;
          if(mm.map)mm.map.anisotropy=4;
          if(mm.alphaTest>0){mm.transparent=false;mm.depthWrite=true;mm.needsUpdate=true} // crisp cutout cards
        }
      }});
      assets[f]={scene:g.scene,animations:g.animations||[]};
      done++;onProgress(done,names.length);res();
    },undefined,()=>{console.warn('missing',f);done++;onProgress(done,names.length);res()});
  })));
}
function spawn(file,targetH){
  const src=assets[file];if(!src)return null;
  const obj=THREE.SkeletonUtils?THREE.SkeletonUtils.clone(src.scene):src.scene.clone(true);
  const box=new THREE.Box3().setFromObject(obj);
  const size=new THREE.Vector3();box.getSize(size);
  obj.scale.setScalar(targetH/(size.y||1));
  const box2=new THREE.Box3().setFromObject(obj);
  obj.position.y=-box2.min.y;
  const root=new THREE.Group();root.add(obj);
  root.userData.inner=obj;
  return root;
}
const put=(key,x,z,h,ry)=>{
  const o=spawn(FILES[key],h);
  if(!o)return null;
  o.position.set(x,groundAt(x,z),z);
  o.rotation.y=ry===undefined?Math.random()*6.28:ry;
  o.userData.mkey=key;
  scene.add(o);
  return o;
};

/* ============================================================
   CHARACTER · King Aldric with the verified retarget
   ============================================================ */
/* 🎭 THE NEW CAST · KayKit Adventurers (CC0) + hand-made costumes
   princess = Mage + golden tiara · superhero = Knight + cape & star emblem
   kid = Rogue at kid scale · every one ships 76 real animations */
const ROSTER={
  captain:{file:'kk_knight.glb',name:'Captain Star',emoji:'🦸',h:1.9,costume:'super'},
  princess:{file:'kk_mage.glb',name:'Princess Luna',emoji:'👸',h:1.85,costume:'tiara'},
  kid:{file:'kk_rogue.glb',name:'Pip',emoji:'🧒',h:1.5},

function nativeActions(root,anims){ // Quaternius clips ship inside the GLB — just normalize names
  const mixer=new THREE.AnimationMixer(root);
  const acts={},byName={};
  for(const clip of anims){
    const k=clip.name.split('|').pop();
    byName[k]=mixer.clipAction(clip);
    acts[k]=byName[k];
  }
  const prefer={Idle:['Idle','Unarmed_Idle'],Walk:['Walking_A','Walk','Walking_B'],
    Run:['Running_A','Run','Running_B'],Jump:['Jump_Full_Short','Jump_Full_Long','Jump'],
    Cheer:['Cheer'],Sit:['Sit_Floor_Idle'],Magic:['Spellcast_Shoot','Spellcasting','Interact'],
    Attack:['1H_Melee_Attack_Slice_Diagonal','2H_Melee_Attack_Chop','1H_Melee_Attack_Stab','1H_Melee_Attack_Chop','Spellcast_Shoot'],
    Hit:['Hit_A','Hit_B'],Down:['Death_A']};
  for(const want in prefer){
    for(const cand of prefer[want])if(byName[cand]){acts[want]=byName[cand];break}
    if(!acts[want])for(const k in byName)if(k.includes(want)){acts[want]=byName[k];break}
  }
  if(!acts.Walk&&acts.Run)acts.Walk=acts.Run;
  return {mixer,acts};
}
let player,mixer,actions={},current=null;
function playAnim(name,fade=0.18){
  if(current===name||!actions[name])return;
  if(current&&actions[current])actions[current].fadeOut(fade);
  actions[name].reset().fadeIn(fade).play();
  current=name;
}

let frondTex=null;
function getFrondTex(){
  if(frondTex)return frondTex;
  const cv=document.createElement('canvas');cv.width=128;cv.height=256;
  const g=cv.getContext('2d');
  g.clearRect(0,0,128,256);
  // a tapered frond with notched edges
  g.fillStyle='#2f9e46';
  g.beginPath();g.moveTo(64,0);
  for(let i=0;i<=10;i++){
    const t=i/10,w=Math.sin(t*Math.PI)*46;
    g.lineTo(64+w*(i%2?0.72:1),t*256);
  }
  for(let i=10;i>=0;i--){
    const t=i/10,w=Math.sin(t*Math.PI)*46;
    g.lineTo(64-w*(i%2?0.72:1),t*256);
  }
  g.closePath();g.fill();
  const gr=g.createLinearGradient(0,0,0,256);
  gr.addColorStop(0,'rgba(255,240,150,0.35)');gr.addColorStop(1,'rgba(0,60,20,0.35)');
  g.globalCompositeOperation='source-atop';g.fillStyle=gr;g.fillRect(0,0,128,256);
  frondTex=new THREE.CanvasTexture(cv);
  frondTex.encoding=THREE.sRGBEncoding;
  return frondTex;
}
function makePalm(h){
  const g=new THREE.Group();
  const barkM=new THREE.MeshLambertMaterial({color:lin(0x8a6a44)});
  const segs=6;let px=0,py=0,tilt=(Math.random()-0.5)*0.16;
  for(let i=0;i<segs;i++){
    const t=i/segs;
    const seg=new THREE.Mesh(new THREE.CylinderGeometry(0.16*(1-t*0.5)*h/7,0.2*(1-t*0.45)*h/7,h/segs,7),barkM);
    px+=tilt*h/segs*i*0.5;
    seg.position.set(px,py+h/segs/2,0);
    seg.rotation.z=-tilt*i*0.8;
    py+=h/segs*0.98;
    g.add(seg);
  }
  const crown=new THREE.Group();crown.position.set(px,py,0);
  const fm=new THREE.MeshLambertMaterial({map:getFrondTex(),alphaTest:0.4,side:THREE.DoubleSide});
  for(let i=0;i<8;i++){
    const fr=new THREE.Mesh(new THREE.PlaneGeometry(h*0.24,h*0.66,1,6),fm);
    // droop: bend the frond down along its length
    const pos=fr.geometry.attributes.position;
    for(let vi=0;vi<pos.count;vi++){
      const y=pos.getY(vi),t=(y+h*0.33)/(h*0.66);
      pos.setZ(vi,-Math.pow(1-t,2)*h*0.14);
    }
    pos.needsUpdate=true;fr.geometry.computeVertexNormals();
    fr.position.y=h*0.3;
    fr.rotation.set(-0.55-Math.random()*0.25,i/8*Math.PI*2,0);
    const hold=new THREE.Group();hold.rotation.y=i/8*Math.PI*2;
    fr.rotation.y=0;hold.add(fr);crown.add(hold);
  }
  for(let i=0;i<3;i++){ // coconuts
    const nut=new THREE.Mesh(new THREE.SphereGeometry(h*0.045,8,6),new THREE.MeshLambertMaterial({color:lin(0x5f4a2e)}));
    nut.position.set(Math.cos(i*2.1)*h*0.06,-h*0.02,Math.sin(i*2.1)*h*0.06);
    crown.add(nut);
  }
  g.add(crown);
  g.traverse(m=>{if(m.isMesh)m.castShadow=true});
  return g;
}

const critters=[];
function addCritter(fileKey,x,z,h){
  const src=assets[FILES[fileKey]];
  if(!src)return;
  const root=spawn(FILES[fileKey],h);
  root.position.set(x,groundAt(x,z),z);

function critAnim(cr,name){
  if(cr.cur===name||!cr.acts[name])return;
  if(cr.cur&&cr.acts[cr.cur])cr.acts[cr.cur].fadeOut(0.2);
  cr.acts[name].reset().fadeIn(0.2).play();
  cr.cur=name;
}
let buddy=null;
function tickCritters(dt){
  for(const cr of critters){
    const dx=cr.tx-cr.root.position.x,dz=cr.tz-cr.root.position.z;
    const dist=Math.hypot(dx,dz);
    if(cr.isBuddy){ // the shiba shadows the player
      const bd=Math.hypot(P.x-cr.root.position.x,P.z-cr.root.position.z);
      if(bd>3.4){cr.tx=P.x+Math.sin(P.yaw+2.4)*1.6;cr.tz=P.z+Math.cos(P.yaw+2.4)*1.6}
    }else if(dist<0.5){
      cr.wait-=dt;
      if(cr.wait<=0){
        cr.wait=3+Math.random()*6;
        for(let t=0;t<10;t++){
          const nx=cr.root.position.x+(Math.random()-0.5)*22,nz=cr.root.position.z+(Math.random()-0.5)*22;
          if(groundAt(nx,nz)>0.7){cr.tx=nx;cr.tz=nz;break}
        }
      }
    }
    if(dist>0.5){
      const sp=(cr.isBuddy&&dist>6?7.5:2.6)*dt;
      const ny=Math.atan2(dx,dz);
      cr.root.rotation.y+=(((ny-cr.root.rotation.y+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*8);
      cr.root.position.x+=Math.sin(ny)*Math.min(sp,dist);
      cr.root.position.z+=Math.cos(ny)*Math.min(sp,dist);
      critAnim(cr,cr.isBuddy&&dist>6?'Run':'Walk');
    }else critAnim(cr,'Idle');
    cr.root.position.y=groundAt(cr.root.position.x,cr.root.position.z);
    cr.mixer.update(dt);
  }
}

function vcNewPeer(id,name){
  const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});

  VC.peers.set(id,pr);

  pc.onicecandidate=e=>{if(e.candidate)vcSignal(id,{ice:e.candidate})};

    au.style.display='none';document.body.appendChild(au);pr.audio=au;

function vcDrop(id){

  body:JSON.stringify({to,data})}).catch(()=>{});
async function vcHandle(from,data){

async function vcPoll(){
  if(VC.state==='off')return;
  try{
    const r=await fetch('/api/voice/poll',{method:'POST'}).then(x=>x.json());
    if(r.gone){
      const jn=await fetch('/api/voice/join',{method:'POST'}).then(x=>x.json());
      for(const pr of jn.roster||[])if(!VC.peers.has(pr.id))vcOffer(pr.id,pr.name);
      return;
    }
    const ids=new Set((r.roster||[]).map(p2=>p2.id));
    for(const id of [...VC.peers.keys()])if(!ids.has(id))vcDrop(id);
    for(const pr of r.roster||[])if(VC.peers.has(pr.id))VC.peers.get(pr.id).name=pr.name;
    for(const m of r.msgs||[])await vcHandle(m.from,m.data);
    const buf=new Uint8Array(128);
    for(const [id,pr] of VC.peers){
      if(!pr.an)continue;
      pr.an.getByteFrequencyData(buf);
      let lvl=0;for(let i=0;i<buf.length;i++)lvl+=buf[i];
      const chip=chipsEl.querySelector('[data-vid="'+id+'"]');

    }

}
async function voiceToggle(){
  if(VC.state==='off'){
    // pre-flight: explain exactly what's wrong instead of failing silently
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      toast('🎙️ This browser blocks mic access — try Chrome or Safari over https');
      return;
    }
    try{
      if(navigator.permissions&&navigator.permissions.query){
        const st=await navigator.permissions.query({name:'microphone'}).catch(()=>null);
        if(st&&st.state==='denied'){
          toast('🎙️ Mic is BLOCKED for this site — tap the 🔒 by the address bar → Site settings → allow Microphone, then reload');
          VC.state='listen';await vcJoinOnly();vcUI();return;
        }
      }
    }catch(e){}
    try{
      try{
        VC.stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
      }catch(e1){ // some devices reject fancy constraints — plain request re-prompts
        VC.stream=await navigator.mediaDevices.getUserMedia({audio:true});
      }
      toast('🎙️ Mic LIVE — friends can hear you!');
      for(const tr of VC.stream.getAudioTracks())tr.enabled=true; // open until the gate proves it works
      VC.lastVoice=performance.now();
      VC.state='live';
      try{ // VAD gate: only transmit while talking (kills same-room echo loops)
        VC.ctx=VC.ctx||new (window.AudioContext||window.webkitAudioContext)();
        const src=VC.ctx.createMediaStreamSource(VC.stream);
        VC.meter=VC.ctx.createAnalyser();VC.meter.fftSize=256;src.connect(VC.meter);
        VC.meterAlive=0;VC.gateBypass=false;
        VC.gateT=setInterval(()=>{
          if(VC.state!=='live'||!VC.stream)return;
          try{VC.ctx&&VC.ctx.state==='suspended'&&VC.ctx.resume()}catch(e){}
          if(VC.gateBypass){for(const tr of VC.stream.getAudioTracks())tr.enabled=true;return}
          const buf=new Uint8Array(128);VC.meter.getByteFrequencyData(buf);
          let lvl=0;for(let i=0;i<buf.length;i++)lvl+=buf[i];lvl/=buf.length;
          const now=performance.now();
          if(lvl>1)VC.meterAlive=now;
          if(now-(VC.meterAlive||0)>4000){ // meter is dead — FAIL OPEN: always transmit, never silence
            VC.gateBypass=true;
            for(const tr of VC.stream.getAudioTracks())tr.enabled=true;
            return;
          }
          if(lvl>9)VC.lastVoice=now;
          const open=now-VC.lastVoice<900;
          for(const tr of VC.stream.getAudioTracks())tr.enabled=open;
        },120);
      }catch(e){}
    }catch(e){

  }

let slashTex=null;
function getSlashTex(){
  if(slashTex)return slashTex;
  const cv=document.createElement('canvas');cv.width=128;cv.height=128;
  const g=cv.getContext('2d');
  g.strokeStyle='rgba(160,240,255,0.95)';g.lineWidth=14;g.lineCap='round';
  g.beginPath();g.arc(64,110,74,Math.PI*1.18,Math.PI*1.82);g.stroke();
  g.strokeStyle='rgba(255,255,255,0.9)';g.lineWidth=6;
  g.beginPath();g.arc(64,110,74,Math.PI*1.22,Math.PI*1.78);g.stroke();
  slashTex=new THREE.CanvasTexture(cv);
  return slashTex;
}
const fx=[];
function fxSlash(){
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:getSlashTex(),transparent:true,opacity:0.95,depthWrite:false}));
  sp.scale.set(2.6,2.6,1);
  sp.position.set(P.x+Math.sin(P.yaw)*1.4,groundAt(P.x,P.z)+1.4,P.z+Math.cos(P.yaw)*1.4);
  sp.userData={life:0.22,vx:Math.sin(P.yaw)*9,vz:Math.cos(P.yaw)*9,kind:'slash'};
  scene.add(sp);fx.push(sp);
}
function fxImpact(x,y,z,col){
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({color:col||0xfff1a8,transparent:true,opacity:0.95,depthWrite:false}));
  sp.scale.set(0.5,0.5,1);
  sp.position.set(x,y,z);
  sp.userData={life:0.2,grow:14,kind:'impact'};
  scene.add(sp);fx.push(sp);
}
function tickFx(dt){
  for(let i=fx.length-1;i>=0;i--){
    const f2=fx[i];f2.userData.life-=dt;
    if(f2.userData.kind==='slash'){
      f2.position.x+=f2.userData.vx*dt;f2.position.z+=f2.userData.vz*dt;
      f2.material.opacity=Math.max(0,f2.userData.life/0.22);
    }else{
      f2.scale.x+=f2.userData.grow*dt;f2.scale.y+=f2.userData.grow*dt;
      f2.material.opacity=Math.max(0,f2.userData.life/0.2);
    }
    if(f2.userData.life<=0){scene.remove(f2);fx.splice(i,1)}
  }
}
function tickBursts(dt){
  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i];
    b.userData.vy-=14*dt;
    b.position.x+=b.userData.vx*dt;b.position.y+=b.userData.vy*dt;b.position.z+=b.userData.vz*dt;
    b.rotation.y+=dt*(b.userData.spin||7);b.rotation.x+=dt*3;b.userData.burst-=dt;
    if(b.userData.burst<=0||b.position.y<0){scene.remove(b);bursts.splice(i,1)}
  }
}
/* ============================================================
   ☠️ THE SKELETON RAID · a ship appears on the horizon, sails in
   slowly, and lands 10 sword-raiders. 3 hits each · +25 💎 a kill
   ============================================================ */
const RAID={state:'sailing',ship:null,timer:0,landing:{x:-40,z:150}};
function makeRaidShip(){
  const g=makeBoat(0,0,0);
  g.scale.setScalar(2.6);
  // dark raid sail
  g.traverse(m=>{if(m.isMesh&&m.material&&m.material.map){m.material=m.material.clone();
    const cv=document.createElement('canvas');cv.width=64;cv.height=64;
    const gg=cv.getContext('2d');gg.fillStyle='#23263a';gg.fillRect(0,0,64,64);
    gg.fillStyle='#e8e2d0';gg.font='900 40px system-ui';gg.textAlign='center';gg.fillText('☠',32,46);
    m.material.map=new THREE.CanvasTexture(cv);m.material.map.encoding=THREE.sRGBEncoding;
  }});
  return g;
}
function raidStart(){
  const a=Math.atan2(RAID.landing.z,RAID.landing.x);
  RAID.ship=makeRaidShip();
  RAID.ship.position.set(Math.cos(a)*620,0.42,Math.sin(a)*620); // a speck on the horizon
  RAID.state='sailing';
  toast('⛵ A strange ship on the horizon…');
}
function raidLand(){
  RAID.state='ashore';
  toast('☠️ SKELETON RAID! 10 raiders ashore — ⚔️ +25 💎 each!');
  sfxKO();
  for(let i=0;i<10;i++){
    const a=Math.random()*6.28,r=Math.random()*24;
    addSkel(RAID.landing.x*0.72+Math.cos(a)*r,RAID.landing.z*0.72+Math.sin(a)*r);
  }
}
function tickRaid(dt){
  if(RAID.state==='sailing'&&RAID.ship){
    const dx=RAID.landing.x*1.15-RAID.ship.position.x, dz=RAID.landing.z*1.15-RAID.ship.position.z;
    const d=Math.hypot(dx,dz);
    if(d>6){
      RAID.ship.position.x+=dx/d*5.5*dt;
      RAID.ship.position.z+=dz/d*5.5*dt;
      RAID.ship.rotation.y=Math.atan2(dx,dz);
      RAID.ship.position.y=0.42+Math.sin(performance.now()/700)*0.12;
    }else raidLand();
  }else if(RAID.state==='ashore'){
    RAID.ship&&(RAID.ship.position.y=0.42+Math.sin(performance.now()/700)*0.12);
    if(skels.length===0){
      RAID.state='departing';
      toast('🏴‍☠️ Raid defeated! The ship retreats…');
    }
  }else if(RAID.state==='departing'&&RAID.ship){
    const a=Math.atan2(RAID.ship.position.z,RAID.ship.position.x);
    RAID.ship.position.x+=Math.cos(a)*7*dt;
    RAID.ship.position.z+=Math.sin(a)*7*dt;
    RAID.ship.rotation.y=Math.atan2(Math.cos(a),Math.sin(a));
    if(Math.hypot(RAID.ship.position.x,RAID.ship.position.z)>640){
      scene.remove(RAID.ship);RAID.ship=null;
      RAID.state='waiting';RAID.timer=45; // next wave brews
    }
  }else if(RAID.state==='waiting'){
    RAID.timer-=dt;
    if(RAID.timer<=0)raidStart();
  }
}
/* skeleton raiders (3 hits · they hunt across the whole island) */
const skels=[];
function addSkel(x,z){
  const root=spawn(FILES.kkSkel,1.8);
  if(!root)return;
  root.position.set(x,groundAt(x,z),z);
  const na=nativeActions(root.userData.inner,assets[FILES.kkSkel].animations);
  root.traverse(m=>{if(m.isMesh)m.castShadow=true});
  scene.add(root);
  skels.push({root,...na,cur:null,hp:3,home:{x,z},atkCd:0,hitFlash:0,state:'idle'});
}
function skAnim(sk,name){
  if(sk.cur===name||!sk.acts[name])return;
  if(sk.cur&&sk.acts[sk.cur])sk.acts[sk.cur].fadeOut(0.15);
  sk.acts[name].reset().fadeIn(0.15).play();
  sk.cur=name;
}
function tickSkels(dt){
  for(let i=skels.length-1;i>=0;i--){
    const sk=skels[i];
    const dx=P.x-sk.root.position.x,dz=P.z-sk.root.position.z;
    const dist=Math.hypot(dx,dz);
    sk.atkCd=Math.max(0,sk.atkCd-dt);
    if(sk.hitFlash>0){sk.hitFlash-=dt}
    if(dist<70&&dist>1.9&&downUntil<performance.now()){ // raiders hunt across the island
      const ny=Math.atan2(dx,dz);
      sk.root.rotation.y+=(((ny-sk.root.rotation.y+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*6);
      sk.root.position.x+=Math.sin(ny)*2.2*dt;
      sk.root.position.z+=Math.cos(ny)*2.2*dt;
      skAnim(sk,'Walk');
    }else if(dist<=1.9&&sk.atkCd<=0&&downUntil<performance.now()){ // bonk!
      skAnim(sk,'Attack');sk.atkCd=1.6;
      setTimeout(()=>{
        if(Math.hypot(P.x-sk.root.position.x,P.z-sk.root.position.z)<2.4)playerHurt(1);
      },420);
    }else if(sk.cur!=='Attack'||sk.atkCd<1.1){
      skAnim(sk,'Idle');
    }
    sk.root.position.y=groundAt(sk.root.position.x,sk.root.position.z);
    sk.mixer.update(dt);
  }
}
function playerHurt(dmg=1,from=null){
  if(performance.now()<hurtUntil||performance.now()<downUntil)return;
  hp-=dmg;heartsUI();hurtUntil=performance.now()+700;
  playAnim('Hit',0.08);sfxHit();
  if(from)toast('⚔️ '+from+' got you!');
  if(hp<=0){ // KO: ALL your stars burst out — respawn with nothing
    downUntil=performance.now()+2600;
    sfxKO();
    starBurst(P.x,groundAt(P.x,P.z)+1.2,P.z,Math.min(10,Math.max(3,starCount)));
    starCount=0;
    document.getElementById('stars').textContent='💎 0';
    playAnim('Down',0.1);
    setTimeout(()=>{
      P.x=-60;P.z=88;hp=HP_MAX;heartsUI();playAnim('Idle',0.1);
    },2500);
  }
}
function toast(txt){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;left:50%;transform:translateX(-50%);top:20%;z-index:15;background:rgba(6,20,40,.8);color:#ffe14d;font-weight:800;padding:8px 18px;border-radius:999px;font-size:14px;pointer-events:none';
  d.textContent=txt;document.body.appendChild(d);
  setTimeout(()=>d.remove(),1800);
}
function doAttack(){
  const now=performance.now();
  if(now<attackUntil||now<downUntil)return;
  attackUntil=now+700;
  playAnim('Attack',0.07);
  sfxSwing();fxSlash();
  setTimeout(()=>{ // the swing lands mid-animation
    const fwx=Math.sin(P.yaw),fwz=Math.cos(P.yaw);
    // 🥊 PvP: friends in the arc take battle damage (relayed via the club server)
    for(const [nm,rm] of remotes){
      const dx=rm.root.position.x-P.x,dz=rm.root.position.z-P.z;
      const d=Math.hypot(dx,dz);
      if(d<2.8&&(dx*fwx+dz*fwz)/Math.max(0.01,d)>0.35){
        sfxZap();sfxHit();
        fxImpact(rm.root.position.x,rm.root.position.y+1.3,rm.root.position.z,0x9be8ff);
        starBurst(rm.root.position.x,rm.root.position.y+1.2,rm.root.position.z,2);
        fetch('/api/island/hit',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({to:nm,dmg:1})}).catch(()=>{});
      }
    }
    const fx2=fwx,fz2=fwz;
    for(const sk of skels){
      const dx=sk.root.position.x-P.x,dz=sk.root.position.z-P.z;
      const d=Math.hypot(dx,dz);
      if(d<2.6&&(dx*fx2+dz*fz2)/Math.max(0.01,d)>0.35){
        sk.hp--;sk.hitFlash=0.3;sfxHit();
        fxImpact(sk.root.position.x,sk.root.position.y+1.2,sk.root.position.z);
        // knockback
        sk.root.position.x+=fx2*1.2;sk.root.position.z+=fz2*1.2;
        if(sk.hp<=0){
          sfxKO();
          boneScatter(sk.root.position.x,sk.root.position.y+1,sk.root.position.z); // he falls apart!
          starCount+=25; // 💎 bounty
          document.getElementById('stars').textContent='💎 '+starCount;
          toast('☠️ +25 💎!');
          scene.remove(sk.root);
          skels.splice(skels.indexOf(sk),1);
        }else skAnim(sk,'Hit');
      }
    }
  },260);
}
document.getElementById('atk').addEventListener('pointerdown',e=>{e.stopPropagation();doAttack()});
addEventListener('keydown',e=>{if(e.key==='f'||e.key==='F'||e.key==='Enter')doAttack()});

/* ============================================================
   GAME STATE + MAIN LOOP
   ============================================================ */
const P={x:-60,z:88,vy:0,air:0,yaw:0};   // spawn on the cove beach by the dock
let started=false,last=performance.now();

let lobby=false;
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  if(!started){
    if(lobby&&player){ // 🎭 hero showcase: the world is the backdrop, your pick struts on the beach
      mixer&&mixer.update(dt);
      const orb=now/1000*0.35;
      const ox=P.x+Math.sin(orb)*6.5, oz=P.z+Math.cos(orb)*6.5;
      cam.position.lerp(new THREE.Vector3(ox,groundAt(P.x,P.z)+2.6,oz),Math.min(1,dt*4));
      cam.lookAt(P.x,groundAt(P.x,P.z)+1.3,P.z);
      player.position.set(P.x,groundAt(P.x,P.z),P.z);
      renderer.render(scene,cam);
    }
    return;
  }

  // input vector (keys or joystick), camera-relative
  let ix=(keys.d?1:0)-(keys.a?1:0)+jx;
  let iz=(keys.s?1:0)-(keys.w?1:0)+jy;
  const mag=Math.min(1,Math.hypot(ix,iz));
  if(mag>0.05){
    const a=Math.atan2(ix,iz);
    P.yaw=camYaw+a+Math.PI;
    const speed=(mag>0.85?10.5:5.2)*mag;
    const nx=P.x+Math.sin(P.yaw)*speed*dt;
    const nz=P.z+Math.cos(P.yaw)*speed*dt;
    const gh=groundAt(nx,nz);
    if(gh>0.12&&Math.abs(gh-groundAt(P.x,P.z))<1.4){P.x=nx;P.z=nz}   // stay ashore, climbable grades only
    else{ // slide along
      const gx=groundAt(nx,P.z),gz=groundAt(P.x,nz);
      if(gx>0.12&&Math.abs(gx-groundAt(P.x,P.z))<1.4)P.x=nx;
      else if(gz>0.12&&Math.abs(gz-groundAt(P.x,P.z))<1.4)P.z=nz;
    }
  }
  // jump + gravity
  const g0=groundAt(P.x,P.z);
  if((keys[' ']||wantJump)&&P.air<=0.01){P.vy=8.4}
  wantJump=false;
  P.vy-=22*dt;
  P.air=Math.max(0,P.air+P.vy*dt);
  if(P.air<=0){P.air=0;if(P.vy<0)P.vy=0}
  // apply to player object
  const py=g0+P.air;
  player.position.set(P.x,py,P.z);
  player.rotation.y+=(((P.yaw-player.rotation.y+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*10);
  // animation state
  const now2=performance.now();
  const emoting=now2<emoteUntil&&mag<0.05&&P.air<=0.05;
  const fighting=now2<attackUntil||now2<hurtUntil||now2<downUntil;
  if(!fighting){
    if(P.air>0.05)playAnim('Jump',0.08);
    else if(mag>0.85)playAnim('Run');
    else if(mag>0.05)playAnim('Walk');
    else if(!emoting)playAnim('Idle');
  }
  mixer&&mixer.update(dt);

  // 🎥 follow-camera brain: swing behind on direction change · flow back after free-look · tilt on slopes
  {
    const lookHeld=dragId!==null;
    const easeAng=(from,to,k)=>from+(((to-from+Math.PI*3)%(Math.PI*2))-Math.PI)*k;
    {
      // flow back behind the hero — rate ramps in softly, angular speed capped
      const since=performance.now()-lookReleasedAt;
      const grace=mag>0.05?0:600;
      if(since>grace)followRamp=Math.min(1,followRamp+dt*2.2); // rate fades in — no kick
      else followRamp=0;
      if(followRamp>0&&!lookHeld){
        const rate=(mag>0.85?3.0:mag>0.05?2.2:1.1)*followRamp;
        const step=(((P.yaw-camYaw+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*rate);
        const cap=2.6*dt; // angular speed ceiling: hard reversals sweep, never snap
        camYaw+=Math.max(-cap,Math.min(cap,step));
      }
    }
    // slope tilt: look up hills you're climbing, down slopes you're descending
    const aheadG=groundAt(P.x+Math.sin(P.yaw)*4.5,P.z+Math.cos(P.yaw)*4.5);
    const slope=Math.max(-0.4,Math.min(0.5,(aheadG-g0)/4.5));
    slopeTilt+=((mag>0.05?slope*0.5:0)-slopeTilt)*Math.min(1,dt*3);
  }
  // camera: Starville boom — orbit-follow, occlusion pull-in sampled along the boom, zoomable
  {
    const pEff=Math.max(0.05,Math.min(1.15,camPitch+slopeTilt));
    const ch=3.0+pEff*5.2;
    const dirX=-Math.sin(camYaw)*Math.cos(pEff), dirZ=-Math.cos(camYaw)*Math.cos(pEff);
    let boom=camDist;
    const eyeY=py+1.7;
    for(let tt=0.25;tt<=1.001;tt+=0.15){ // sample the sightline: hills never eat the view
      const sx=P.x+dirX*camDist*tt, sz=P.z+dirZ*camDist*tt;
      const sy=eyeY+(ch-1.7)*tt;
      const g=groundAt(sx,sz);
      if(g+0.9>sy){boom=Math.min(boom,camDist*tt-0.6);}
    }
    boom=Math.max(3.4,boom);
    smBoom+=(boom-smBoom)*Math.min(1,dt*(boom<smBoom?11:2.6)); // in fast (no clipping) · out slow (no lurch)
    let cx=P.x+dirX*smBoom, cz=P.z+dirZ*smBoom;
    let cy=py+1.7+(ch-1.7)*(smBoom/camDist);
    cy=Math.max(cy,groundAt(cx,cz)+1.5);
    cam.position.lerp(new THREE.Vector3(cx,cy,cz),Math.min(1,dt*6.5));
    smLead+=((mag>0.05?1.8:0)-smLead)*Math.min(1,dt*3.5);
    lookTarget.lerp(new THREE.Vector3(
      P.x+Math.sin(P.yaw)*smLead,
      py+1.7+slopeTilt*3,
      P.z+Math.cos(P.yaw)*smLead),Math.min(1,dt*9));
    cam.lookAt(lookTarget);
  }

  // world life
  const t=now/1000;
  if(ocean.material.userData.sh)ocean.material.userData.sh.uniforms.uTime.value=t;
  foam.material.opacity=0.22+Math.sin(t*1.6)*0.09+Math.sin(t*4.1)*0.03; // lively surf line
  for(const cl of CLOUDS){cl.position.x+=cl.userData.sp*dt;if(cl.position.x>560)cl.position.x=-560}
  for(const sp of smoke){
    sp.userData.ph=(sp.userData.ph+dt*0.11)%1;
    const ph=sp.userData.ph,peak=groundAt(VOLC.x,VOLC.z);
    sp.position.set(VOLC.x+Math.sin(ph*8)*1.5+ph*4,peak+2+ph*18,VOLC.z+ph*2);
    sp.scale.setScalar(4+ph*12);
    sp.material.opacity=0.45*(1-ph);
  }
  craterGlow.intensity=0.4+Math.random()*0.15;
  tickStars(dt,t);
  tickRemotes(dt);
  tickCritters(dt);
  tickSkels(dt);
  tickBursts(dt);
  tickFx(dt);

  renderer.render(scene,cam);
}

/* ---------- boot ---------- */
const bar=document.querySelector('#loadBar i'),pct=document.getElementById('loadPct');
loadAll((n,total)=>{
  const p=Math.round(n/total*100);
  bar.style.width=p+'%';pct.textContent=p+'%';
}).then(()=>{
  buildWorld();
  // the King
  window.swapHero=()=>{
    const h=ROSTER[heroKey];
    const nm=spawn(h.file,h.h);
    if(!nm)return;
    if(h.costume)addCostume(nm,h.costume);
    const na=nativeActions(nm.userData.inner,assets[h.file].animations);
    nm.traverse(m=>{if(m.isMesh)m.castShadow=true});
    if(player){nm.position.copy(player.position);nm.rotation.y=player.rotation.y;scene.remove(player)}
    scene.add(nm);
    player=nm;mixer=na.mixer;actions=na.acts;current=null;
    playAnim('Idle');
  };
  swapHero();
  lobby=true; // lights, camera — the showcase begins
  pct.textContent='ready!';
  { // build the hero picker
    const pk=document.getElementById('picker');
    for(const [k,h] of Object.entries(ROSTER)){
      const b=document.createElement('button');
      b.textContent=h.emoji+' '+h.name;
      b.style.cssText='font-size:13px;font-weight:800;padding:9px 12px;border-radius:999px;border:2px solid '+(k===heroKey?'#ffe14d':'rgba(255,255,255,.55)')+';background:'+(k===heroKey?'#ffb62e':'rgba(255,255,255,.14)')+';color:'+(k===heroKey?'#4a2c00':'#fff')+';cursor:pointer';
      b.onclick=()=>{heroKey=k;localStorage.setItem('isl_hero',k);
        for(const bb of pk.children){bb.style.borderColor='rgba(255,255,255,.55)';bb.style.background='rgba(255,255,255,.14)';bb.style.color='#fff'}
        b.style.borderColor='#ffe14d';b.style.background='#ffb62e';b.style.color='#4a2c00';
        swapHero();
      };
      pk.appendChild(b);
    }
  }
  const btn=document.getElementById('playBtn');
  document.getElementById('loadBar').style.display='none';pct.style.display='none';
  btn.style.display='block';
  btn.onclick=()=>{
    document.getElementById('title').style.opacity='0';
    setTimeout(()=>document.getElementById('title').remove(),650);
    started=true;
  };
});
loop();
</script>
