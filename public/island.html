/* 🟢 the GREEN-WINDOW planner. Used by BOTH the bar and the release, so what she
   SEES is exactly what she GETS — if these ever disagree, the bar is lying.
   ⚠️ Named greenPlan, NOT shotPlan: `shotPlan` is already the camera-aim shot
   solver below. Two top-level `function` declarations with the same name don't
   error — the second silently REPLACES the first, and the survivor ended up
   calling itself. That was the court crash. */
function greenPlan(R){
  if(!R)return null;
  const d=Math.max(0.5,Math.hypot(R.x-P.x,R.z-P.z)-RELEASE_FWD); // from the RELEASE point
  const w=makeWindow(d,groundAt(P.x,P.z)+RELEASE_H,R.y);         // R.y = the rim's WORLD height
  if(!w)return null;
  w.d=d;
  w.cMid=(w.v-SHOT_V0)/SHOT_VR;
  w.band=shotBand(d);
  return w;
}
let charging=false,chargeT=0;
function startCharge(){
  if(BALL.mode!=='carried'||charging)return;
  charging=true;chargeT=0;
  document.getElementById('pwrwrap').style.display='block';
}
/* 🎯 THE ONE SHOT SOLVER — throwBall AND the dotted trajectory both call this, so
   what you see is exactly what leaves her hands. Line comes from the CAMERA:
   drag to look = drag to aim. AIM assist still snaps the line if you're pointed at
   the basket (plus a human wobble at release so it's never robotic) — POWER is
   entirely yours, and the honest physics still judges it. */
function shotPlan(wobble){
  let yaw=aimYaw();                       // 🎯 you shoot where you LOOK
  let th=52*Math.PI/180;
  const R=aimRim();
  if(R){
    const bearing=Math.atan2(R.x-P.x,R.z-P.z);
    const diff=((bearing-yaw+Math.PI*3)%(Math.PI*2))-Math.PI;
    if(Math.abs(diff)<0.35)yaw=bearing+(wobble?(Math.random()-0.5)*0.012:0);
    const d=Math.max(0.5,Math.hypot(R.x-P.x,R.z-P.z)-RELEASE_FWD);
    th=shotAngle(d,R.y-(groundAt(P.x,P.z)+RELEASE_H)); // she puts the right arc on it
  }
  let speed=SHOT_V0+chargeT*SHOT_VR;
  const plan=greenPlan(R);   // ⚠️ greenPlan, never shotPlan — this IS shotPlan
  if(plan&&plan.cMid>=0&&plan.cMid<=1&&Math.abs(chargeT-plan.cMid)<=plan.band){
    // 🟢 she hit the green — it goes in. The human wobble has to SHRINK with range:
    // range error ≈ 2·d/v·dv, and the hole is only 0.107m wide, so a flat ±0.3%
    // throws a 27m heave 15cm off — wider than the rim. Scale it, or the promise breaks.
    const jit=Math.min(0.004, 0.05/(2*plan.d));
    speed=plan.v*(1+(Math.random()*2-1)*jit);
    BALL.timed=true;
  }else BALL.timed=false;
  const ca=Math.cos(th), sa=Math.sin(th);
  return {yaw,
    x:P.x+Math.sin(yaw)*RELEASE_FWD, y:groundAt(P.x,P.z)+RELEASE_H, z:P.z+Math.cos(yaw)*RELEASE_FWD,
    vx:Math.sin(yaw)*speed*ca, vy:speed*sa, vz:Math.cos(yaw)*speed*ca};
}
function throwBall(){
  if(!charging||BALL.mode!=='carried')return;
  charging=false;
  document.getElementById('pwrwrap').style.display='none';
  document.getElementById('pwrcue').style.display='none';
  BALL.hotTick=false;
  if(ball)ball.material.emissive.setHex(0x000000);
  const s=shotPlan(true);
  P.yaw=s.yaw;                            // she turns and faces the shot
  BALL.mode='flying';BALL.scored=false;BALL.rattled=false;BALL.glass=false;BALL.grounded=false;
  BALL.fromX=P.x;BALL.fromZ=P.z;
  BALL.x=s.x;BALL.y=s.y;BALL.z=s.z;
  BALL.vx=s.vx;BALL.vy=s.vy;BALL.vz=s.vz;
  playAnim('Attack',0.07);sfxSwing();
  aimHide();
}

/* ============================================================
   🎯 AIMING · the camera IS the crosshair
   Drag (mouse) or swipe (touch) turns camYaw — and camYaw is what
   every swing, throw and blast now fires along. While the ball is in
   her hands, the real arc is drawn: same solver, same GRAV, no drag.
   ============================================================ */
const aimYaw=()=>camYaw;
let aimDots=null,aimRing=null;
function makeAim(){
  aimDots=[];
  const dm=new THREE.MeshBasicMaterial({color:0xffe14d,transparent:true,opacity:0.9,depthWrite:false});
  for(let i=0;i<11;i++){
    const d=new THREE.Mesh(new THREE.SphereGeometry(0.075,7,6),dm);
    d.visible=false;d.renderOrder=3;scene.add(d);aimDots.push(d);
  }
  aimRing=new THREE.Mesh(new THREE.TorusGeometry(0.55,0.085,7,20),
    new THREE.MeshBasicMaterial({color:0x2bd9ff,transparent:true,opacity:0.92,depthWrite:false}));
  aimRing.rotation.x=-Math.PI/2;aimRing.visible=false;aimRing.renderOrder=3;scene.add(aimRing);
}
function aimHide(){
  if(aimRing)aimRing.visible=false;
  if(aimDots)for(const d of aimDots)d.visible=false;
}
function aimUpdate(){
  if(!aimRing)return;
  if(!ball||BALL.mode!=='carried'||RIDE.on||FLY.on||performance.now()<downUntil){aimHide();return}
  const s=shotPlan(false);                 // no wobble — this is the honest line
  let {x,y,z,vx,vy,vz}=s;
  const h=1/120, path=[];                  // same integrator tickBall flies, same GRAV, no drag
  for(let i=0;i<900;i++){
    vy-=GRAV*h;x+=vx*h;y+=vy*h;z+=vz*h;
    if(i%4===0)path.push([x,y,z]);
    if(y<=groundAt(x,z)+0.12&&vy<0)break;
  }
  for(let i=0;i<aimDots.length;i++){
    const pt=path[Math.floor((i+1)/(aimDots.length+1)*path.length)];
    if(pt){aimDots[i].position.set(pt[0],pt[1],pt[2]);aimDots[i].visible=true}
    else aimDots[i].visible=false;
  }
  const e=path[path.length-1]||[x,y,z];
  aimRing.position.set(e[0],groundAt(e[0],e[2])+0.09,e[2]);
  aimRing.scale.setScalar(charging?1.15+Math.sin(performance.now()/90)*0.1:1);
  aimRing.visible=true;
}
function tickBall(dt){
  if(!ball)return;
  if(BALL.mode==='ground'){
    // 🏀 on the hardwood, the ball comes to YOU: step on court → ball in hand
    if(onCourt(P.x,P.z)&&performance.now()>downUntil){
      BALL.mode='carried';
      if(!BALL.toldOnce){toast('🏀 Ball up! Hold ⚔️ to charge your shot');BALL.toldOnce=true}
    }else{
      ball.position.set(BALL.x,BALL.y,BALL.z);
      ball.rotation.y+=dt*0.4;
      if(Math.hypot(P.x-BALL.x,P.z-BALL.z)<1.6&&performance.now()>downUntil){
        BALL.mode='carried';toast('🏀 Got the ball! Hold ⚔️ to charge your shot');
      }
    }
  }else if(BALL.mode==='carried'){
    ball.position.set(
      P.x+Math.sin(P.yaw+0.5)*0.45,
      groundAt(P.x,P.z)+1.15,
      P.z+Math.cos(P.yaw+0.5)*0.45);
    if(charging){
      chargeT=Math.min(1,chargeT+dt/1.5);
      const bar=document.getElementById('pwr');
      bar.style.width=(chargeT*100)+'%';
      const mk=document.getElementById('pwrmark');
      const zone=document.getElementById('pwrzone');
      const wrap=document.getElementById('pwrwrap');
      const cue=document.getElementById('pwrcue');
      const R=aimRim();
      let hot=false, w=greenPlan(R);
      if(w&&w.cMid>=0&&w.cMid<=1){
        const l=Math.max(0,w.cMid-w.band), r2=Math.min(1,w.cMid+w.band);
        zone.style.display='block';
        zone.style.left=(l*100)+'%';
        zone.style.width=((r2-l)*100)+'%';
        mk.style.display='block';
        mk.style.left=(w.cMid*100)+'%';
        hot=chargeT>=l&&chargeT<=r2;
      }else{ zone.style.display='none'; mk.style.display='none'; }
      // 🟢 GREEN = LET GO. It means one thing and one thing only.
      if(hot){
        bar.style.background='linear-gradient(90deg,#16a34a,#4ade80,#bbf7d0)';
        bar.style.boxShadow='0 0 20px #4ade80';
        wrap.style.borderColor='#4ade80';
        wrap.style.boxShadow='0 0 22px rgba(74,222,128,.75)';
        cue.style.display='block';
        if(ball)ball.material.emissive.setHex(0x1f7a3a);   // the ball lights up in her hands
        if(!BALL.hotTick){BALL.hotTick=true;ping()}        // …and it TICKS the moment you enter
      }else{
        bar.style.background='linear-gradient(90deg,#2bd9ff,#8a5cff,#ff2ec4)';
        bar.style.boxShadow='0 0 12px rgba(138,92,255,.7)';
        wrap.style.borderColor='rgba(255,255,255,.5)';
        wrap.style.boxShadow='none';
        cue.style.display='none';
        if(ball)ball.material.emissive.setHex(0x000000);
        BALL.hotTick=false;
      }
    }
  }else{ // 🏀 flying — SUBSTEPPED, or a 0.24m ball at 18 m/s tunnels straight through
    const N=Math.max(1,Math.min(16,Math.ceil(dt/0.004)));
    const h=dt/N;
    for(let i=0;i<N;i++){
      BALL.prevY=BALL.y;
      BALL.vy-=GRAV*h;
      BALL.x+=BALL.vx*h; BALL.y+=BALL.vy*h; BALL.z+=BALL.vz*h;
      for(const R of RIMS){
        // 🪧 glass first — a bank shot hits the board, THEN drops to the rim
        if(hitBoard(R)){BALL.glass=true}
        if(hitRim(R)){if(!BALL.scored)BALL.rattled=true}
        // 🎯 through the hoop: crossed the rim plane going down, inside the ring.
        // The torus collider guarantees it physically fit — rattle-ins count, just like real ball.
        if(!BALL.scored&&BALL.vy<0&&BALL.prevY>R.y&&BALL.y<=R.y&&
           Math.hypot(BALL.x-R.x,BALL.z-R.z)<RIM_IN)swish(R);
      }
      const g0b=groundAt(BALL.x,BALL.z);
      if(BALL.y<g0b+BR){
        if(!BALL.grounded){
          BALL.grounded=true;
          if(!BALL.scored&&!onCourt(BALL.x,BALL.z)){ // 💣 out of bounds = GRENADE
            ballExplode(BALL.x,BALL.z,true);
            ballRespawn();
            return;
          }
        }
        BALL.y=g0b+BR;
        const e=onCourt(BALL.x,BALL.z)?E_WOOD:E_DIRT; // hardwood bounces true, sand doesn't
        if(Math.abs(BALL.vy)>0.55){
          BALL.vy=-BALL.vy*e; BALL.vx*=0.90; BALL.vz*=0.90; clank();
        }else{
          BALL.vy=0; BALL.vx*=0.93; BALL.vz*=0.93;
          if(Math.hypot(BALL.vx,BALL.vz)<0.35){
            BALL.mode='ground';BALL.rest=performance.now();BALL.scored=false;
            BALL.rattled=false;BALL.glass=false;
          }
        }
      }
      if(BALL.y<0.25&&groundAt(BALL.x,BALL.z)<0.12){ // into the sea
        const c2=HOOP.courtC||{x:COURT.cx,z:COURT.cz};
        BALL.mode='ground';BALL.scored=false;
        BALL.x=c2.x;BALL.z=c2.z;BALL.y=groundAt(c2.x,c2.z)+BR;
        BALL.vx=BALL.vy=BALL.vz=0;
        toast('🌊 Splash! Ball back at the court');
        break;
      }
    }
    // 🌀 backspin: spin about the axis square to travel, like a real jumper
    const sp=Math.hypot(BALL.vx,BALL.vz);
    if(sp>0.05){
      BALL.spinAx=BALL.spinAx||new THREE.Vector3();
      BALL.spinAx.set(-BALL.vz,0,BALL.vx).normalize();
      ball.rotateOnWorldAxis(BALL.spinAx,-(sp/BR)*dt*0.22);
    }
    ball.position.set(BALL.x,BALL.y,BALL.z);
  }
  // lost far from court while resting → wander home
  if(BALL.mode==='ground'&&BALL.rest&&performance.now()-BALL.rest>20000){
    const c=HOOP.courtC||{x:-68,z:100};
    BALL.x=c.x;BALL.z=c.z;BALL.y=groundAt(c.x,c.z)+BR;BALL.rest=0;
  }
}

function sfxFanfare(){

      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.09+0.3);

/* 💣 the grenade ball */
function ballExplode(x,z,mine){
  const gy=groundAt(x,z);
  sfxKO();
  // fireball + shockwave
  fxImpact(x,gy+0.8,z,0xff8c42);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.12,6,24),
    new THREE.MeshBasicMaterial({color:0xffb347,transparent:true,opacity:0.9}));
  ring.rotation.x=Math.PI/2;ring.position.set(x,gy+0.35,z);
  ring.userData={life:0.5,grow:26,kind:'ring'};
  scene.add(ring);fx.push(ring);
  throwConfetti(x,gy+1,z,10);
  if(!mine)return; // only the thrower's client deals damage — no double hits
  const R=4.5;
  // me
  if(Math.hypot(P.x-x,P.z-z)<R)playerHurt(2);
  // skeletons in the blast
  for(const sk of [...skels]){
    if(Math.hypot(sk.root.position.x-x,sk.root.position.z-z)<R)damageSkel(sk,3);
  }
  // friends in the blast
  for(const [nm,rm] of remotes){
    if(Math.hypot(rm.root.position.x-x,rm.root.position.z-z)<R){
      fetch('/api/island/hit',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({to:nm,dmg:2})}).catch(()=>{});
    }
  }
  postEvent('boom',0,x,z);
}
const boneM2=new THREE.MeshLambertMaterial({color:lin(0xf2ead8)});

let slashTex=null;
function getSlashTex(){
  if(slashTex)return slashTex;
  const cv=document.createElement('canvas');cv.width=128;cv.height=128;
  const g=cv.getContext('2d');
  g.strokeStyle='rgba(160,240,255,0.95)';g.lineWidth=14;g.lineCap='round';
  g.beginPath();g.arc(64,110,74,Math.PI*1.18,Math.PI*1.82);g.stroke();
  g.strokeStyle='rgba(255,255,255,0.9)';g.lineWidth=6;
  g.beginPath();g.arc(64,110,74,Math.PI*1.22,Math.PI*1.78);g.stroke();
  slashTex=new THREE.CanvasTexture(cv);
  return slashTex;
}
const fx=[];

  sp.scale.set(2.6,2.6,1);

function fxImpact(x,y,z,col){
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({color:col||0xfff1a8,transparent:true,opacity:0.95,depthWrite:false}));
  sp.scale.set(0.5,0.5,1);

function tickFx(dt){
  for(let i=fx.length-1;i>=0;i--){
    const f2=fx[i];f2.userData.life-=dt;

      f2.position.x+=f2.userData.vx*dt;f2.position.z+=f2.userData.vz*dt;
      f2.material.opacity=Math.max(0,f2.userData.life/0.22);

      f2.scale.x+=f2.userData.grow*dt;f2.scale.y+=f2.userData.grow*dt;
      f2.material.opacity=Math.max(0,f2.userData.life/0.5);
    }else{
      f2.scale.x+=f2.userData.grow*dt;f2.scale.y+=f2.userData.grow*dt;
      f2.material.opacity=Math.max(0,f2.userData.life/0.2);
    }
    if(f2.userData.life<=0){scene.remove(f2);fx.splice(i,1)}
  }
}
function tickBursts(dt){
  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i];
    b.userData.vy-=14*dt;
    b.position.x+=b.userData.vx*dt;b.position.y+=b.userData.vy*dt;b.position.z+=b.userData.vz*dt;
    b.rotation.y+=dt*(b.userData.spin||7);b.rotation.x+=dt*3;b.userData.burst-=dt;
    if(b.userData.burst<=0||b.position.y<0){scene.remove(b);bursts.splice(i,1)}
  }
}
/* ============================================================
   ☠️ THE SKELETON RAID · a ship appears on the horizon, sails in
   slowly, and lands 10 sword-raiders. 3 hits each · +25 💎 a kill

const RAID={state:'sailing',ship:null,timer:0,landing:{x:-40,z:150}};
function makeRaidShip(){
  const g=makeBoat(0,0,0);
  g.scale.setScalar(2.6);
  // dark raid sail
  g.traverse(m=>{if(m.isMesh&&m.material&&m.material.map){m.material=m.material.clone();
    const cv=document.createElement('canvas');cv.width=64;cv.height=64;
    const gg=cv.getContext('2d');gg.fillStyle='#23263a';gg.fillRect(0,0,64,64);
    gg.fillStyle='#e8e2d0';gg.font='900 40px system-ui';gg.textAlign='center';gg.fillText('☠',32,46);
    m.material.map=new THREE.CanvasTexture(cv);m.material.map.encoding=THREE.sRGBEncoding;
  }});
  return g;
}
function raidStart(){
  const a=Math.atan2(RAID.landing.z,RAID.landing.x);
  RAID.ship=makeRaidShip();
  RAID.ship.position.set(Math.cos(a)*620,0.42,Math.sin(a)*620); // a speck on the horizon
  RAID.state='sailing';
  toast('⛵ A strange ship on the horizon…');
}
function raidLand(){
  RAID.state='ashore';
  toast('☠️ SKELETON RAID! 10 raiders ashore — ⚔️ +25 💎 each!');
  sfxKO();
  for(let i=0;i<10;i++){
    const a=Math.random()*6.28,r=Math.random()*24;
    addSkel(RAID.landing.x*0.72+Math.cos(a)*r,RAID.landing.z*0.72+Math.sin(a)*r);

}
function tickRaid(dt){
  if(RAID.state==='sailing'&&RAID.ship){
    const dx=RAID.landing.x*1.15-RAID.ship.position.x, dz=RAID.landing.z*1.15-RAID.ship.position.z;
    const d=Math.hypot(dx,dz);
    if(d>6){
      RAID.ship.position.x+=dx/d*5.5*dt;
      RAID.ship.position.z+=dz/d*5.5*dt;
      RAID.ship.rotation.y=Math.atan2(dx,dz);
      RAID.ship.position.y=oceanY(RAID.ship.position.x,RAID.ship.position.z,performance.now()/1000)+0.1;
    }else raidLand();
  }else if(RAID.state==='ashore'){
    RAID.ship&&(RAID.ship.position.y=oceanY(RAID.ship.position.x,RAID.ship.position.z,performance.now()/1000)+0.1);
    if(skels.length===0){
      RAID.state='departing';
      toast('🏴‍☠️ Raid defeated! The ship retreats…');
    }
  }else if(RAID.state==='departing'&&RAID.ship){
    const a=Math.atan2(RAID.ship.position.z,RAID.ship.position.x);
    RAID.ship.position.x+=Math.cos(a)*7*dt;
    RAID.ship.position.z+=Math.sin(a)*7*dt;
    RAID.ship.rotation.y=Math.atan2(Math.cos(a),Math.sin(a));
    if(Math.hypot(RAID.ship.position.x,RAID.ship.position.z)>640){
      scene.remove(RAID.ship);RAID.ship=null;
      RAID.state='waiting';RAID.timer=45; // next wave brews
    }
  }else if(RAID.state==='waiting'){
    RAID.timer-=dt;
    if(RAID.timer<=0)raidStart();
  }
}
/* skeleton raiders (3 hits · they hunt across the whole island) */
const skels=[];
function addSkel(x,z){
  const root=spawn(FILES.kkSkel,1.8);
  if(!root)return;
  root.position.set(x,groundAt(x,z),z);
  const na=nativeActions(root.userData.inner,assets[FILES.kkSkel].animations);
  root.traverse(m=>{if(m.isMesh)m.castShadow=true});
  scene.add(root);
  skels.push({root,...na,cur:null,hp:3,home:{x,z},atkCd:0,hitFlash:0,state:'idle'});
}
function skAnim(sk,name){
  if(sk.cur===name||!sk.acts[name])return;
  if(sk.cur&&sk.acts[sk.cur])sk.acts[sk.cur].fadeOut(0.15);
  sk.acts[name].reset().fadeIn(0.15).play();
  sk.cur=name;
}
function tickSkels(dt){
  for(let i=skels.length-1;i>=0;i--){
    const sk=skels[i];
    const dx=P.x-sk.root.position.x,dz=P.z-sk.root.position.z;
    const dist=Math.hypot(dx,dz);
    sk.atkCd=Math.max(0,sk.atkCd-dt);
    if(sk.hitFlash>0){sk.hitFlash-=dt}
    if(dist<70&&dist>1.9&&downUntil<performance.now()){ // raiders hunt across the island
      const ny=Math.atan2(dx,dz);
      sk.root.rotation.y+=(((ny-sk.root.rotation.y+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*6);
      sk.root.position.x+=Math.sin(ny)*2.2*dt;
      sk.root.position.z+=Math.cos(ny)*2.2*dt;
      skAnim(sk,'Walk');
    }else if(dist<=1.9&&sk.atkCd<=0&&downUntil<performance.now()){ // bonk!
      skAnim(sk,'Attack');sk.atkCd=1.6;
      setTimeout(()=>{
        if(Math.hypot(P.x-sk.root.position.x,P.z-sk.root.position.z)<2.4)playerHurt(1);
      },420);
    }else if(sk.cur!=='Attack'||sk.atkCd<1.1){
      skAnim(sk,'Idle');
    }
    sk.root.position.y=groundAt(sk.root.position.x,sk.root.position.z);
    sk.mixer.update(dt);
  }
}
function playerHurt(dmg=1,from=null,force=false){
  if(performance.now()<downUntil)return;                 // down is down
  if(!force&&performance.now()<hurtUntil)return;          // i-frame — but only for LOCAL sources
  hp=Math.max(0,hp-dmg);heartsUI();hurtUntil=performance.now()+700;
  playAnim('Hit',0.08);sfxHit();
  if(from)toast('⚔️ '+from+' got you!');
  if(hp<=0){ // KO: ALL your stars burst out — respawn with nothing
    downUntil=performance.now()+2600;
    sfxKO();
    starBurst(P.x,groundAt(P.x,P.z)+1.2,P.z,Math.min(10,Math.max(3,starCount)));
    starCount=0;
    document.getElementById('stars').textContent='💎 0';
    playAnim('Down',0.1);
    setTimeout(()=>{
      P.x=-84;P.z=74;hp=HP_MAX;RIDE.on=false;FLY.on=false;heartsUI();playAnim('Idle',0.1);
    },2500);
  }
}
function toast(txt){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;left:50%;transform:translateX(-50%);top:20%;z-index:15;background:rgba(6,20,40,.8);color:#ffe14d;font-weight:800;padding:8px 18px;border-radius:999px;font-size:14px;pointer-events:none';
  d.textContent=txt;document.body.appendChild(d);
  setTimeout(()=>d.remove(),1800);
}
function damageSkel(sk,dmg){
  sk.hp-=dmg;sk.hitFlash=0.3;sfxHit();
  fxImpact(sk.root.position.x,sk.root.position.y+1.2,sk.root.position.z);
  if(sk.hp<=0){
    sfxKO();
    boneScatter(sk.root.position.x,sk.root.position.y+1,sk.root.position.z); // he falls apart!
    starCount+=25; // 💎 bounty
    document.getElementById('stars').textContent='💎 '+starCount;
    toast('☠️ +25 💎!');
    scene.remove(sk.root);
    skels.splice(skels.indexOf(sk),1);
  }else skAnim(sk,'Hit');
}
function doAttack(){
  const now=performance.now();
  if(now<attackUntil||now<downUntil)return;
  attackUntil=now+700;
  const ay=aimYaw();   // 🎯 you swing where you LOOK
  P.yaw=ay;
  playAnim('Attack',0.07);
  sfxSwing();fxSlash();
  { // 🏄‍♀️ Kai swings the board itself — it twirls off her back
    const bg=player.userData.board;
    if(bg){bg.userData.spin=0.7}
  }
  setTimeout(()=>{ // the swing lands mid-animation
    const fwx=Math.sin(ay),fwz=Math.cos(ay);
    // 🥊 PvP: friends in the arc take battle damage (relayed via the club server)
    const reach=(ROSTER[heroKey]&&ROSTER[heroKey].reach)||2.8;
    for(const [nm,rm] of remotes){
      const dx=rm.root.position.x-P.x,dz=rm.root.position.z-P.z;
      const d=Math.hypot(dx,dz);
      if(d<reach&&(dx*fwx+dz*fwz)/Math.max(0.01,d)>0.35){
        sfxZap();sfxHit();
        fxImpact(rm.root.position.x,rm.root.position.y+1.3,rm.root.position.z,0x9be8ff);
        starBurst(rm.root.position.x,rm.root.position.y+1.2,rm.root.position.z,2);
        fetch('/api/island/hit',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({to:nm,dmg:1})}).catch(()=>{});
      }
    }
    const fx2=fwx,fz2=fwz;
    for(const sk of skels){
      const dx=sk.root.position.x-P.x,dz=sk.root.position.z-P.z;
      const d=Math.hypot(dx,dz);
      if(d<Math.max(2.6,reach-0.2)&&(dx*fx2+dz*fz2)/Math.max(0.01,d)>0.35){
        sk.root.position.x+=fx2*1.2;sk.root.position.z+=fz2*1.2; // knockback
        damageSkel(sk,1);
      }
    }
  },260);
}

   woman walks the horizon and hurls burning meteorites.
   Wall-clock seeded: every player sees the exact same apparition.

function mulberry32(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
/* was a 20-min cycle => she existed 6% of the time. Nobody ever saw her. */
const TITAN={cycleMs:6*60*1000,lastCycle:-1,group:null,phaseT:0,meteors:[],rings:[],warned:false,armT:0};
function lavaTex(){
  const cv=document.createElement('canvas');cv.width=128;cv.height=256;
  const g=cv.getContext('2d');
  // she read as a black silhouette: base #1d1512 x a dark brown colour = ~0.04 albedo.
  // She's a LAVA titan. Give her hot basalt and bright magma.
  g.fillStyle='#3a2a24';g.fillRect(0,0,128,256);
  g.strokeStyle='#ffb02a';g.lineWidth=4;g.shadowColor='#ff7a2a';g.shadowBlur=10;
  for(let i=0;i<24;i++){ // glowing magma cracks
    g.beginPath();
    let x=Math.random()*128,y=Math.random()*256;
    g.moveTo(x,y);
    for(let k=0;k<4;k++){x+=(Math.random()-0.5)*40;y+=Math.random()*40;g.lineTo(x,y)}
    g.stroke();
  }
  const t=new THREE.CanvasTexture(cv);t.encoding=THREE.sRGBEncoding;t.wrapS=t.wrapT=10497;
  return t;
}
function buildTitan(){

  // paint her 89% sky-blue and she vanishes into the haze (only her toes stayed
  // visible, against the darker ocean). She is a landmark — the haze doesn't get her.
  const rockM=new THREE.MeshLambertMaterial({map:lt,color:lin(0xb09484),emissive:lin(0xff6a22),
    emissiveMap:lt,emissiveIntensity:1.5,fog:false}); // the cracks GLOW; she is not a hole in the sky

  const chest=seg(64,46,38);chest.position.y=198;g.add(chest);

  const armR=seg(16,86,18);armR.geometry.translate(0,-38,0);armR.position.set(46,214,0);g.add(armR);
  g.userData.arm=armR; // the throwing arm pivots at the shoulder
  // head with molten eyes + flowing lava hair
  const head=seg(30,32,28);head.position.y=238;g.add(head);
  const eyeM=new THREE.MeshBasicMaterial({color:0xffb02a,fog:false});
  for(const ex of [-8,8]){

    emissiveMap:lt,emissiveIntensity:1.7,fog:false}); // molten hair
  g.add(hair);
  // her own glow lights the smoke around her

function titanMeteorTargets(rand,n){

function tickTitan(dt){
  const now=Date.now();
  const cycle=Math.floor(now/TITAN.cycleMs);
  const tIn=(now%TITAN.cycleMs)/1000; // seconds into this cycle
  const VISIT=105; // 105s of every 6min = 29% uptime. She's an EVENT, not a rumour.
  if(tIn<VISIT){
    if(TITAN.lastCycle!==cycle){ // she rises
      TITAN.lastCycle=cycle;
      TITAN.group=buildTitan();
      scene.add(TITAN.group);
      TITAN.rand=mulberry32(cycle*7919+13);
      TITAN.nMet=3+((cycle%2)?1:0); // 3 or 4, everyone agrees
      TITAN.targets=titanMeteorTargets(TITAN.rand,TITAN.nMet);
      TITAN.thrown=0;
      TITAN.a0=TITAN.rand()*6.28;
      toast('🌋 THE LAVA TITAN RISES ON THE HORIZON…');
      try{const c=sctx(),t=c.currentTime; // deep rumble
        const o=c.createOscillator();o.type='sawtooth';o.frequency.value=32;
        const g2=c.createGain();g2.gain.setValueAtTime(0.16,t);g2.gain.exponentialRampToValueAtTime(0.001,t+3);
        o.connect(g2).connect(c.destination);o.start();o.stop(t+3);
      }catch(e){}
    }
    if(TITAN.group){
      // she strides along the horizon arc
      const a=TITAN.a0+(tIn/VISIT)*0.7;
      const R=700; // close enough to loom, far enough to be a horizon event
      TITAN.group.position.set(Math.cos(a)*R,0,Math.sin(a)*R);
      TITAN.group.lookAt(0,0,0);
      // walk cycle: legs scissor, body sways
      const w=tIn*1.4;
      TITAN.group.userData.legs[0].rotation.x=Math.sin(w)*0.22;
      TITAN.group.userData.legs[1].rotation.x=-Math.sin(w)*0.22;
      TITAN.group.position.y=Math.abs(Math.sin(w))*6;
      TITAN.group.rotation.z=Math.sin(w)*0.02;
      // throws at 18s, 32s, 46s, 60s
      const throwTimes=[18,32,46,60];
      if(TITAN.thrown<TITAN.nMet&&tIn>throwTimes[TITAN.thrown]){
        const hand=new THREE.Vector3(46,240,0).applyMatrix4(TITAN.group.matrixWorld);
        spawnMeteor(TITAN.targets[TITAN.thrown],hand);
        TITAN.thrown++;
        TITAN.armT=0.8; // wind-up pose
      }
      if(TITAN.armT>0){TITAN.armT-=dt;TITAN.group.userData.arm.rotation.x=-2.2*Math.min(1,TITAN.armT/0.8)}
      else TITAN.group.userData.arm.rotation.x=0;
    }
  }else if(TITAN.group){ // she sinks beyond the horizon
    TITAN.group.position.y-=dt*30;
    if(TITAN.group.position.y<-320){scene.remove(TITAN.group);TITAN.group=null}
  }
  // meteors fly a shaped arc
  for(let i=TITAN.meteors.length-1;i>=0;i--){
    const m=TITAN.meteors[i],u=m.userData;
    u.t+=dt;
    const k=Math.min(1,u.t/u.T);
    m.position.x=u.sx+(u.tx-u.sx)*k;
    m.position.z=u.sz+(u.tz-u.sz)*k;
    m.position.y=u.sy+(u.ty-u.sy)*k+Math.sin(k*Math.PI)*120; // a high burning arc
    m.rotation.x+=dt*4;m.rotation.y+=dt*3;
    if(k>=1){
      meteorImpact(m);
      scene.remove(m);TITAN.meteors.splice(i,1);
    }
  }
  for(let i=TITAN.rings.length-1;i>=0;i--){
    const r2=TITAN.rings[i];
    r2.userData.pulse+=dt*6;
    r2.material.opacity=0.4+Math.sin(r2.userData.pulse)*0.3;
    // ring dies when its meteor lands
    if(!TITAN.meteors.some(m=>Math.abs(m.userData.tx-r2.position.x)<0.5&&Math.abs(m.userData.tz-r2.position.z)<0.5)){
      scene.remove(r2);TITAN.rings.splice(i,1);
    }
  }
}

/* ============================================================
   GAME STATE + MAIN LOOP
   ============================================================ */
const P={x:-84,z:74,vy:0,air:0,yaw:0};   // spawn on the cove shelf by the dock — clear of the court
let surfPitch=0,surfRoll=0;              // she leans into the face of the wave
/* 🏄‍♀️ THE BOARD HAS A THROTTLE, NOT A WALKING SPEED.
   It was a flat 13.5 m/s — barely faster than a sprint on land, which is why the
   ocean felt like wading. Now she winds UP: squeeze it and she builds to 26 m/s
   (~2.5x a sprint), with the rooster tail to prove it. Let go and she coasts down. */
/* 🛹 THE OCEAN SKATE PARK.
   The board doesn't have a top speed any more — it has GRAVITY. Drop into a 200ft
   roller and you accelerate down the face; grind up the next one and you bleed it
   all back. Speed comes from the terrain, exactly like a half-pipe.
     dv/dt = throttle  -  g*sin(slope)  -  drag*v^2
   Quadratic drag (that's what water actually does) sets the terminal speed:
     flat out, full throttle : sqrt(12/0.012)          = 32 m/s
     dropping a steep face   : sqrt((12+40*0.26)/0.012) = 43 m/s
     grinding back up it     : sqrt((12-40*0.26)/0.012) = 12 m/s
   4x between the trough and the crest. THAT is the skate park.
   AIRBORNE: not a jump button. You leave the water at the exact moment the surface
   falls away from under you FASTER THAN GRAVITY (d2y/dt2 < -g). Launch off a lip and
   you fly, because the water is no longer there to hold you up. */
let surfV=0, surfAir=false, surfVy=0, surfY=0, lastSurfY=null, lastSurfVy=0, airTime=0, bestAir=0;
/* ⚖️ THE BALANCE IS EVERYTHING. With ACC=12 / G=40 the throttle simply bulldozed the
   terrain: 27->32 m/s, a 1.2x swing, no skate park at all. The engine has to be WEAK
   and gravity has to be STRONG, so the WAVE decides your speed, not the button.
     flat out          : sqrt(10/0.011)            = 30 m/s
     dropping in       : sqrt((10+65*0.13)/0.011)  = 41 m/s
     grinding back up  : sqrt((10-65*0.13)/0.011)  = 13 m/s
   3x. Now you have to angle across the face and pump like a real surfer, because
   pointing straight up a 200-footer will simply stall you. */
const SURF_ACC=20, SURF_G=70, SURF_DRAG=0.009;  // ⚡ strong engine, because the waves are MASSIVE
const SURF_REF=47;   // flat-water terminal speed — the yardstick the spray scales against
let started=false,last=performance.now();

let lobby=false;
/* 🛡️ WHY THE GAME "FROZE".
   requestAnimationFrame(loop) is the FIRST line and renderer.render() is the LAST.
   So the instant anything in between throws, rAF keeps firing but nothing ever
   draws — the screen sticks on the last good frame and it looks like a hard freeze.
   It isn't hung. It's throwing, sixty times a second, in silence.
   Now: one bad subsystem can't take the picture down, and it TELLS US what it was. */
function loop(){
  requestAnimationFrame(loop);
  try{ frame(); }
  catch(e){
    crashReport(e);
    try{ renderer.render(scene,cam); }catch(e2){}   // keep drawing, no matter what
  }
}
let crashSeen={}, crashN=0;
function crashReport(e){
  const msg=(e&&(e.message||e))+'';
  const where=((e&&e.stack)||'').split('\n').slice(1,4).join(' | ')||''; // 3 frames, not 1 — one frame nearly cost me the real culprit
  const key=msg+where;
  console.error('[STARVILLE]',e);
  if(crashSeen[key]){crashSeen[key]++;return}
  crashSeen[key]=1; crashN++;
  const el=document.getElementById('crash');
  if(!el)return;
  el.style.display='block';
  el.innerHTML='⚠️ <b>'+String(msg).replace(/[<>&]/g,'').slice(0,140)+'</b><br>'
    +'<span style="opacity:.75;font-size:10px">'+String(where).replace(/[<>&]/g,'').trim().slice(0,120)+'</span><br>'
    +'<span style="opacity:.55;font-size:10px">ISL-60 · '+navigator.userAgent.slice(0,68)+'</span>';
  el.onclick=()=>{try{navigator.clipboard.writeText(msg+'\n'+where+'\n'+navigator.userAgent)}catch(_){}
    toast('📋 copied — send it to Cap');};
}
function frame(){
  const now=performance.now();
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  const t=now/1000;   // ⚠️ MUST be up here. The surf code reads `t` ~100 lines below,
                      // and a `const` declared after its use is a TDZ ReferenceError,
                      // not an undefined. That was the Kai-in-the-water freeze.
  if(!started){
    if(lobby&&player){ // 🎭 hero showcase: the world is the backdrop, your pick struts on the beach
      mixer&&mixer.update(dt);
      const orb=now/1000*0.35;
      const ox=P.x+Math.sin(orb)*6.5, oz=P.z+Math.cos(orb)*6.5;
      cam.position.lerp(new THREE.Vector3(ox,groundAt(P.x,P.z)+2.6,oz),Math.min(1,dt*4));
      cam.lookAt(P.x,groundAt(P.x,P.z)+1.3,P.z);
      player.position.set(P.x,groundAt(P.x,P.z),P.z);
      renderer.render(scene,cam);
    }
    return;
  }

  tickRide(dt);                      // 🌊 the waterslide owns the hero while she's on it
  const onSlide=RIDE.on||FLY.on;

  // input vector (keys or joystick), camera-relative
  let ix=(keys.d?1:0)-(keys.a?1:0)+jx;
  let iz=(keys.s?1:0)-(keys.w?1:0)+jy;
  if(onSlide){ix=0;iz=0}             // the chute steers, not the joystick
  const mag=Math.min(1,Math.hypot(ix,iz));
  if(mag>0.05){
    const a=Math.atan2(ix,iz);
    P.yaw=camYaw+a+Math.PI;
    const speed=(mag>0.85?10.5:5.2)*mag;
    const canSurf=!!(ROSTER[heroKey]&&ROSTER[heroKey].surf)||hasBoard;  // 🏄 grabbed one off the rack? You surf.
    if(window.surfing){
      const Wm=oceanSurface(P.x,P.z,t);
      const fx0=Math.sin(P.yaw), fz0=Math.cos(P.yaw);
      const slopeAhead=Wm.sx*fx0+Wm.sz*fz0;                 // + = climbing, - = dropping in
      if(!surfAir){                                        // 🛹 in the air she KEEPS her speed
        surfV+=(SURF_ACC - SURF_G*slopeAhead)*dt;          //    GRAVITY DOWN THE FACE
        surfV-=SURF_DRAG*surfV*surfV*dt;                    //    water drag (quadratic)
      }
      surfV=Math.max(0,Math.min(85,surfV));
    }
    const surfSpeed=window.surfing?Math.max(5,surfV):speed;         // 🏄‍♀️ she FLIES
    const nx=P.x+Math.sin(P.yaw)*surfSpeed*dt;
    const nz=P.z+Math.cos(P.yaw)*surfSpeed*dt;
    const gh=groundAt(nx,nz);
    if(gh>0.12&&Math.abs(gh-groundAt(P.x,P.z))<1.4){P.x=nx;P.z=nz;window.surfing=false}
    else if(canSurf&&gh<=0.12&&Math.hypot(nx,nz)<1050){P.x=nx;P.z=nz;window.surfing=true} // 🌊🌊 out to the ROLLERS
    else{ // slide along
      const gx=groundAt(nx,P.z),gz=groundAt(P.x,nz);
      if(gx>0.12&&Math.abs(gx-groundAt(P.x,P.z))<1.4)P.x=nx;
      else if(gz>0.12&&Math.abs(gz-groundAt(P.x,P.z))<1.4)P.z=nz;
    }
    if(window.surfing&&groundAt(P.x,P.z)>0.2)window.surfing=false;
  }
  // 🎯 look = aim: dragging on the spot turns her, and a charged shot always faces
  // the camera — so what you're aiming at is what you can see
  if(!onSlide&&(charging||(mag<=0.05&&dragId!==null)))P.yaw=camYaw;

  // jump + gravity
  const g0=groundAt(P.x,P.z);
  if(onSlide){wantJump=false;P.vy=0;P.air=0}
  else{
    if((keys[' ']||wantJump)&&P.air<=0.01){P.vy=8.4}
    wantJump=false;
    P.vy-=22*dt;
    P.air=Math.max(0,P.air+P.vy*dt);
    if(P.air<=0){P.air=0;if(P.vy<0)P.vy=0}
  }
  // apply to player object
  let py=g0+P.air;
  if(!window.surfing){surfV=Math.max(0,surfV-SURF_ACC*1.4*dt);surfAir=false;lastSurfY=null}
  if(window.surfing){
    // 🌊 ON the wave, not through it — same model the shader draws with.
    const W=oceanSurface(P.x,P.z,t);   // inverted Gerstner — the crest that's actually under her
    const S=shoreAt(P.x,P.z,t);        // …plus the shore break she's actually in
    const water=0.42+W.y+S.y+0.13;
    /* 🛹 AIRBORNE — measured, not scripted.
       You leave the water at the instant it can no longer hold you: when following the
       surface would need a downward acceleration greater than gravity. Riding a curve
       at speed v over curvature k needs a = v²·k. So:  v²·k < -g  ⇒  YOU FLY.
       ⚠️ Compute k from SPACE, not TIME. A second time-derivative divides by dt² —
       that's ×3600 at 60fps, so a millimetre of numerical jitter reads as 3.6 m/s² of
       fake acceleration and she launches off nothing. (It fired 26 times in 2 minutes
       and she was airborne 88% of the run.) A spatial central difference is smooth,
       and probing one BOARD LENGTH ahead and behind means ripples shorter than the
       board are bridged, exactly like a real board bridges them. */
    const BOARD=2.6;
    const fxh=Math.sin(P.yaw), fzh=Math.cos(P.yaw);
    const yF=oceanSurface(P.x+fxh*BOARD,P.z+fzh*BOARD,t).y;
    const yB=oceanSurface(P.x-fxh*BOARD,P.z-fzh*BOARD,t).y;
    const curv=(yF-2*W.y+yB)/(BOARD*BOARD);      // d²y/ds² along her line
    const aNeed=curv*surfV*surfV;                // what it'd take to stay stuck to it
    const climb=(W.sx*fxh+W.sz*fzh)*surfV;       // how fast she's rising right now
    if(!surfAir && aNeed<-9.81 && surfV>14){     // 🛹 the water cannot hold her. She flies.
      surfAir=true; surfVy=Math.max(1.5,Math.min(24,climb)); surfY=water; airTime=0;
      sfxSwing();
    }
    if(surfAir){
      surfVy-=9.81*dt; surfY+=surfVy*dt; airTime+=dt;
      if(surfY<=water&&surfVy<0){                  // …and back down
        surfAir=false; surfY=water;
        if(airTime>0.45){
          const pts=Math.min(20,Math.round(airTime*7));
          starCount+=pts;
          document.getElementById('stars').textContent='💎 '+starCount;
          toast('🛹 '+airTime.toFixed(1)+'s AIR!  +'+pts+' 💎'+(airTime>bestAir?'  ⭐ NEW BEST':''));
          bestAir=Math.max(bestAir,airTime);
          sfxFanfare();
        }
        starBurst(P.x,water+0.6,P.z,6);
        fxImpact(P.x,water+0.3,P.z,0xbfefff);
      }
      py=surfY+P.air;
    }else{
      py=water+P.air;
    }
    // 🏄 CAUGHT IT. A breaking wave doesn't just lift you — it CARRIES you.
    if(S.brk>0.04){
      const rr=Math.hypot(P.x,P.z)||1;
      const push=S.brk*11*dt;
      P.x-=(P.x/rr)*push; P.z-=(P.z/rr)*push;   // shoved toward the beach
      if(S.brk>0.45&&!window.__wasSurfing){window.__wasSurfing=true;toast('🏄 YOU CAUGHT THE WAVE!!')}
      if(Math.random()<dt*22)fxImpact(P.x+(Math.random()-0.5)*2.4,py+0.3,P.z+(Math.random()-0.5)*2.4,0xffffff);
    }else if(S.brk<0.02)window.__wasSurfing=false;
    W.sx+=S.sx; W.sz+=S.sz;            // she leans on the FACE of the breaker
    // lean into the face: slope along her travel = pitch, slope across it = roll
    const fx=Math.sin(P.yaw), fz=Math.cos(P.yaw);
    const tPitch=-(W.sx*fx+W.sz*fz), tRoll=-(W.sx*fz-W.sz*fx);
    surfPitch+=(tPitch-surfPitch)*Math.min(1,dt*6);
    surfRoll +=(tRoll -surfRoll )*Math.min(1,dt*6);
    // the board slides under her feet
    const bg=player.userData.board;
    if(bg&&bg.parent!==player){
      bg.parent.remove(bg);player.add(bg);
      bg.rotation.order='XYZ';               // under her feet: plain tilt, no back-rake
      bg.position.set(0,0.06,0);bg.rotation.set(0,0,0);
      bg.scale.setScalar(1.35);
    }
    if(bg){
      bg.rotation.z=surfRoll*0.9+Math.sin(t*2.6)*0.05;
      bg.rotation.x=(surfAir? -0.35-airTime*0.5 : surfPitch*0.9+(mag>0.05?-0.08:0.02));
    }
    // 🌊 spray off the tail when she's moving
    const wake=Math.min(1,surfV/SURF_REF);   // ⚠️ SURF_REF, not SURF_TOP — that died with the old throttle
    if(mag>0.2&&Math.random()<dt*(10+34*wake)){
      fxImpact(P.x-Math.sin(P.yaw)*0.9,0.5,P.z-Math.cos(P.yaw)*0.9,0xeafcff);
    }
  }else if(player.userData.board&&player.userData.boardHome&&player.userData.board.parent===player){
    const bg=player.userData.board,h=player.userData.boardHome;
    player.remove(bg);h.parent.add(bg);
    bg.rotation.order='ZYX';                 // back on her back: restore the rake order FIRST
    bg.position.copy(h.pos);bg.rotation.copy(h.rot);
    bg.scale.setScalar(h.scl||1);
  }
  if(onSlide)py=RIDE.y;   // hero AND camera boom ride the flume
  player.position.set(P.x,py,P.z);
  player.rotation.y+=(((P.yaw-player.rotation.y+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*10);
  if(window.surfing){                    // she banks with the swell
    player.rotation.x=surfPitch*0.5;
    player.rotation.z=surfRoll*0.5;
  }else if(player.rotation.x||player.rotation.z){
    player.rotation.x*=0.85;player.rotation.z*=0.85;
    if(Math.abs(player.rotation.x)<0.001)player.rotation.x=0;
    if(Math.abs(player.rotation.z)<0.001)player.rotation.z=0;
  }
  // animation state
  const now2=performance.now();
  const emoting=now2<emoteUntil&&mag<0.05&&P.air<=0.05;
  const fighting=now2<attackUntil||now2<hurtUntil||now2<downUntil;
  if(onSlide){
    playAnim(RIDE.on?(actions['Sit_Floor_Idle']?'Sit_Floor_Idle':'Idle'):'Jump',0.12);
  }else if(!fighting){
    if(window.surfing)playAnim(actions['Jump_Idle']?'Jump_Idle':'Idle',0.15); // the surf crouch
    else if(P.air>0.05)playAnim('Jump',0.08);
    else if(mag>0.85)playAnim('Run');
    else if(mag>0.05)playAnim('Walk');
    else if(!emoting)playAnim('Idle');
  }
  mixer&&mixer.update(dt);

  // 🎥 follow-camera brain: swing behind on direction change · flow back after free-look · tilt on slopes
  {
    const lookHeld=dragId!==null;
    const easeAng=(from,to,k)=>from+(((to-from+Math.PI*3)%(Math.PI*2))-Math.PI)*k;
    {
      // flow back behind the hero — rate ramps in softly, angular speed capped
      const since=performance.now()-lookReleasedAt;
      const grace=mag>0.05?0:600;
      if(since>grace)followRamp=Math.min(1,followRamp+dt*2.2); // rate fades in — no kick
      else followRamp=0;
      if(followRamp>0&&!lookHeld){
        const rate=(mag>0.85?3.0:mag>0.05?2.2:1.1)*followRamp;
        const step=(((P.yaw-camYaw+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*rate);
        const cap=2.6*dt; // angular speed ceiling: hard reversals sweep, never snap
        camYaw+=Math.max(-cap,Math.min(cap,step));
      }
    }
    // slope tilt: look up hills you're climbing, down slopes you're descending
    const aheadG=groundAt(P.x+Math.sin(P.yaw)*4.5,P.z+Math.cos(P.yaw)*4.5);
    const slope=Math.max(-0.4,Math.min(0.5,(aheadG-g0)/4.5));
    slopeTilt+=((mag>0.05?slope*0.5:0)-slopeTilt)*Math.min(1,dt*3);
  }
  // camera: Starville boom — orbit-follow, occlusion pull-in sampled along the boom, zoomable
  {
    const pEff=Math.max(0.05,Math.min(1.15,camPitch+slopeTilt));
    const ch=3.0+pEff*5.2;
    const dirX=-Math.sin(camYaw)*Math.cos(pEff), dirZ=-Math.cos(camYaw)*Math.cos(pEff);
    let boom=camDist;
    const eyeY=py+1.7;
    for(let tt=0.25;tt<=1.001;tt+=0.15){ // sample the sightline: hills never eat the view
      const sx=P.x+dirX*camDist*tt, sz=P.z+dirZ*camDist*tt;
      const sy=eyeY+(ch-1.7)*tt;
      const g=groundAt(sx,sz);
      if(g+0.9>sy){boom=Math.min(boom,camDist*tt-0.6);}
    }
    boom=Math.max(3.4,boom);
    smBoom+=(boom-smBoom)*Math.min(1,dt*(boom<smBoom?11:2.6)); // in fast (no clipping) · out slow (no lurch)
    let cx=P.x+dirX*smBoom, cz=P.z+dirZ*smBoom;
    let cy=py+1.7+(ch-1.7)*(smBoom/camDist);
    cy=Math.max(cy,groundAt(cx,cz)+1.5);
    if(window.surfing)cy=Math.max(cy,oceanY(cx,cz,t)+1.4); // 🌊 the boom rides over the swell
    cam.position.lerp(new THREE.Vector3(cx,cy,cz),Math.min(1,dt*6.5));
    if(shakeT>0){ // 🌋 impact tremor
      shakeT-=dt;
      const sh=shakeT*0.9;
      cam.position.x+=(Math.random()-0.5)*sh;
      cam.position.y+=(Math.random()-0.5)*sh*0.6;
      cam.position.z+=(Math.random()-0.5)*sh;
    }
    smLead+=((mag>0.05?1.8:0)-smLead)*Math.min(1,dt*3.5);
    lookTarget.lerp(new THREE.Vector3(
      P.x+Math.sin(P.yaw)*smLead,
      py+1.7+slopeTilt*3,
      P.z+Math.cos(P.yaw)*smLead),Math.min(1,dt*9));
    cam.lookAt(lookTarget);
  }

  // world life
  if(ocean.material.userData.sh)ocean.material.userData.sh.uniforms.uTime.value=t;
  foam.material.opacity=0.22+Math.sin(t*1.6)*0.09+Math.sin(t*4.1)*0.03; // lively surf line
  for(const cl of CLOUDS){cl.position.x+=cl.userData.sp*dt;if(cl.position.x>560)cl.position.x=-560}
  for(const sp of smoke){
    sp.userData.ph=(sp.userData.ph+dt*0.11)%1;
    const ph=sp.userData.ph,peak=groundAt(VOLC.x,VOLC.z);
    sp.position.set(VOLC.x+Math.sin(ph*8)*1.5+ph*4,peak+2+ph*18,VOLC.z+ph*2);
    sp.scale.setScalar(4+ph*12);
    sp.material.opacity=0.45*(1-ph);
  }
  craterGlow.intensity=0.4+Math.random()*0.15;
  tickStars(dt,t);
  tickRemotes(dt);
  tickCritters(dt);
  tickRack(dt);
  tickPod(dt,t);
  tickFolks(dt);
  tickBirds(dt,t);
  tickFood(dt,t);
  { // 🐾 the Pet Hut opens when you walk up to it
    const near=Math.hypot(P.x-SHOP.x,P.z-SHOP.z)<7.5;
    const el=document.getElementById('shop');
    if(near!==!!el.dataset.open){
      el.dataset.open=near?'1':'';
      el.style.display=near?'block':'none';
      if(near)shopRefresh();
    }
    if(near)document.getElementById('shopcoins').textContent='💎 '+starCount;
  }
  tickSkels(dt);
  tickRaid(dt);   // ⛵ …which had NEVER been called. The ship spawned on the horizon
                  //    and sat there for eternity, and no raid ever landed. Not once.
  tickBursts(dt);
  tickFx(dt);
  tickBall(dt);
  aimUpdate();   // 🎯 live trajectory while the ball's in her hands
  tickConfetti(dt);
  tickTitan(dt);
  { // board twirl during her swing
    const bg=player&&player.userData.board;
    if(bg&&bg.userData.spin>0){
      bg.userData.spin-=dt;
      bg.rotation.y+=dt*16;
      if(bg.userData.spin<=0)bg.rotation.y=0;
    }
  }

  renderer.render(scene,cam);
}

addEventListener('error',e=>crashReport(e.error||{message:e.message,stack:(e.filename||'')+':'+e.lineno}));
addEventListener('unhandledrejection',e=>crashReport(e.reason||{message:'unhandled promise rejection'}));

/* ---------- boot ---------- */
const bar=document.querySelector('#loadBar i'),pct=document.getElementById('loadPct');
loadAll((n,total)=>{
  const p=Math.round(n/total*100);
  bar.style.width=p+'%';pct.textContent=p+'%';
}).then(()=>{
  buildWorld();
  // the King
  window.swapHero=()=>{
    const h=ROSTER[heroKey];
    const nm=spawn(h.file,h.h);
    if(!nm)return;
    if(h.costume)addCostume(nm,h.costume);
    const na=nativeActions(nm.userData.inner,assets[h.file].animations);
    nm.traverse(m=>{if(m.isMesh)m.castShadow=true});
    if(player){nm.position.copy(player.position);nm.rotation.y=player.rotation.y;scene.remove(player)}
    scene.add(nm);
    player=nm;mixer=na.mixer;actions=na.acts;current=null;
    playAnim('Idle');
  };
  swapHero();
  lobby=true; // lights, camera — the showcase begins
  pct.textContent='ready!';
  { // build the hero picker
    const pk=document.getElementById('picker');
    for(const [k,h] of Object.entries(ROSTER)){
      const b=document.createElement('button');
      b.textContent=h.emoji+' '+h.name;
      b.style.cssText='font-size:13px;font-weight:800;padding:9px 12px;border-radius:999px;border:2px solid '+(k===heroKey?'#ffe14d':'rgba(255,255,255,.55)')+';background:'+(k===heroKey?'#ffb62e':'rgba(255,255,255,.14)')+';color:'+(k===heroKey?'#4a2c00':'#fff')+';cursor:pointer';
      b.onclick=()=>{heroKey=k;localStorage.setItem('isl_hero',k);
        for(const bb of pk.children){bb.style.borderColor='rgba(255,255,255,.55)';bb.style.background='rgba(255,255,255,.14)';bb.style.color='#fff'}
        b.style.borderColor='#ffe14d';b.style.background='#ffb62e';b.style.color='#4a2c00';
        swapHero();
      };
      pk.appendChild(b);
    }
  }
  const btn=document.getElementById('playBtn');
  document.getElementById('loadBar').style.display='none';pct.style.display='none';
  btn.style.display='block';
  btn.onclick=()=>{
    document.getElementById('title').style.opacity='0';
    setTimeout(()=>document.getElementById('title').remove(),650);
    started=true;
  };
});
loop();
</script>
