<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e916b8">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.png" sizes="32x32" type="image/png">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>KidStarClub ⭐</title>
<meta property="og:title" content="KidStarClub ⭐">
<meta property="og:description" content="Your stage. Your fans. Your club. A private video club for our stars — invite code required.">
<meta property="og:image" content="https://kidstarclub.com/share-card.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://kidstarclub.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Anton&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff2ec4; --magenta:#c4108f; --deep:#3d0330; --cyan:#45d8ff;
  --black:#0d0210; --white:#fff; --yellow:#ffe14d;
  --marker:'Permanent Marker',cursive; --block:'Anton',sans-serif; --body:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden;width:100%;overscroll-behavior-x:none}
body{overscroll-behavior-y:contain}
main{overflow-x:clip}
body{
  font-family:var(--body);color:var(--white);min-height:100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,.14) 0 1.5px, transparent 2px),
    radial-gradient(circle at 80% 30%, rgba(0,0,0,.35) 0 2px, transparent 2.5px),
    linear-gradient(160deg,#ff2ec4 0%,#c4108f 45%,#5a0645 100%);
  background-size:22px 22px,28px 28px,cover;min-height:100dvh;
}
/* halftone overlay */
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.5;
  background-image:radial-gradient(circle,rgba(13,2,16,.5) 1.2px,transparent 1.6px);
  background-size:14px 14px;mask-image:linear-gradient(120deg,transparent 40%,black 100%);
  -webkit-mask-image:linear-gradient(120deg,transparent 40%,black 100%);}
header{position:sticky;top:0;z-index:50;padding:12px 14px 10px;text-align:center;
  background:linear-gradient(180deg,rgba(13,2,16,.92),rgba(13,2,16,.78));border-bottom:3px solid var(--pink)}
.logo{display:inline-flex;flex-wrap:wrap;justify-content:center;gap:3px;text-decoration:none}
.logo span{font-family:var(--block);font-size:22px;line-height:1;padding:4px 6px;transform:rotate(-2deg)}
.logo span:nth-child(odd){background:var(--black);color:var(--white);transform:rotate(2deg)}
.logo span:nth-child(even){background:var(--white);color:var(--black)}
.logo span.star{background:var(--pink);color:var(--black)}
.logo span.cy{background:var(--cyan);color:var(--black)}
.tag{font-family:var(--marker);color:var(--cyan);font-size:13px;margin-top:4px;letter-spacing:.04em}
nav{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;justify-content:space-around;
  align-items:center;padding:8px 6px calc(10px + env(safe-area-inset-bottom));
  background:rgba(13,2,16,.96);border-top:3px solid var(--pink);
  transform:translateZ(0);will-change:transform}
nav button{background:none;border:none;color:var(--white);font-family:var(--block);
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:2px 8px;opacity:.75}
nav button .ni{font-size:22px;line-height:1}
nav button.on{opacity:1;color:var(--cyan)}
nav button.plus{width:56px;height:56px;border-radius:50%;background:var(--pink);color:var(--black);
  border:3px solid var(--white);font-size:32px;line-height:1;font-family:var(--body);font-weight:800;
  opacity:1;box-shadow:0 4px 0 rgba(13,2,16,.6);margin-top:-22px;padding:0;justify-content:center}
nav button.plus:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(13,2,16,.6)}
.sheet{position:fixed;inset:0;z-index:70;background:rgba(13,2,16,.7);display:flex;
  align-items:flex-end;justify-content:center}
.sheetin{width:100%;max-width:480px;background:var(--black);border:3px solid var(--pink);
  border-bottom:none;border-radius:18px 18px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom))}
main{max-width:640px;margin:0 auto;padding:16px 14px 90px}
.sticker{background:var(--black);border:3px solid var(--white);border-radius:14px;
  box-shadow:6px 6px 0 rgba(13,2,16,.55), 0 0 0 3px var(--pink) inset;padding:14px;margin-bottom:16px;
  transform:rotate(-.4deg)}
.sticker:nth-child(even){transform:rotate(.5deg)}
h2.scrawl{font-family:var(--marker);color:var(--yellow);font-size:20px;margin-bottom:10px;transform:rotate(-1deg)}
.vcard .vtitle{font-family:var(--block);font-size:19px;letter-spacing:.03em;color:var(--white)}
.vcard .vmeta{color:var(--cyan);font-size:13px;font-weight:800;margin:2px 0 8px}
.vcard video{width:100%;border-radius:10px;border:3px solid var(--pink);background:#000}
.thumbwrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;
  border:3px solid var(--pink);background:#000;margin-bottom:10px}
.thumbwrap img,.thumbwrap video{width:100%;height:100%;object-fit:cover;display:block}
.thumbwrap .playbtn{position:absolute;inset:0;margin:auto;width:64px;height:64px;border-radius:50%;
  background:rgba(13,2,16,.65);border:3px solid var(--white);display:flex;align-items:center;
  justify-content:center;font-size:26px;color:var(--white);pointer-events:none}
.thumbwrap .dur{position:absolute;right:8px;bottom:8px;background:rgba(13,2,16,.8);color:var(--white);
  font:800 12px var(--body);padding:2px 8px;border-radius:6px}
.statrow{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.chip{background:var(--magenta);border:2px solid var(--white);border-radius:999px;
  padding:4px 12px;font-weight:800;font-size:13px}
.chip.cy{background:#0a4c63;border-color:var(--cyan);color:var(--cyan)}
button.big{font-family:var(--block);font-size:16px;letter-spacing:.08em;text-transform:uppercase;
  background:var(--pink);color:var(--black);border:3px solid var(--white);border-radius:12px;
  padding:12px 18px;cursor:pointer;box-shadow:4px 4px 0 rgba(13,2,16,.6);width:100%}
button.big.cy{background:var(--cyan)}
button.big:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(13,2,16,.6)}
input,textarea,select{width:100%;background:#1c0a1e;border:2px solid var(--pink);border-radius:10px;
  color:var(--white);padding:12px;font-family:var(--body);font-weight:600;font-size:15px;margin-bottom:10px}
input::placeholder,textarea::placeholder{color:#b678a8}
.comment{display:flex;gap:10px;border-left:4px solid var(--cyan);padding:8px 10px;margin-bottom:10px;background:rgba(255,255,255,.05);border-radius:0 10px 10px 0}
.comment .av{flex:0 0 36px;width:36px;height:36px;border-radius:50%;background:var(--deep);
  border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-size:18px}
.comment.judge .av{border-color:var(--yellow);background:#2e2408}
.comment .cbody{flex:1;min-width:0}
.comment.judge{border-left-color:var(--yellow)}
.comment .who{font-weight:800;font-size:13px;color:var(--cyan)}
.comment.judge .who{color:var(--yellow)}
.comment .aitag{font-size:10px;border-radius:6px;padding:1px 7px;margin-left:6px;letter-spacing:.08em;
  vertical-align:middle;font-weight:800;border:1px solid}
.aitag.judgep{background:#2e2408;border-color:var(--yellow);color:var(--yellow)}
.aitag.crewp{background:#241a3a;border-color:var(--purple);color:var(--purple)}
.aitag.fanp{background:var(--deep);border-color:var(--cyan);color:var(--cyan)}
.aitag.bronze{background:#2b1a0c;border-color:#cd7f32;color:#e8a463}
.aitag.silver{background:#232328;border-color:#c0c0c0;color:#d9d9de}
.aitag.gold{background:#2e2408;border-color:#ffd700;color:#ffe14d}
.aitag.plat{background:#20242c;border-color:#9ad6e8;color:#d7f4ff}
.aitag.star{background:#3a0a2e;border-color:var(--pink);color:var(--pink)}
.aitag.hq{background:#0a2e1a;border-color:#4ade80;color:#4ade80}
/* Eliora's crew shimmer star */
.shimstar{display:inline-block;margin-left:4px;font-size:14px;
  background:linear-gradient(110deg,#ffd700 20%,#fff8c4 40%,#ffd700 60%,#e8a800 80%);
  background-size:220% 100%;-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;animation:shim 2.2s linear infinite;
  filter:drop-shadow(0 0 3px rgba(255,215,0,.7))}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-20% 0}}
@media(prefers-reduced-motion:reduce){.shimstar{animation:none}}
.comment .pending{font-size:11px;color:var(--yellow);font-style:italic}
.comment .body{font-size:14px;margin-top:2px}
.comment .reply{background:none;border:none;color:var(--pink);font-weight:800;font-size:12px;cursor:pointer;padding:2px 0}
.reacts{display:flex;gap:8px;margin:10px 0}
.reacts button{background:var(--black);border:2px solid var(--magenta);border-radius:999px;
  font-size:18px;padding:6px 12px;cursor:pointer;color:var(--white)}
.reacts button span{font-size:12px;font-weight:800;color:var(--cyan);margin-left:4px}
.starmeter{position:relative;height:26px;background:var(--black);border:2px solid var(--white);border-radius:999px;overflow:hidden;margin:8px 0}
.starmeter .fill{position:absolute;inset:0;width:0;background:linear-gradient(90deg,var(--pink),var(--cyan));transition:width .8s}
.starmeter .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--block);font-size:14px;letter-spacing:.1em;text-shadow:1px 1px 0 var(--black)}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{background:var(--deep);border:2px dashed var(--yellow);border-radius:10px;padding:8px 10px;
  font-size:12px;font-weight:800;transform:rotate(-1deg)}
.zap{position:absolute;font-size:26px;pointer-events:none;animation:zap .9s ease-out forwards}
@keyframes zap{0%{transform:scale(.4) rotate(-20deg);opacity:1}100%{transform:scale(1.8) translateY(-60px) rotate(15deg);opacity:0}}
.hide{display:none}
/* shorts */
.kindrow{display:flex;gap:8px;margin-bottom:10px}
.kbtn{flex:1;font-family:var(--block);font-size:14px;letter-spacing:.06em;background:#1c0a1e;
  color:var(--white);border:2px solid var(--magenta);border-radius:10px;padding:10px;cursor:pointer}
.kbtn.on{background:var(--cyan);color:var(--black);border-color:var(--white)}
.shortswrap{position:fixed;inset:0;top:0;background:var(--black);z-index:40;
  overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
.short{position:relative;height:100vh;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;align-items:center;justify-content:center}
.short video{height:100%;width:100%;object-fit:contain;background:var(--black)}
.short .overlay{position:absolute;left:14px;right:80px;bottom:28px;text-shadow:1px 1px 3px var(--black)}
.short .overlay .st{font-family:var(--block);font-size:18px}
.short .overlay .so{color:var(--cyan);font-weight:800;font-size:13px}
.short .rail{position:absolute;right:10px;bottom:40px;display:flex;flex-direction:column;gap:14px;align-items:center}
.short .rail button{background:rgba(13,2,16,.55);border:2px solid var(--pink);border-radius:50%;
  width:52px;height:52px;font-size:22px;cursor:pointer;color:var(--white)}
.short .rail .n{font-size:11px;font-weight:800;color:var(--white);text-shadow:1px 1px 2px var(--black)}
.short .closer{position:absolute;top:14px;left:14px;background:rgba(13,2,16,.65);border:2px solid var(--white);
  border-radius:999px;color:var(--white);font-family:var(--block);padding:8px 16px;cursor:pointer;font-size:13px}
.short .muter{position:absolute;top:14px;right:14px;background:rgba(13,2,16,.65);border:2px solid var(--cyan);
  border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;color:var(--white)}
/* studio */
.camwrap{position:relative;border-radius:12px;overflow:hidden;border:3px solid var(--pink);
  background:#000;margin-bottom:12px;aspect-ratio:9/12}
.camwrap video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
.recdot{position:absolute;top:10px;left:10px;background:rgba(13,2,16,.7);color:#ff4040;
  font:800 14px var(--body);padding:4px 12px;border-radius:999px;animation:blink 1s infinite}
@keyframes blink{50%{opacity:.35}}
.trackbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#1c0a1e;
  border:2px solid var(--magenta);border-radius:10px;color:var(--white);padding:12px;
  font:800 15px var(--body);cursor:pointer;margin-bottom:8px}
.trackbtn:active{border-color:var(--cyan)}
/* club chat */
.chatbox{height:52vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;
  padding:6px 2px;margin-bottom:10px;overscroll-behavior:contain}
.cmsg{display:flex;gap:8px;align-items:flex-start}
.cmsg .av{flex:0 0 32px;width:32px;height:32px;border-radius:50%;background:var(--deep);
  border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-size:15px}
.cmsg.judge .av{border-color:var(--yellow)}
.cmsg .bub{background:rgba(255,255,255,.06);border-radius:4px 12px 12px 12px;padding:7px 10px;max-width:82%}
.cmsg.mine{flex-direction:row-reverse}
.cmsg.mine .bub{background:#3a0a2e;border-radius:12px 4px 12px 12px}
.cmsg .cwho{font-weight:800;font-size:12px;color:var(--cyan)}
.cmsg.judge .cwho{color:var(--yellow)}
.cmsg .ctext{font-size:14px;word-break:break-word}
.cmsg img{max-width:100%;border-radius:8px;border:2px solid var(--magenta);margin-top:4px;display:block}
.cmsg .del{background:none;border:none;color:var(--pink);cursor:pointer;font-size:12px;padding:0 4px}
.emojirow{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto}
.emojirow button{background:#1c0a1e;border:2px solid var(--magenta);border-radius:8px;
  font-size:18px;padding:4px 9px;cursor:pointer}
.chatrow{display:flex;gap:8px;align-items:center}
.chatrow input[type=text],#chatIn{flex:1;margin-bottom:0}
.camlbl{font-size:22px;cursor:pointer}
.camlbl input{display:none}
.act-send{background:var(--cyan);border:2px solid var(--white);border-radius:50%;width:44px;height:44px;
  font-size:18px;color:var(--black);cursor:pointer;font-weight:800}
.mention{color:var(--cyan);font-weight:800}
.mention.me{color:var(--yellow);background:rgba(255,225,77,.15);border-radius:4px;padding:0 3px}
.mname{cursor:pointer}
.mdrop{background:var(--black);border:2px solid var(--cyan);border-radius:10px;margin-bottom:8px;
  display:flex;flex-direction:column;overflow:hidden}
.mdrop button{background:none;border:none;color:var(--white);text-align:left;padding:9px 12px;
  font:800 14px var(--body);cursor:pointer;border-bottom:1px solid var(--line,#1e2a45)}
.mdrop button:active{background:#1c2740}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chartline{font-family:var(--block);font-size:17px;letter-spacing:.05em;color:var(--yellow);
  margin:6px 0;text-shadow:2px 2px 0 rgba(13,2,16,.6)}
.chartline .panel{display:block;font-family:var(--body);font-weight:800;font-size:12px;color:var(--cyan);letter-spacing:0}
.navbadge{position:absolute;top:-4px;right:2px;background:#ff4040;color:#fff;border-radius:999px;
  min-width:18px;height:18px;font:800 11px var(--body);display:flex;align-items:center;justify-content:center;padding:0 4px}
nav button{position:relative}
/* judges rating bar */
.jbar{position:relative;height:18px;background:#14061a;border:2px solid var(--white);border-radius:999px;
  overflow:hidden;margin-top:10px}
.jbar .jfill{position:absolute;inset:0;width:0;border-radius:999px;transition:width 1s ease;
  background:linear-gradient(90deg,#45d8ff,#ff2ec4 55%,#ffe14d)}
.jbar .jlabel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--block);font-size:11px;letter-spacing:.12em;color:var(--white);
  text-shadow:1px 1px 2px var(--black)}
.jbar.warm .jfill{animation:jpulse 1.6s ease-in-out infinite}
.jbar.hot .jfill{animation:jpulse .9s ease-in-out infinite}
.jbar.hot{border-color:var(--yellow)}
.jbar.max .jfill{animation:jpulse .45s ease-in-out infinite}
.jbar.max{border-color:var(--yellow);box-shadow:0 0 14px rgba(255,225,77,.8)}
@keyframes jpulse{
  0%,100%{filter:brightness(1);box-shadow:0 0 4px rgba(255,46,196,.5)}
  50%{filter:brightness(1.5);box-shadow:0 0 18px rgba(255,225,77,.95),0 0 34px rgba(255,46,196,.7)}
}
@media(prefers-reduced-motion:reduce){.jbar .jfill{animation:none!important}}
.center{text-align:center}
.errmsg{color:var(--yellow);font-weight:800;font-size:13px;min-height:18px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <a class="logo" href="#" onclick="go('feed');return false" id="logo"></a>
  <div class="tag">your stage · your fans · your club ⚡</div>
  <nav id="nav" class="hide">
    <button data-v="feed" class="on" onclick="go('feed')"><span class="ni">🏠</span>Stage</button>
    <button data-v="shorts" onclick="go('shorts')"><span class="ni">⚡</span>Shorts</button>
    <button id="plusBtn" class="plus" onclick="showCreate()">＋</button>
    <button data-v="chat" onclick="go('chat')"><span class="ni">💬</span>Chat<span id="chatBadge" class="navbadge hide"></span></button>
    <button data-v="me" onclick="go('me')"><span class="ni">⭐</span>My Star</button>
  </nav>
  <div id="createSheet" class="sheet hide" onclick="this.classList.add('hide')">
    <div class="sheetin" onclick="event.stopPropagation()">
      <h2 class="scrawl">Create ⚡</h2>
      <button class="big" onclick="$('#createSheet').classList.add('hide');go('upload');setKind('video')">🎬 Post a video</button>
      <button class="big cy" style="margin-top:8px" onclick="$('#createSheet').classList.add('hide');go('upload');setKind('short')">⚡ Post a Short</button>
      <button class="big" style="margin-top:8px;background:var(--yellow)" onclick="$('#createSheet').classList.add('hide');go('studio')">🎤 Studio session</button>
    </div>
  </div>
</header>
<main>
  <!-- LOGIN / JOIN -->
  <section id="v-auth" class="hide">
    <div class="sticker">
      <h2 class="scrawl">Sign in to the club</h2>
      <input id="au" placeholder="username" autocomplete="username">
      <input id="ap" type="password" placeholder="password" autocomplete="current-password">
      <button class="big" onclick="login()">Let me in! ⭐</button>
      <div class="errmsg" id="aerr"></div>
    </div>
    <div class="sticker">
      <h2 class="scrawl">Got an invite code?</h2>
      <input id="jc" placeholder="invite code">
      <input id="jn" placeholder="your name (what fans will see)">
      <input id="ju" placeholder="pick a username">
      <input id="jp" type="password" placeholder="pick a password">
      <button class="big cy" onclick="join()">Join the club 🎤</button>
      <div class="errmsg" id="jerr"></div>
    </div>
  </section>

  <!-- FEED -->
  <section id="v-feed" class="hide"></section>

  <!-- SHORTS -->
  <section id="v-shorts" class="hide"><div id="shortsWrap" class="shortswrap"></div></section>

  <!-- SINGLE VIDEO -->
  <section id="v-video" class="hide"></section>

  <!-- UPLOAD -->
  <section id="v-upload" class="hide">
    <div class="sticker">
      <h2 class="scrawl">Drop a new video 🎬</h2>
      <div class="kindrow">
        <button type="button" id="kv" class="kbtn on" onclick="setKind('video')">🎬 Video</button>
        <button type="button" id="ks" class="kbtn" onclick="setKind('short')">⚡ Short</button>
      </div>
      <input id="ut" placeholder="video title — make it POP" maxlength="120">
      <textarea id="ud" rows="2" placeholder="tell your fans about it (optional)" maxlength="500"></textarea>
      <input id="uf" type="file" accept="video/*">
      <button class="big" id="ubtn" onclick="upload()">Post it! ⚡</button>
      <div class="errmsg" id="uerr"></div>
    </div>
  </section>

  <!-- STUDIO -->
  <section id="v-studio" class="hide">
    <div id="studioPick"></div>
    <div id="studioRec" class="hide">
      <div class="sticker">
        <h2 class="scrawl" id="recSong">🎤 Studio</h2>
        <div class="camwrap"><video id="cam" autoplay muted playsinline></video>
          <div id="recDot" class="recdot hide">● REC</div></div>
        <audio id="backing"></audio>
        <button class="big" id="recBtn" onclick="recToggle()">🔴 Record</button>
        <button class="big cy" style="margin-top:8px" onclick="studioBack()">← Pick a different song</button>
      </div>
      <div id="recReview" class="sticker hide">
        <h2 class="scrawl">How'd it go? 🌟</h2>
        <video id="playback" controls playsinline style="width:100%;border-radius:10px;border:3px solid var(--pink)"></video>
        <input id="recTitle" placeholder="name your performance ⭐" maxlength="120" style="margin-top:10px">
        <button class="big" id="recPost" onclick="postRecording()">Post as Short ⚡</button>
        <button class="big cy" style="margin-top:8px" onclick="retake()">🔁 Retake</button>

const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ago=d=>{const m=(Date.now()-new Date(d))/60000;
  return m<1?'just now':m<60?Math.floor(m)+' min ago':m<1440?Math.floor(m/60)+'h ago':Math.floor(m/1440)+'d ago'};
const fdate=d=>new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
async function api(url,opts={}){
  const r=await fetch(url,{headers:{'content-type':'application/json'},...opts,
    body:opts.body&&!(opts.body instanceof Blob)?JSON.stringify(opts.body):opts.body});
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||'Something went wrong.');

}
// ransom-note logo

let shortsObserver=null;
function stopShorts(){
  document.querySelectorAll('#shortsWrap video').forEach(v=>v.pause());
  if(shortsObserver){shortsObserver.disconnect();shortsObserver=null}
  $('#shortsWrap').innerHTML='';
}
let shortsMuted=true;
async function shorts(){
  const vids=await api('/api/feed?kind=short');
  const wrap=$('#shortsWrap');
  if(!vids.length){
    wrap.innerHTML=`<div class="short"><div class="sticker center" style="max-width:320px">
      <h2 class="scrawl">No shorts yet ⚡</h2><p>Tap Post → Short and film one right now!</p>
      <button class="big" style="margin-top:10px" onclick="go('upload');setKind('short')">Make a Short 🎥</button>
      <button class="big cy" style="margin-top:8px" onclick="go('feed')">Back to Stage</button></div></div>`;
    return;
  }
  wrap.innerHTML=vids.map(v=>`
    <div class="short" data-vid="${v.id}">
      <video src="/api/videos/${v.id}/stream" playsinline muted preload="metadata"
        onended="api('/api/videos/${v.id}/view',{method:'POST'}).catch(()=>{});this.currentTime=0;this.play()"
        onclick="this.paused?this.play():this.pause()"></video>
      <button class="closer" onclick="go('feed')">✕ Stage</button>
      <button class="muter" onclick="toggleMute(event)">🔇</button>
      <div class="overlay">
        <div class="st">${esc(v.title)}</div>

      </div>
    </div>`).join('');
  const seenShorts=new Set();
  shortsObserver=new IntersectionObserver(es=>es.forEach(e=>{
    const vid=e.target.querySelector('video');

      vid.muted=shortsMuted;vid.play().catch(()=>{});
      const sid=e.target.dataset.vid;
      if(sid&&!seenShorts.has(sid)){seenShorts.add(sid);
        api(`/api/videos/${sid}/view`,{method:'POST'}).catch(()=>{})}
    }else vid.pause();
  }),{root:wrap,threshold:.6});

let livePoll=null,liveVideoId=null,liveCount=0;
function stopPoll(){if(livePoll){clearInterval(livePoll);livePoll=null;liveVideoId=null}}
async function openVideo(id){
  stopPoll();
  go('video');
  const v=await api('/api/videos/'+id);
  const cms=await api(`/api/videos/${id}/comments`);
  const rx=Object.fromEntries((v.reactions||[]).map(r=>[r.kind,r.n]));
  const rbtn=(k,e)=>`<button onclick="react(${id},'${k}',event)">${e}<span>${rx[k]||0}</span></button>`;
  $('#v-video').innerHTML=`
    <div class="sticker vcard">
      <div class="vtitle">${esc(v.title)}</div>
      <div class="vmeta">${esc(v.owner_name)} · ${esc(v.channel_name)}</div>
      <div class="vmeta" style="color:#b678a8">👁 <span id="viewN">${v.views||0}</span> views · posted ${fdate(v.created_at)}
        <span class="chip" id="hypeChip" style="margin-left:8px">⚡ HYPE <span id="hypeN">0</span></span></div>
      <div class="chartline">📈 CHART SCORE <span id="chartN">${v.chart_score||0}</span>
        ${v.judge_count?`<span class="panel">panel: ${v.avg_score.toFixed(1)}/10 · ×${Math.max(1,Math.round(v.avg_score*v.avg_score))} multiplier</span>`:'<span class="panel">judges are still voting…</span>'}</div>
      ${jbarHtml(v.avg_score)}

          onclick="event.stopPropagation();toggleSub(${v.channel_id},${v.i_subscribe},${id})">
          ${v.i_subscribe?'✓ Subscribed':'⭐ Subscribe'}</button>`:''}
      <button class="reply" style="font-size:13px" onclick="event.stopPropagation();showFans(${v.channel_id},'${esc(v.channel_name).replace(/'/g,"\\'")}')">
        👥 ${v.subscriber_count} fan${v.subscriber_count===1?'':'s'} subscribed — see who</button>
      <video id="mainvid" controls playsinline src="/api/videos/${id}/stream"></video>
      ${v.description?`<p style="margin-top:8px">${esc(v.description)}</p>`:''}
      <div class="reacts">${rbtn('star','⭐')}${rbtn('fire','🔥')}${rbtn('clap','👏')}${rbtn('heart','💜')}${rbtn('wow','🤩')}</div>
    </div>
    <div class="sticker">
      <h2 class="scrawl">The club says…</h2>
      <div id="cms">${cms.map(c=>commentHtml(c)).join('')||'<p>The crowd is arriving… check back soon! 🎪</p>'}</div>
      <textarea id="cb" rows="2" placeholder="say something nice…" maxlength="500"></textarea>
      <input type="hidden" id="cparent">
      <div id="replyhint" class="errmsg"></div>
      <button class="big cy" onclick="postComment(${id})">Send 💬</button>
      <div class="errmsg" id="cerr"></div>
    </div>`;
  // HYPE = every cheer + comment (cast + humans), weighted. Views = real plays.
  const hype0=(v.reactions||[]).reduce((s,r)=>s+r.n,0)+cms.length*2;
  $('#hypeN').textContent=hype0;
  let viewed=false,lastViews=v.views||0,lastHype=hype0;
  $('#mainvid').addEventListener('play',async()=>{
    if(viewed)return;viewed=true;
    const r=await api(`/api/videos/${id}/view`,{method:'POST'}).catch(()=>null);
    if(r){countUp('#viewN',lastViews,r.views);
      for(const m of MILESTONES)if(lastViews<m&&r.views>=m)burst(r.views>=1000?'storm':'pop');
      lastViews=r.views}
  });
  // Every full rewatch counts as a fresh view — TikTok rules.
  $('#mainvid').addEventListener('ended',()=>{viewed=false});
  liveVideoId=id;liveCount=cms.length;
  livePoll=setInterval(async()=>{
    if(document.hidden||liveVideoId!==id)return;
    const [fresh,vf]=await Promise.all([
      api(`/api/videos/${id}/comments`).catch(()=>null),
      api(`/api/videos/${id}`).catch(()=>null)]);
    if(vf){
      if(vf.views>lastViews){
        countUp('#viewN',lastViews,vf.views);
        for(const m of MILESTONES)if(lastViews<m&&vf.views>=m)burst(m>=1000?'storm':'pop');
        lastViews=vf.views;
      }
      const cEl=$('#chartN');
      if(cEl&&vf.chart_score>parseInt(cEl.textContent||'0')){
        countUp('#chartN',parseInt(cEl.textContent||'0'),vf.chart_score);
        for(const m of MILESTONES)if(parseInt(cEl.textContent||'0')<m&&vf.chart_score>=m&&m>=1000)burst('storm');
      }
      const hy=(vf.reactions||[]).reduce((s,r)=>s+r.n,0)+(fresh?fresh.length*2:lastHype);
      if(hy>lastHype){countUp('#hypeN',lastHype,hy);lastHype=hy;
        $('#hypeChip')?.animate([{transform:'scale(1)'},{transform:'scale(1.25)'},{transform:'scale(1)'}],{duration:400})}
    }
    if(fresh&&fresh.length!==liveCount){
      liveCount=fresh.length;
      const box=$('#cms');if(!box)return;
      box.innerHTML=fresh.map(c=>commentHtml(c)).join('');
      box.lastElementChild?.animate([{background:'rgba(69,216,255,.35)'},{background:'transparent'}],{duration:1200});
    }
  },15000);
}
const MILESTONES=[10,25,50,100,250,500,1000,2500,5000];
function countUp(sel,from,to){
  const el=$(sel);if(!el)return;
  const steps=Math.min(20,to-from)||1,dur=700;let i=0;
  const t=setInterval(()=>{i++;el.textContent=Math.round(from+(to-from)*(i/steps));
    if(i>=steps){el.textContent=to;clearInterval(t)}},dur/steps);
}
function burst(mode='pop'){
  const n=mode==='storm'?44:14;
  if(mode==='storm'){
    const flash=document.createElement('div');
    flash.style.cssText='position:fixed;inset:0;z-index:80;pointer-events:none;background:#fff';
    document.body.appendChild(flash);
    flash.animate([{opacity:.9},{opacity:0}],{duration:500,easing:'ease-out'});
    setTimeout(()=>flash.remove(),520);
    if(navigator.vibrate)navigator.vibrate([60,40,60,40,120]);
  }
  for(let i=0;i<n;i++){
    const z=document.createElement('div');z.className='zap';
    z.textContent=mode==='storm'?'⚡':['⚡','⭐','🎉','💫'][i%4];
    z.style.left=(5+Math.random()*90)+'vw';z.style.top=(5+Math.random()*70)+'vh';
    z.style.position='fixed';z.style.zIndex=81;
    z.style.fontSize=mode==='storm'?(28+Math.random()*34)+'px':'26px';
    z.style.animationDelay=(Math.random()*(mode==='storm'?.8:.2))+'s';
    document.body.appendChild(z);
    setTimeout(()=>z.remove(),mode==='storm'?1800:900);
  }
}

function pillHtml(c){

let uploadKind='video';
function setKind(k){
  uploadKind=k;
  $('#kv').classList.toggle('on',k==='video');

  $('#ut').placeholder=k==='short'?'short title — quick and catchy ⚡':'video title — make it POP';

// Grab a frame ~1s in (or 10% of duration) as a JPEG thumbnail.
function captureThumb(file){
  return new Promise(resolve=>{
    const v=document.createElement('video');
    v.preload='metadata';v.muted=true;v.playsInline=true;
    v.src=URL.createObjectURL(file);
    const bail=setTimeout(()=>resolve(null),8000);
    v.onloadedmetadata=()=>{v.currentTime=Math.min(1,(v.duration||10)*0.1)};
    v.onseeked=()=>{
      try{
        const c=document.createElement('canvas');
        const w=640,h=Math.round(640*(v.videoHeight/v.videoWidth))||360;
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(v,0,0,w,h);
        c.toBlob(b=>{clearTimeout(bail);URL.revokeObjectURL(v.src);resolve(b)},'image/jpeg',.82);
      }catch(e){clearTimeout(bail);resolve(null)}
    };
    v.onerror=()=>{clearTimeout(bail);resolve(null)};
  });
}
async function upload(){
  const f=$('#uf').files[0], t=$('#ut').value.trim();
  if(!f||!t){$('#uerr').textContent='Need a title and a video!';return}
  if(f.size>5*1024*1024*1024){$('#uerr').textContent='Whoa — 5GB max per video. Trim it a little!';return}
  $('#ubtn').disabled=true;$('#uerr').textContent='';
  try{
    // 1) presign
    const p=await api('/api/videos/presign',{method:'POST',
      body:{title:t,description:$('#ud').value.trim(),kind:uploadKind}});
    // 2) direct PUT to bucket with progress
    await new Promise((res,rej)=>{
      const x=new XMLHttpRequest();
      x.open('PUT',p.put_url);
      x.setRequestHeader('content-type',f.type||'video/mp4');
      x.upload.onprogress=e=>{if(e.lengthComputable)
        $('#ubtn').textContent=`Uploading… ${Math.round(e.loaded/e.total*100)}% 🚀`};
      x.onload=()=>x.status>=200&&x.status<300?res():rej(new Error('Storage upload failed ('+x.status+').'));
      x.onerror=()=>rej(new Error('Network error during upload — try again.'));
      x.send(f);
    });
    // 3) thumbnail (best-effort — feed falls back to a video frame if this fails)
    try{
      const tb=await captureThumb(f);
      if(tb&&p.thumb_put_url)
        await fetch(p.thumb_put_url,{method:'PUT',headers:{'content-type':'image/jpeg'},body:tb});
    }catch(e){}
    // 4) go live
    await api(`/api/videos/${p.video_id}/complete`,{method:'POST'});
    $('#ut').value='';$('#ud').value='';$('#uf').value='';
    alert(uploadKind==='short'?'⚡ Short posted! The club is on its way!':'🎉 Posted! The club is on its way — cheers and comments will roll in all day. Check back!');
    go(uploadKind==='short'?'shorts':'feed');
  }catch(e){$('#uerr').textContent=e.message}
  finally{$('#ubtn').disabled=false;$('#ubtn').textContent='Post it! ⚡'}
}

    <input id="pfName" value="${esc(ME.display_name)}" maxlength="40" placeholder="screen name">
    <button class="big" onclick="saveName()">Save name ⭐</button>
    <button class="big" style="margin-top:8px;background:#444;color:#fff" onclick="logout()">👋 Sign out</button>
    <div class="errmsg" id="pfErr"></div>
  </div>`;
  if(!mine.length){$('#v-me').innerHTML=profileCard+'<div class="sticker center"><h2 class="scrawl">Your stage awaits 🎬</h2><p>Hit the ＋ button and post your first video!</p></div>';return}
  let html=profileCard;
  for(const c of mine){
    const badges=await api(`/api/channels/${c.id}/badges`);
    const fans=await api(`/api/channels/${c.id}/subscribers`).catch(()=>[]);
    const pct=Math.min(100,(c.star_meter%500)/5);
    html+=`<div class="sticker">
      <h2 class="scrawl">${esc(c.name)} ⭐</h2>
      <div class="starmeter"><div class="fill" style="width:${pct}%"></div>
        <div class="num">STAR METER · ${c.star_meter} ⭐</div></div>
      <div class="statrow"><span class="chip">🎬 ${c.video_count} videos</span>
        <span class="chip cy">Level ${Math.floor(c.star_meter/500)+1}</span>
        <span class="chip">👥 ${fans.length} fan${fans.length===1?'':'s'}</span></div>
      <h2 class="scrawl" style="margin-top:14px;font-size:16px">Your Fan Club 👥</h2>
      <div class="badges">${fans.map(f=>`<span class="badge">${esc(f.avatar_emoji||'⭐')} ${esc(f.display_name)}${shim(f)}</span>`).join('')
        ||'<span class="badge">Tell the family to smash that Subscribe button!</span>'}</div>
      <h2 class="scrawl" style="margin-top:14px;font-size:16px">Trophy shelf</h2>
      <div class="badges">${badges.map(b=>`<span class="badge">${esc(b.emoji)} ${esc(b.label)}</span>`).join('')||'<span class="badge">🎬 Post your first video to earn badges!</span>'}</div>
    </div>`;
  }
  $('#v-me').innerHTML=html;
}

// ---- STUDIO (karaoke record-over-a-song) ----
let camStream=null,recorder=null,recChunks=[],recBlob=null,currentTrack=null;
function stopStudio(){
  try{recorder?.state==='recording'&&recorder.stop()}catch(e){}
  camStream?.getTracks().forEach(t=>t.stop());camStream=null;recorder=null;
  const b=$('#backing');if(b){b.pause();b.removeAttribute('src')}
}
async function studio(){
  stopStudio();
  $('#studioRec').classList.add('hide');
  const tracks=await api('/api/tracks').catch(()=>[]);
  const isAdmin=ME.role==='admin';
  $('#studioPick').innerHTML=`<div class="sticker">
    <h2 class="scrawl">🎤 Pick your song</h2>
    ${tracks.map(t=>`<button class="trackbtn" onclick="pickTrack(${t.id},'${esc(t.title).replace(/'/g,"\\'")}')">🎵 <span>${esc(t.title)}</span></button>`).join('')
      ||'<p>No songs in the library yet — ask the club admin to add some! 🎶</p>'}
    ${isAdmin?`<h2 class="scrawl" style="margin-top:14px;font-size:16px">Add a song (admin)</h2>
      <input id="tkTitle" placeholder="song title">
      <input id="tkFile" type="file" accept="audio/*">
      <button class="big cy" id="tkBtn" onclick="addTrack()">Add to library 🎶</button>
      <div class="errmsg" id="tkErr"></div>`:''}
  </div>`;
}
async function addTrack(){
  const f=$('#tkFile').files[0],t=$('#tkTitle').value.trim();
  if(!f||!t){$('#tkErr').textContent='Need a title and an audio file.';return}
  $('#tkBtn').disabled=true;
  try{
    const p=await api('/api/tracks/presign',{method:'POST',body:{title:t}});
    const r=await fetch(p.put_url,{method:'PUT',headers:{'content-type':f.type||'audio/mpeg'},body:f});
    if(!r.ok)throw new Error('Audio upload failed.');
    await api(`/api/tracks/${p.track_id}/complete`,{method:'POST'});
    studio();
  }catch(e){$('#tkErr').textContent=e.message}
  finally{$('#tkBtn').disabled=false}
}
async function pickTrack(id,title){
  currentTrack={id,title};
  $('#studioPick').innerHTML='';
  $('#studioRec').classList.remove('hide');
  $('#recReview').classList.add('hide');
  $('#recSong').textContent='🎤 '+title;
  try{
    camStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user'},
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    $('#cam').srcObject=camStream;
  }catch(e){alert('Camera/mic permission needed for the Studio! '+e.message);studioBack();return}
  $('#backing').src=`/api/tracks/${id}/stream`;
}
function studioBack(){stopStudio();studio()}
function recToggle(){
  if(recorder&&recorder.state==='recording'){recorder.stop();return}
  const mime=['video/mp4','video/webm;codecs=vp9,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'';
  recChunks=[];
  recorder=new MediaRecorder(camStream,mime?{mimeType:mime}:{});
  recorder.ondataavailable=e=>e.data.size&&recChunks.push(e.data);
  recorder.onstop=()=>{
    $('#backing').pause();$('#backing').currentTime=0;
    $('#recDot').classList.add('hide');$('#recBtn').textContent='🔴 Record';
    recBlob=new Blob(recChunks,{type:recorder.mimeType||'video/mp4'});
    $('#playback').src=URL.createObjectURL(recBlob);
    $('#recTitle').value=currentTrack?`Singing "${currentTrack.title}" 🎤`:'';
    $('#recReview').classList.remove('hide');
    $('#recReview').scrollIntoView({behavior:'smooth'});
  };
  $('#backing').currentTime=0;$('#backing').play();
  recorder.start();
  $('#recDot').classList.remove('hide');$('#recBtn').textContent='⏹ Stop';
}
function retake(){$('#recReview').classList.add('hide');recBlob=null}
async function postRecording(){
  const t=$('#recTitle').value.trim();
  if(!recBlob||!t){$('#recErr').textContent='Give your performance a title!';return}
  $('#recPost').disabled=true;
  try{
    const p=await api('/api/videos/presign',{method:'POST',body:{title:t,description:currentTrack?`🎤 Studio session — "${currentTrack.title}"`:'',kind:'short'}});
    await new Promise((res,rej)=>{
      const x=new XMLHttpRequest();x.open('PUT',p.put_url);
      x.setRequestHeader('content-type',recBlob.type||'video/mp4');
      x.upload.onprogress=e=>{if(e.lengthComputable)$('#recPost').textContent=`Uploading… ${Math.round(e.loaded/e.total*100)}% 🚀`};
      x.onload=()=>x.status<300?res():rej(new Error('Upload failed ('+x.status+')'));
      x.onerror=()=>rej(new Error('Network error — try again.'));
      x.send(recBlob);
    });
    try{
      const tb=await captureThumb(recBlob);
      if(tb&&p.thumb_put_url)await fetch(p.thumb_put_url,{method:'PUT',headers:{'content-type':'image/jpeg'},body:tb});
    }catch(e){}
    await api(`/api/videos/${p.video_id}/complete`,{method:'POST'});
    stopStudio();
    alert('⚡ Performance posted! The club is on its way!');
    go('shorts');
  }catch(e){$('#recErr').textContent=e.message}
  finally{$('#recPost').disabled=false;$('#recPost').textContent='Post as Short ⚡'}
}

async function saveName(){
  try{
    const r=await api('/api/profile',{method:'POST',body:{display_name:$('#pfName').value}});
    ME.display_name=r.display_name;$('#pfErr').textContent='Saved! ⭐';meView();
  }catch(e){$('#pfErr').textContent=e.message}
}
async function saveAvatar(){
  const f=$('#avFile').files[0];if(!f)return;
  $('#pfErr').textContent='Uploading photo…';
  try{
    const p=await api('/api/profile/avatar-presign',{method:'POST'});
    const r=await fetch(p.put_url,{method:'PUT',headers:{'content-type':f.type||'image/jpeg'},body:f});
    if(!r.ok)throw new Error('Photo upload failed.');
    await api('/api/profile/avatar-complete',{method:'POST',body:{image_key:p.image_key}});
    ME.has_avatar=true;$('#pfErr').textContent='';meView();
  }catch(e){$('#pfErr').textContent=e.message}
}
async function logout(){await api('/api/logout',{method:'POST'});location.reload()}

// ---- CLUB CHAT ----
let chatPoll=null,chatLastId=0;
function stopChat(){if(chatPoll){clearInterval(chatPoll);chatPoll=null}}
let MENTIONABLES=[];
function renderMentions(text){
  let html=esc(text);
  // longest names first so "DJ Nova" wins over "DJ"
  const names=[...MENTIONABLES].sort((a,b)=>b.name.length-a.name.length);
  for(const m of names){
    const pat=new RegExp('@'+m.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    const self=m.name===ME.display_name;
    html=html.replace(pat,`<span class="mention ${self?'me':''}">@${esc(m.name)}</span>`);
  }
  return html;
}
function chatMsgHtml(m){
  const isCast=!!m.cast_name;
  const judge=m.cast_tier==='judge';
  const mine=!isCast&&m.user_name===ME.display_name;
  const who=isCast?`${esc(m.cast_name)}${judge?' · '+esc(m.specialty||''):''}`:esc(m.user_name);
  return `<div class="cmsg ${judge?'judge':''} ${mine?'mine':''}" data-id="${m.id}">
    ${avHtml(m)}
    <div class="bub">
      <div class="cwho"><span class="mname" onclick="tagUser('${esc(isCast?m.cast_name:m.user_name).replace(/'/g,"\\'")}')">${who}</span>${isCast?'':shim(m)}${pillHtml(m)}
        ${ME.role==='admin'?`<button class="del" onclick="delChat(${m.id})">✕</button>`:''}</div>
      ${m.body?`<div class="ctext">${renderMentions(m.body)}</div>`:''}
      ${m.has_image?`<img src="/api/chat/${m.id}/image" loading="lazy">`:''}
    </div></div>`;
}
function tagUser(name){$('#chatIn').value=($('#chatIn').value+' @'+name+' ').replace(/^ /,'');$('#chatIn').focus()}
async function chat(){
  stopChat();chatLastId=0;
  MENTIONABLES=await api('/api/chat/mentionables').catch(()=>[]);
  const msgs=await api('/api/chat').catch(()=>[]);
  const box=$('#chatBox');
  box.innerHTML=msgs.map(chatMsgHtml).join('')||'<p style="color:#b678a8">Say hi — the club is listening! 👋</p>';
  if(msgs.length){chatLastId=msgs[msgs.length-1].id;setChatSeen(chatLastId)}
  box.scrollTop=box.scrollHeight;
  chatPoll=setInterval(async()=>{
    if(document.hidden)return;
    const fresh=await api('/api/chat?after='+chatLastId).catch(()=>[]);
    if(!fresh.length)return;
    chatLastId=fresh[fresh.length-1].id;setChatSeen(chatLastId);
    const nearBottom=box.scrollHeight-box.scrollTop-box.clientHeight<120;
    box.insertAdjacentHTML('beforeend',fresh.map(chatMsgHtml).join(''));
    if(nearBottom)box.scrollTop=box.scrollHeight;
  },5000);
}
function mentionHint(inp){
  const drop=$('#mentionDrop');
  const m=inp.value.match(/@([\w ]{0,20})$/);
  if(!m){drop.classList.add('hide');return}
  const q=m[1].toLowerCase();
  const hits=MENTIONABLES.filter(x=>x.name.toLowerCase().startsWith(q)&&x.name!==ME.display_name).slice(0,6);
  if(!hits.length){drop.classList.add('hide');return}
  drop.innerHTML=hits.map(h=>`<button onclick="pickMention('${esc(h.name).replace(/'/g,"\\'")}')">
    ${esc(h.emoji||'⭐')} ${esc(h.name)} ${h.kind==='cast'?'<span class="aitag fanp">🤖 AI</span>':''}</button>`).join('');
  drop.classList.remove('hide');
}
function pickMention(name){
  const inp=$('#chatIn');
  inp.value=inp.value.replace(/@[\w ]{0,20}$/,'@'+name+' ');
  $('#mentionDrop').classList.add('hide');inp.focus();
}
async function sendChat(){
  const t=$('#chatIn').value.trim();if(!t)return;
  $('#chatIn').value='';$('#mentionDrop').classList.add('hide');
  try{await api('/api/chat',{method:'POST',body:{body:t}});
    const fresh=await api('/api/chat?after='+chatLastId);
    if(fresh.length){chatLastId=fresh[fresh.length-1].id;
      $('#chatBox').insertAdjacentHTML('beforeend',fresh.map(chatMsgHtml).join(''));
      $('#chatBox').scrollTop=$('#chatBox').scrollHeight}
  }catch(e){$('#chatErr').textContent=e.message}
}
async function sendChatImage(){
  const f=$('#chatImg').files[0];if(!f)return;
  $('#chatErr').textContent='Sending photo… 📷';
  try{
    const p=await api('/api/chat/presign-image',{method:'POST'});
    const r=await fetch(p.put_url,{method:'PUT',headers:{'content-type':f.type||'image/jpeg'},body:f});
    if(!r.ok)throw new Error('Photo upload failed.');
    await api('/api/chat',{method:'POST',body:{body:$('#chatIn').value.trim(),image_key:p.image_key}});
    $('#chatIn').value='';$('#chatImg').value='';$('#chatErr').textContent='';
    chat();
  }catch(e){$('#chatErr').textContent=e.message}
}
async function delChat(id){
  if(!confirm('Remove this message for everyone?'))return;
  await api(`/api/admin/chat/${id}/remove`,{method:'POST',body:{}});
  document.querySelector(`.cmsg[data-id="${id}"]`)?.remove();
}

// ---- Chat notifications: badge + bing! ----
let audioCtx=null,chatSeenId=parseInt(localStorage.getItem('ksc_chat_seen')||'0'),chatUnread=0;
addEventListener('pointerdown',()=>{if(!audioCtx)try{audioCtx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}},{once:true});
function bing(){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime;
    [[880,0],[1318.5,.12]].forEach(([f,dt])=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.001,t+dt);
      g.gain.exponentialRampToValueAtTime(0.25,t+dt+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.5);
      o.connect(g);g.connect(audioCtx.destination);
      o.start(t+dt);o.stop(t+dt+0.55);
    });
  }catch(e){}
}
function setChatSeen(id){chatSeenId=Math.max(chatSeenId,id);localStorage.setItem('ksc_chat_seen',chatSeenId);
  chatUnread=0;$('#chatBadge').classList.add('hide')}
setInterval(async()=>{
  if(!ME||document.hidden)return;
  const inChat=!$('#v-chat').classList.contains('hide');
  const r=await api('/api/chat/latest').catch(()=>null);
  if(!r)return;
  if(inChat){setChatSeen(r.id);return}
  if(r.id>chatSeenId){
    const fresh=r.id-chatSeenId;
    if(fresh>chatUnread)bing();
    chatUnread=fresh;
    const b=$('#chatBadge');b.textContent=fresh>9?'9+':fresh;b.classList.remove('hide');
  }
},20000);

boot();
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
