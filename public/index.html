<style>
/* (all your original styles remain exactly the same) */
:root{--pink:#ff2ec4;--magenta:#c4108f;--deep:#3d0330;--cyan:#45d8ff;--black:#0d0210;--white:#fff;--yellow:#ffe14d;--marker:'Permanent Marker',cursive;--block:'Anton',sans-serif;--body:'Nunito',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{overflow-x:clip}body{overflow-x:clip}main{overflow-x:clip}
body{font-family:var(--body);color:var(--white);min-height:100vh;background:radial-gradient(circle at 20% 10%, rgba(255,255,255,.14) 0 1.5px, transparent 2px), radial-gradient(circle at 80% 30%, rgba(0,0,0,.35) 0 2px, transparent 2.5px), linear-gradient(160deg,#ff2ec4 0%,#c4108f 45%,#5a0645 100%);background-size:22px 22px,28px 28px,cover;min-height:100dvh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.5;background-image:radial-gradient(circle,rgba(13,2,16,.5) 1.2px,transparent 1.6px);background-size:14px 14px;mask-image:linear-gradient(120deg,transparent 40%,black 100%);-webkit-mask-image:linear-gradient(120deg,transparent 40%,black 100%)}
header{position:sticky;top:0;z-index:50;padding:12px 14px 10px;text-align:center;background:linear-gradient(180deg,rgba(13,2,16,.92),rgba(13,2,16,.78));border-bottom:3px solid var(--pink)}
/* (rest of your original CSS stays unchanged) */
</style>
</head>
<body>
<header>
  <a class="logo" href="#" onclick="go('feed');return false" id="logo"></a>
  <div class="tag">your stage · your fans · your club ⚡</div>
  <nav id="nav" class="hide">
    <button data-v="feed" class="on" onclick="go('feed')"><span class="ni" data-ic="stage"></span>Stage</button>
    <button data-v="arcade" onclick="go('arcade')"><span class="ni" data-ic="game"></span>Arcade</button>
    <button id="plusBtn" class="plus" onclick="showCreate()"><span data-ic="plus"></span></button>
    <button data-v="chat" onclick="go('chat')"><span class="ni" data-ic="chat"></span>Chat<span id="chatBadge" class="navbadge hide"><b></b></span></button>
    <button data-v="me" onclick="go('me')"><span class="ni" data-ic="star"></span>My Star</button>
  </nav>
</header>
<main>
  <!-- all your original sections stay exactly the same until the Puppy Park -->
  <!-- ... -->

  <!-- ARCADE / PUPPY PARK - FULLY UPDATED TROPICAL JUNGLE -->
  <section id="v-arcade" class="hide">
    <div id="arcadeHub"></div>
    <div id="gameHost" class="hide">
      <div class="sticker gamestage">
        <div class="gamehead">
          <button class="act-mini" onclick="arcade()">← Arcade</button>
          <h2 class="scrawl" id="gameTitle" style="margin:0"></h2>
        </div>
        <div id="gameArea" style="position:relative"></div>
      </div>
    </div>
  </section>

  <!-- the rest of your file stays the same -->
</main>

<script>
// all your original scripts stay the same until the Puppy Park section

// ==================== FIXED TROPICAL PUPPY PARK ====================
function hpNew(){ /* your original hoops code stays here */ }

// the big tropical upgrade
const gltfLoader = new THREE.GLTFLoader ? new THREE.GLTFLoader() : null;
if(gltfLoader){
  const dracoLoader = new THREE.DRACOLoader();
  dracoLoader.setDecoderPath('/vendor/');
  gltfLoader.setDRACOLoader(dracoLoader);
}

// Tropical environment
scene.fog = new THREE.FogExp2(0x88ddff, 0.0085);
scene.background = new THREE.Color(0x77bbff);

const sunLight = new THREE.DirectionalLight(0xffeecc, 1.4);
sunLight.position.set(25, 48, 32);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0xaaccff, 0.65));

const waterGeo = new THREE.PlaneGeometry(160, 160);
const waterMat = new THREE.MeshPhongMaterial({color: 0x3399ff, shininess: 14, transparent: true, opacity: 0.78});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = 0.12;
scene.add(water);

function placeAsset(url, x, y, z, scale = 1, rotY = 0) {
  if(!gltfLoader) return;
  gltfLoader.load(url, gltf => {
    const m = gltf.scene;
    m.position.set(x, y, z);
    m.scale.setScalar(scale);
    m.rotation.y = rotY;
    scene.add(m);
  });
}

// Your beautiful jungle
placeAsset('/assets/SM_Env_Volcano_01.glb', 0, 0, -12, 1.2);
placeAsset('/assets/SM_Env_Rock_Cliff_01.glb', -15, 0, 5, 1.35);
placeAsset('/assets/SM_Env_Rock_Cliff_02.glb', 16, 0, -15, 1.25);
placeAsset('/assets/SM_Env_Tree_Palm_01.glb', -7, 0.5, 9, 1.45);
placeAsset('/assets/SM_Env_Tree_Palm_02.glb', 10, 0.4, -7, 1.35);
placeAsset('/assets/SM_Env_Tree_Palm_03.glb', -17, 0.5, -19, 1.55);
placeAsset('/assets/SM_Env_Bush_Palm_01.glb', 5, 0.65, 12, 1.65);
placeAsset('/assets/SM_Env_Bush_Tropical_01.glb', -10, 0.45, 15, 1.85);
placeAsset('/assets/SM_Env_Dock_01.glb', -21, 0.22, -5, 1.12, Math.PI*0.92);
placeAsset('/assets/SM_Prop_Coral_03.glb', 8, 0.12, 19, 1.5);
placeAsset('/assets/SM_Env_Flowers_01.glb', 3, 0.85, 6, 1.25);

// Animation updates — add to your loop
water.position.y = 0.12 + Math.sin(Date.now() * 0.0016) * 0.095;
water.material.opacity = 0.76 + Math.sin(Date.now() * 0.0021) * 0.055;

// rest of your script stays exactly the same
</script>
</body>
</html>
