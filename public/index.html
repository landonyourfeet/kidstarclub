<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e916b8">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.png" sizes="32x32" type="image/png">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>KidStarClub ⭐</title>
<meta property="og:title" content="KidStarClub ⭐">
<meta property="og:description" content="Your stage. Your fans. Your club. A private video club for our stars — invite code required.">
<meta property="og:image" content="https://kidstarclub.com/share-card.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://kidstarclub.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Anton&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff2ec4; --magenta:#c4108f; --deep:#3d0330; --cyan:#45d8ff;
  --black:#0d0210; --white:#fff; --yellow:#ffe14d;
  --marker:'Permanent Marker',cursive; --block:'Anton',sans-serif; --body:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{overflow-x:clip}
body{overflow-x:clip}
main{overflow-x:clip}
body{
  font-family:var(--body);color:var(--white);min-height:100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,.14) 0 1.5px, transparent 2px),
    radial-gradient(circle at 80% 30%, rgba(0,0,0,.35) 0 2px, transparent 2.5px),
    linear-gradient(160deg,#ff2ec4 0%,#c4108f 45%,#5a0645 100%);
  background-size:22px 22px,28px 28px,cover;min-height:100dvh;
}
/* halftone overlay */
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.5;
  background-image:radial-gradient(circle,rgba(13,2,16,.5) 1.2px,transparent 1.6px);
  background-size:14px 14px;mask-image:linear-gradient(120deg,transparent 40%,black 100%);
  -webkit-mask-image:linear-gradient(120deg,transparent 40%,black 100%);}
header{position:sticky;top:0;z-index:50;padding:12px 14px 10px;text-align:center;
  background:linear-gradient(180deg,rgba(13,2,16,.92),rgba(13,2,16,.78));border-bottom:3px solid var(--pink)}
.logo{display:inline-flex;flex-wrap:wrap;justify-content:center;gap:3px;text-decoration:none}
.logo span{font-family:var(--block);font-size:22px;line-height:1;padding:4px 6px;transform:rotate(-2deg)}
.logo span:nth-child(odd){background:var(--black);color:var(--white);transform:rotate(2deg)}
.logo span:nth-child(even){background:var(--white);color:var(--black)}
.logo span.star{background:var(--pink);color:var(--black)}
.logo span.cy{background:var(--cyan);color:var(--black)}
.tag{font-family:var(--marker);color:var(--cyan);font-size:13px;margin-top:4px;letter-spacing:.04em}
nav{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;justify-content:space-around;
  align-items:center;padding:8px 6px calc(10px + env(safe-area-inset-bottom));
  background:rgba(13,2,16,.96);border-top:3px solid var(--pink);
  transform:translateZ(0);will-change:transform}
nav button{background:none;border:none;color:var(--white);font-family:var(--block);
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:2px 8px;opacity:.75;
  transition:transform .12s cubic-bezier(.34,1.8,.64,1)}
nav button:active{transform:scale(.82) rotate(-4deg)}
nav button .ni{width:30px;height:30px;display:block}
nav button .ni svg{width:100%;height:100%;display:block}
nav button.on{opacity:1;color:var(--cyan)}
nav button.on .ni{animation:icobounce .5s cubic-bezier(.34,2.2,.64,1)}
@keyframes icobounce{0%{transform:scale(.6) rotate(-12deg)}60%{transform:scale(1.25) rotate(6deg)}100%{transform:scale(1) rotate(0)}}
nav button.plus{width:62px;height:62px;border-radius:50%;background:var(--pink);
  border:3px solid var(--white);opacity:1;box-shadow:0 4px 0 rgba(13,2,16,.6);
  margin-top:-24px;padding:7px;justify-content:center;animation:plusfloat 2.6s ease-in-out infinite}
nav button.plus svg{width:100%;height:100%;display:block}
nav button.plus:active{transform:translateY(3px) scale(.9) rotate(10deg);box-shadow:0 1px 0 rgba(13,2,16,.6);animation:none}
@keyframes plusfloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-4px) rotate(2deg)}}
.sheet{position:fixed;inset:0;z-index:70;background:rgba(13,2,16,.7);display:flex;
  align-items:flex-end;justify-content:center}
.sheetin{width:100%;max-width:480px;background:var(--black);border:3px solid var(--pink);
  border-bottom:none;border-radius:18px 18px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom))}
main{max-width:640px;margin:0 auto;padding:16px 14px 90px}
.sticker{background:var(--black);border:3px solid var(--white);border-radius:14px;
  box-shadow:6px 6px 0 rgba(13,2,16,.55), 0 0 0 3px var(--pink) inset;padding:14px;margin-bottom:16px;
  transform:rotate(-.4deg)}
.sticker:nth-child(even){transform:rotate(.5deg)}
.sticker{opacity:0;translate:0 26px}
.sticker.in{opacity:1;translate:0 0;transition:opacity .45s ease, translate .55s cubic-bezier(.34,1.6,.64,1)}
@media(prefers-reduced-motion:reduce){.sticker{opacity:1;translate:none}}
h2.scrawl{font-family:var(--marker);color:var(--yellow);font-size:20px;margin-bottom:10px;transform:rotate(-1deg)}
.vcard .vtitle{font-family:var(--block);font-size:19px;letter-spacing:.03em;color:var(--white)}
.vcard .vmeta{color:var(--cyan);font-size:13px;font-weight:800;margin:2px 0 8px}
.vcard video{width:100%;max-height:70vh;object-fit:contain;border-radius:10px;border:3px solid var(--pink);background:#000}
.thumbwrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;
  border:3px solid var(--pink);background:#000;margin-bottom:10px}
.thumbwrap.tall{aspect-ratio:9/16;max-width:240px;margin:0 auto 10px}
.thumbwrap img,.thumbwrap video{width:100%;height:100%;object-fit:cover;display:block}
.thumbwrap .playbtn{position:absolute;inset:0;margin:auto;width:64px;height:64px;border-radius:50%;
  background:rgba(13,2,16,.65);border:3px solid var(--white);display:flex;align-items:center;
  justify-content:center;font-size:26px;color:var(--white);pointer-events:none}
.thumbwrap .dur{position:absolute;right:8px;bottom:8px;background:rgba(13,2,16,.8);color:var(--white);
  font:800 12px var(--body);padding:2px 8px;border-radius:6px}
.statrow{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.chip{background:var(--magenta);border:2px solid var(--white);border-radius:999px;
  padding:4px 12px;font-weight:800;font-size:13px}
.chip.cy{background:#0a4c63;border-color:var(--cyan);color:var(--cyan)}
.chip.rxchip{padding:4px 9px;font-size:12px}
/* hero banner */
.herowrap{padding:0;overflow:hidden;border-radius:14px}
.hero{display:block;width:100%;height:auto;border-radius:11px}
/* my videos manager */
.vrow{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px dashed var(--magenta)}
.vrow:last-child{border-bottom:none}
.vthumb{flex:0 0 74px;width:74px;height:46px;border-radius:8px;overflow:hidden;
  border:2px solid var(--pink);background:#000;cursor:pointer}
.vthumb img,.vthumb video{width:100%;height:100%;object-fit:cover;display:block}
.vinfo{flex:1;min-width:0;cursor:pointer}
.vinfo .vt{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vinfo .vd{font-size:12px;color:#b678a8;font-weight:700}
.vacts{display:flex;gap:6px}
.act-mini{background:#1c0a1e;border:2px solid var(--magenta);border-radius:9px;font-size:15px;
  padding:7px 9px;cursor:pointer;transition:transform .12s cubic-bezier(.34,2,.64,1)}
.act-mini:active{transform:scale(.85) rotate(-6deg)}
.act-mini.bad{border-color:#a33}
/* ---- ARCADE (high-voltage) ---- */
.gametile{cursor:pointer;background:linear-gradient(135deg,#1a0620,#0d0210 60%);
  border-color:var(--cyan);position:relative;overflow:hidden}
.gametile::after{content:'';position:absolute;top:-60%;left:-30%;width:40%;height:220%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.16),transparent);
  transform:rotate(18deg);animation:sheen 3.4s ease-in-out infinite}
@keyframes sheen{0%,60%{translate:-120% 0}100%{translate:420% 0}}
.gametile:active{transform:scale(.97) rotate(-.6deg)}
.gametile .gt{font-family:var(--block);font-size:22px;letter-spacing:.05em;
  background:linear-gradient(90deg,var(--cyan),var(--pink),var(--yellow));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.gametile .gb{font-weight:800;font-size:13px;color:#d9a8cc;margin:2px 0 8px}
.gamestage{background:
  radial-gradient(circle at 15% 15%, rgba(69,216,255,.14), transparent 40%),
  radial-gradient(circle at 85% 80%, rgba(255,46,196,.16), transparent 45%), var(--black)}
.gamehead{display:flex;align-items:center;gap:12px;margin-bottom:10px;
  position:sticky;top:6px;z-index:20;background:rgba(13,2,16,.92);border-radius:12px;padding:6px 8px}
.gamehead .act-mini{font-family:var(--body);font-weight:900;font-size:13px;white-space:nowrap}
.sbtop{font-family:var(--block);font-size:20px;letter-spacing:.08em;color:var(--yellow);
  margin-bottom:8px;text-shadow:0 0 12px rgba(255,225,77,.55)}
.sbgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;
  background:linear-gradient(160deg,#1c0a2e,#0a0616);
  border:3px solid var(--cyan);box-shadow:0 0 18px rgba(69,216,255,.35), inset 0 0 24px rgba(13,2,16,.8);
  border-radius:12px;padding:6px;aspect-ratio:1;max-width:420px;margin:0 auto}
.sbcell{background:#241035;border-radius:5px;cursor:pointer;transition:transform .08s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.sbcell.fill{box-shadow:inset 0 -3px 0 rgba(13,2,16,.4),0 0 8px currentColor;
  animation:cellpop .2s cubic-bezier(.34,2.2,.64,1)}
@keyframes cellpop{0%{transform:scale(.3) rotate(12deg)}70%{transform:scale(1.15)}100%{transform:scale(1) rotate(0)}}
.sbtray{display:flex;justify-content:space-around;align-items:center;gap:10px;margin:12px 0;min-height:74px}
.sbpiece{padding:7px;border:2px solid var(--magenta);border-radius:10px;cursor:pointer;
  background:linear-gradient(160deg,#2a1030,#160820);
  transition:transform .12s cubic-bezier(.34,2,.64,1);animation:pieceidle 2.4s ease-in-out infinite}
.sbpiece:nth-child(2){animation-delay:.4s}.sbpiece:nth-child(3){animation-delay:.8s}
@keyframes pieceidle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.sbpiece.on{border-color:var(--yellow);box-shadow:0 0 16px rgba(255,225,77,.85);transform:scale(1.15) rotate(2deg);animation:none}
.sbpiece.empty{border:none;background:none;min-width:40px;animation:none}
.sbpiece{touch-action:none}
.sbcell.blast{animation:sbBlast .34s ease-out forwards;z-index:2;position:relative}
@keyframes sbBlast{
  0%{filter:brightness(1.4);box-shadow:0 0 8px 2px #fff}
  55%{filter:brightness(2.6) saturate(1.6);transform:scale(1.22);
    box-shadow:0 0 22px 9px #ffe14d,0 0 44px 20px rgba(255,46,196,.85),0 0 70px 32px rgba(69,216,255,.5)}
  100%{filter:brightness(3.2);transform:scale(.45) rotate(8deg);opacity:0;
    box-shadow:0 0 60px 26px rgba(255,255,255,.95)}
}
.sbghost{position:fixed;z-index:70;pointer-events:none;opacity:.95;filter:drop-shadow(0 6px 10px rgba(13,2,16,.6))}
.sbcell.prev{background:#1e6b3a!important;box-shadow:0 0 10px rgba(74,222,128,.8),inset 0 0 6px rgba(74,222,128,.6)}
.sbcell.badprev{background:#6b1e1e!important;box-shadow:0 0 8px rgba(248,113,113,.7)}
/* shared game field */
.gfield{position:relative;aspect-ratio:3/4;max-width:400px;margin:0 auto;overflow:hidden;
  border:3px solid var(--cyan);border-radius:14px;touch-action:none;cursor:pointer;
  background:
    radial-gradient(circle at 30% 20%, rgba(69,216,255,.12), transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(255,46,196,.14), transparent 45%),
    linear-gradient(180deg,#160826,#0a0616);
  box-shadow:0 0 18px rgba(69,216,255,.3), inset 0 0 30px rgba(13,2,16,.8)}
/* star racer */
.rcplayer{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);font-size:36px;
  filter:drop-shadow(0 0 10px rgba(69,216,255,.9));transition:left .06s linear;pointer-events:none}
.rcitem{position:absolute;font-size:28px;transform:translateX(-50%);pointer-events:none;
  filter:drop-shadow(0 0 6px rgba(255,225,77,.7))}
/* flappy */
.flstar{position:absolute;left:14%;top:40%;font-size:34px;transform-origin:center;
  filter:drop-shadow(0 0 10px rgba(255,225,77,.9));pointer-events:none;transition:transform .1s}
.flpipe{position:absolute;width:12%;background:linear-gradient(90deg,var(--pink),#7a0a5e);
  border:2px solid var(--white);border-radius:8px;box-shadow:0 0 12px rgba(255,46,196,.6);pointer-events:none}
/* simon */
.sigrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:340px;margin:0 auto;aspect-ratio:1}
.sipad{border-radius:18px;border:3px solid var(--pc);background:color-mix(in srgb,var(--pc) 18%,#0d0210);
  font-size:38px;cursor:pointer;opacity:.65;transition:all .12s;filter:grayscale(.4)}
.sipad.lit,.sipad:active{opacity:1;filter:none;background:var(--pc);
  box-shadow:0 0 26px var(--pc);transform:scale(1.05)}
/* stacker */
.stblock{position:absolute;height:6.5%;border:2px solid rgba(255,255,255,.85);border-radius:6px;
  box-shadow:0 0 10px currentColor, inset 0 -4px 0 rgba(13,2,16,.35)}
.stblock.moving{animation:none}
.stblock.fall{animation:stfall .7s ease-in forwards}
@keyframes stfall{to{transform:translateY(120vh) rotate(24deg);opacity:0}}
/* beat star */
.btfield{cursor:default}
.btlane{position:absolute;top:0;bottom:0;width:25%}
.btlane[data-l="0"]{left:0}.btlane[data-l="1"]{left:25%}.btlane[data-l="2"]{left:50%}.btlane[data-l="3"]{left:75%}
.btlane:nth-child(odd){background:rgba(255,255,255,.025)}
.btnote{position:absolute;top:-8%;left:50%;transform:translateX(-50%);font-size:30px;
  filter:drop-shadow(0 0 8px currentColor);pointer-events:none}
.btline{position:absolute;left:0;right:0;top:80%;height:4px;z-index:2;
  background:linear-gradient(90deg,var(--cyan),var(--pink),var(--yellow));
  box-shadow:0 0 14px rgba(69,216,255,.9);animation:btpulse 1s ease-in-out infinite}
@keyframes btpulse{50%{box-shadow:0 0 26px rgba(255,46,196,.95)}}
.btpads{display:flex;gap:8px;max-width:400px;margin:10px auto}
.btpad{flex:1;font-size:28px;padding:12px 0;border-radius:14px;border:3px solid var(--pc);
  background:color-mix(in srgb,var(--pc) 16%,#0d0210);cursor:pointer;
  transition:transform .08s}
.btpad:active{transform:scale(.9);background:var(--pc);box-shadow:0 0 20px var(--pc)}
/* puppy park */
.ppwrap{position:relative;aspect-ratio:3/4;max-width:420px;margin:0 auto;overflow:hidden;
  border:3px solid var(--cyan);border-radius:14px;background:#87d8ff;
  box-shadow:0 0 18px rgba(69,216,255,.3)}
.ppwrap canvas:not(.ppmap){display:block;width:100%!important;height:100%!important;border-radius:11px}
.pphud{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#0d0210;text-align:center;padding:20px;background:#87d8ff}
.ldbar{width:min(240px,70%);height:14px;margin:0 auto;background:rgba(13,2,16,.25);
  border:2px solid #0d0210;border-radius:999px;overflow:hidden}
.ldbar i{display:block;height:100%;width:0;transition:width .25s ease;
  background:linear-gradient(90deg,#45d8ff,#ff2ec4,#ffe14d)}
.chompflash{position:absolute;inset:0;z-index:6;pointer-events:none;
  background:radial-gradient(circle,transparent 30%,rgba(226,0,60,.55));
  animation:chompfl .65s ease-out forwards}
@keyframes chompfl{0%{opacity:1}100%{opacity:0}}
.ppvoice{position:absolute;top:10px;left:112px;z-index:41;width:44px;height:44px;border-radius:50%;
  border:2px solid rgba(255,255,255,.7);background:rgba(7,7,26,.72);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:box-shadow .2s,border-color .2s}
.ppvoice.live{border-color:#4ade80;box-shadow:0 0 14px rgba(74,222,128,.8);animation:pillnudge 1.6s ease-in-out infinite}
.ppvoice.muted{border-color:#ffe14d}
.ppvoice.listen{border-color:#45d8ff}
.voicechips{position:absolute;top:60px;left:10px;z-index:41;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.voicechip{background:rgba(7,7,26,.72);border:1.5px solid rgba(255,255,255,.4);border-radius:999px;
  padding:2px 10px;font-size:11px;color:#fff;font-weight:700;transition:border-color .15s,box-shadow .15s}
.voicechip.talking{border-color:#4ade80;box-shadow:0 0 10px rgba(74,222,128,.9);color:#b7ffce}
.ppact{z-index:7;position:absolute;z-index:8;width:54px;height:54px;border-radius:50%;
  font-size:24px;cursor:pointer;border:3px solid #fff;box-shadow:0 4px 0 rgba(13,2,16,.5)}
.ppjump{bottom:14px;left:12px;background:var(--cyan)}
.ppbonk{bottom:14px;left:76px;background:#ff8c1a;animation:pillnudge 1s ease-in-out infinite}
.ppshoot{bottom:14px;left:140px;background:var(--yellow)}
.ppdown{bottom:14px;left:76px;background:#a78bfa}
.ppshop{background:#160826;border:2px solid var(--yellow);border-radius:14px;
  margin:0 0 10px;max-height:60vh;overflow-y:auto;overscroll-behavior:contain;position:relative}
.shhead{display:flex;justify-content:space-between;align-items:center;padding:10px 12px 4px;
  position:sticky;top:0;background:#160826;z-index:2}
.shbal{font:900 16px var(--body);color:var(--yellow)}
.shsec{padding:4px 12px 10px}
.shtitle{font:900 13px var(--body);letter-spacing:.1em;color:var(--cyan);margin:6px 0}
.shnote{font:700 11px var(--body);color:#b678a8;margin-bottom:6px}
.shgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.shitem{background:#1c0a1e;border:2px solid #4a2a52;border-radius:12px;padding:8px 6px;
  cursor:pointer;color:#fff;text-align:center}
.shitem.owned{border-color:var(--cyan)}
.shitem.on{border-color:var(--yellow);box-shadow:0 0 12px rgba(255,225,77,.5)}
.shemoji{font-size:26px}
.shname{font:900 12px var(--body);margin:3px 0 1px}
.shblurb{font:700 9px var(--body);color:#b678a8;line-height:1.2}
.shcost{font:900 11px var(--body);color:var(--yellow);margin-top:3px}
.ppbody.lockd{opacity:.55;border-style:dashed}
.shnew{font:900 8px var(--body);letter-spacing:.08em;color:#062030;background:var(--cyan);
  border-radius:999px;padding:2px 7px;display:inline-block;margin-bottom:3px;
  animation:pillnudge 1.2s ease-in-out infinite}
.ppride{bottom:74px}
.ppfly{bottom:134px}
.ppdropjump{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);z-index:7;
  font:900 20px var(--body);color:#062030;background:var(--yellow);border:3px solid #fff;
  border-radius:999px;padding:14px 30px;cursor:pointer;
  box-shadow:0 6px 20px rgba(255,225,77,.55);animation:pillnudge .9s ease-in-out infinite}
.ppdropjump.hide{display:none}
.ppmap{position:absolute;bottom:74px;right:10px;z-index:40;pointer-events:none;display:block!important;
  width:132px!important;height:132px!important;border-radius:12px;border:2px solid rgba(255,255,255,.35);
  background:rgba(7,7,26,.55);box-shadow:0 3px 12px rgba(0,0,0,.4)}
.pphpwrap{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:6;
  width:190px;height:15px;border:2px solid rgba(255,255,255,.8);border-radius:999px;
  background:rgba(7,7,26,.65);overflow:hidden;pointer-events:none}
#ppHp{height:100%}
#ppHp i{display:block;height:100%;border-radius:999px;transition:width .25s,background .25s;
  background:linear-gradient(90deg,#4ade80,#a3e635)}
#ppHp i.low{background:linear-gradient(90deg,#ff5f5f,#ff8c1a);animation:pillnudge .5s ease-in-out infinite}
.ppmist{position:absolute;inset:0;z-index:5;pointer-events:none;opacity:0;
  background:radial-gradient(circle,rgba(255,255,255,.85) 0%,rgba(240,248,255,.95) 100%);
  transition:opacity .12s linear}
.ppammo{position:absolute;top:62px;left:10px;z-index:6;font:900 13px var(--body);
  color:#062030;background:var(--yellow);border:2px solid #fff;border-radius:999px;
  padding:5px 12px;box-shadow:0 3px 10px rgba(255,225,77,.5)}
.svscores{position:absolute;top:62px;right:10px;z-index:6;display:flex;flex-direction:column;
  gap:3px;pointer-events:none;max-width:46%}
.svrow{font:800 11px var(--body);color:#fff;background:rgba(13,2,16,.62);

.svrow.me{border-color:var(--yellow);color:var(--yellow)}
.svrow b{color:#fff}
.svbanner{position:fixed;top:0;left:0;right:0;z-index:150;border:none;cursor:pointer;
  font:900 14px var(--body);color:#fff;padding:10px 14px;text-align:center;
  background:linear-gradient(90deg,#c4108f,var(--magenta),#ff5fb0,var(--magenta),#c4108f);

.svbanner b{color:#ffe14d}
.svbanner.mn{background:linear-gradient(90deg,#0a5a7a,var(--cyan),#7ae8ff,var(--cyan),#0a5a7a);
  background-size:300% 100%;color:#062030;box-shadow:0 3px 14px rgba(69,216,255,.55)}
.svbanner.mn b{color:#c4108f}
@keyframes svbmove{0%{background-position:0 0}100%{background-position:300% 0}}
.gametile.live{border-color:var(--magenta);animation:livepulse 1.1s ease-in-out infinite}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(255,46,196,.0)}
  50%{box-shadow:0 0 22px 4px rgba(255,46,196,.75)}}
.livechip{display:inline-block;font:900 10px var(--body);letter-spacing:.12em;
  color:#fff;background:var(--magenta);border-radius:999px;padding:4px 10px;margin-bottom:6px;
  animation:livepulse 1.1s ease-in-out infinite}
.chomppop{position:absolute;top:34%;left:50%;transform:translateX(-50%);z-index:7;

  pointer-events:none;animation:chompop 1.3s ease-out forwards}
@keyframes chompop{0%{transform:translateX(-50%) scale(.4)}18%{transform:translateX(-50%) scale(1.25)}
  100%{transform:translateX(-50%) translateY(-46px) scale(1);opacity:0}}
/* park character creator */
.ppstyle{max-width:420px;margin:0 auto 8px;background:#160826;border:2px solid var(--magenta);
  border-radius:12px;padding:8px}
.pprow{display:flex;align-items:center;gap:6px;margin:5px 0;flex-wrap:wrap}
.pplbl{font:900 10px var(--body);letter-spacing:.14em;color:#d9a8cc;width:44px}
.ppbody{flex:1;font:800 13px var(--body);padding:8px 4px;border-radius:10px;cursor:pointer;
  border:2px solid var(--magenta);background:#1c0a1e;color:#fff;opacity:.7}
.ppbody.on{opacity:1;border-color:var(--yellow);box-shadow:0 0 10px rgba(255,225,77,.5)}
.ppsw{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.5);cursor:pointer}
.ppsw.on{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.8);transform:scale(1.15)}
/* park talk */
.pptalk{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:6;
  background:var(--cyan);color:var(--black);border:3px solid #fff;border-radius:999px;
  font:900 13px var(--body);padding:10px 16px;cursor:pointer;white-space:nowrap;
  box-shadow:0 4px 0 rgba(13,2,16,.5);animation:pillnudge 1.4s ease-in-out infinite}
.ppchat{position:absolute;left:8px;right:8px;bottom:8px;z-index:7;background:rgba(13,2,16,.96);
  border:3px solid var(--cyan);border-radius:14px;padding:8px}
.ppchead{display:flex;justify-content:space-between;align-items:center;font-weight:900;
  color:var(--cyan);font-size:14px;margin-bottom:6px}
.ppcmsgs{max-height:26vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px;
  margin-bottom:8px;overscroll-behavior:contain}
.ppcme{align-self:flex-end;background:var(--magenta);border-radius:12px 12px 2px 12px;
  padding:6px 10px;font-size:13px;font-weight:700;max-width:85%}
.ppcnpc{align-self:flex-start;background:#123a52;border:1px solid var(--cyan);
  border-radius:12px 12px 12px 2px;padding:6px 10px;font-size:13px;font-weight:700;max-width:85%}
.ppbody.sm{font-size:11px;padding:6px 3px}
.ppfull{position:absolute;top:10px;right:10px;z-index:8;width:44px;height:44px;
  background:rgba(13,2,16,.7);border:2px solid var(--cyan);color:var(--cyan);
  border-radius:10px;font-size:20px;cursor:pointer}
.ppfull.on{border-color:#ff5540;color:#ff5540;background:rgba(13,2,16,.85);font-size:22px}
.ppback{position:absolute;top:10px;left:10px;z-index:8;background:rgba(13,2,16,.7);
  border:2px solid var(--yellow);color:var(--yellow);border-radius:10px;
  font:900 12px var(--body);padding:10px 12px;cursor:pointer}
.ppwrap.fsfake{position:fixed;inset:0;width:100vw;height:100dvh;z-index:200;
  max-width:none;aspect-ratio:auto;border-radius:0;border:none;margin:0}
.ppwrap:fullscreen,.ppwrap:-webkit-full-screen{width:100vw;height:100dvh;
  max-width:none;aspect-ratio:auto;border-radius:0;border:none}
body.fs-active header,body.fs-active nav,body.fs-active .chatdock{display:none!important}
body.fs-active{overflow:hidden}
.ppdrive{left:auto;right:12px;transform:none;background:var(--yellow)}
/* street hoops 3d */
.hpspotlbl{font-size:13px;background:rgba(13,2,16,.6);border:2px solid var(--yellow);color:var(--yellow);
  border-radius:8px;padding:1px 8px;margin-left:6px;vertical-align:middle}
.hpspotlbl.deep{border-color:#ff8c1a;color:#ff8c1a}
#hpfire{color:#ff8c1a;text-shadow:0 0 10px rgba(255,140,26,.9);animation:pillnudge .7s ease-in-out infinite}
.pwbar{position:absolute;left:10px;bottom:12px;top:auto;width:18px;height:42%;z-index:5;
  background:rgba(13,2,16,.65);border:2px solid var(--white);border-radius:10px;overflow:hidden;
  display:flex;align-items:flex-end}
.pwfill{width:100%;height:0;border-radius:0 0 8px 8px;transition:height .05s linear}
.pwlbl{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-90deg);
  font:900 9px var(--body);letter-spacing:.2em;color:#fff;opacity:.8;pointer-events:none}
/* club record banner — slams in on every screen */
.crownbanner{position:fixed;top:74px;left:10px;right:10px;z-index:95;pointer-events:none;
  max-width:620px;margin:0 auto;text-align:center;
  background:linear-gradient(100deg,#3a2e08,#0d0210 40%,#3a2e08);
  border:4px solid var(--yellow);border-radius:16px;padding:12px 16px;
  box-shadow:0 0 26px rgba(255,225,77,.85), 6px 6px 0 rgba(13,2,16,.6);
  transform-origin:center}
.crownbanner .cb1{font-family:var(--block);font-size:19px;letter-spacing:.06em;color:var(--yellow);
  text-shadow:0 0 14px rgba(255,225,77,.8)}
.crownbanner .cb2{font-weight:800;font-size:14px;color:#fff;margin-top:2px}
.crownbanner .cb2 b{color:var(--cyan)}
.crownbanner .cb2 s{color:#ff8080}
.crownbanner.slam{animation:cbslam .55s cubic-bezier(.2,2.4,.4,1) forwards}
@keyframes cbslam{
  0%{transform:scale(3.2) rotate(-9deg);opacity:0}
  55%{transform:scale(.92) rotate(2deg);opacity:1}
  75%{transform:scale(1.06) rotate(-1deg)}
  100%{transform:scale(1) rotate(0)}}
.crownbanner.boom{animation:cbboom .5s ease-in forwards}
@keyframes cbboom{
  0%{transform:scale(1);opacity:1;filter:brightness(1)}
  35%{transform:scale(1.18);filter:brightness(2.4)}
  100%{transform:scale(1.7) rotate(3deg);opacity:0;filter:brightness(3)}}
.sbrow{display:flex;gap:2px}
.sbmini{width:14px;height:14px;border-radius:3px;display:inline-block;margin:1px 0;
  box-shadow:0 0 4px currentColor}
.sbhint{font-size:12px;font-weight:700;color:#d9a8cc;margin:6px 0 10px;text-align:center}
/* zap tap */
.ztgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:360px;margin:0 auto;aspect-ratio:1}
.ztcell{background:linear-gradient(160deg,#241035,#12061e);border:2px solid var(--magenta);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 14px rgba(13,2,16,.7)}
.ztstar{background:none;border:none;font-size:44px;cursor:pointer;
  animation:starpop .18s cubic-bezier(.34,2.4,.64,1), starwig .6s ease-in-out .2s infinite;
  filter:drop-shadow(0 0 10px rgba(255,225,77,.9))}
@keyframes starpop{0%{transform:scale(0) rotate(-40deg)}100%{transform:scale(1)}}
@keyframes starwig{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
/* star match */
.smgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:380px;margin:0 auto}
.smcard{aspect-ratio:1;border-radius:12px;border:2px solid var(--cyan);cursor:pointer;
  background:linear-gradient(135deg,var(--pink),#7a0a5e);position:relative;
  transition:transform .25s cubic-bezier(.34,1.6,.64,1);transform-style:preserve-3d;
  box-shadow:0 3px 0 rgba(13,2,16,.5)}
.smcard::before{content:'★';position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:26px;color:rgba(255,255,255,.55);backface-visibility:hidden}
.smcard .smface{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:32px;transform:rotateY(180deg);backface-visibility:hidden}
.smcard.up,.smcard.done{transform:rotateY(180deg);background:linear-gradient(135deg,#1c3a52,#0a1c33);border-color:var(--yellow)}
.smcard.done{box-shadow:0 0 14px rgba(255,225,77,.8);animation:donebounce .45s cubic-bezier(.34,2.2,.64,1)}
@keyframes donebounce{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.18)}100%{transform:rotateY(180deg) scale(1)}}
/* leaderboard */
.lrow{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px dashed var(--magenta)}
.lrow:last-child{border-bottom:none}
.lrow.me{background:rgba(69,216,255,.12);border-radius:8px;box-shadow:0 0 10px rgba(69,216,255,.25)}
.lrow:first-child .lscore{text-shadow:0 0 12px rgba(255,225,77,.8)}
.lrank{font-size:18px;width:34px;text-align:center;font-weight:900}
.av.lav{width:30px;height:30px;font-size:14px;flex:0 0 30px}
.lname{flex:1;font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lscore{font-family:var(--block);color:var(--yellow);font-size:16px;letter-spacing:.05em}
body.theme-court .sbpiece.on{border-color:#ff8c1a}
body.theme-court .gametile{border-color:#ff8c1a}
/* arcade chat dock */
#v-arcade{padding-bottom:64px}
.chatdock{position:fixed;left:10px;right:10px;bottom:calc(84px + env(safe-area-inset-bottom));
  z-index:55;background:rgba(13,2,16,.97);border:3px solid var(--cyan);border-radius:14px;
  box-shadow:0 4px 18px rgba(13,2,16,.6);max-width:620px;margin:0 auto}
.dockbar{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer}
.dockic{font-size:17px}
.docklatest{flex:1;font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;color:#d9a8cc}
.docklatest b{color:var(--cyan)}
#dockArrow{color:var(--cyan);font-weight:900;transition:transform .2s}
.chatdock.open #dockArrow{transform:rotate(180deg)}
.dockpanel{border-top:2px solid var(--magenta);padding:8px 10px calc(8px)}
.dockmsgs{max-height:34vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;
  padding:4px 0 8px;overscroll-behavior:contain}
.dockmsgs .cmsg .av{width:26px;height:26px;flex:0 0 26px;font-size:12px}
.dockmsgs .bub{padding:5px 8px}
.dockmsgs .ctext{font-size:13px}
.docknew{animation:docknew .5s ease}
@keyframes docknew{0%{background:rgba(69,216,255,.28)}100%{background:transparent}}
/* live emoji rain over the player */
.vidwrap{position:relative;overflow:visible}
.unmutepill{position:absolute;top:10px;left:10px;z-index:6;background:rgba(13,2,16,.8);
  border:2px solid var(--cyan);color:var(--white);border-radius:999px;padding:8px 14px;
  font:800 13px var(--body);cursor:pointer;animation:pillnudge 1.6s ease-in-out infinite}
@keyframes pillnudge{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.flyemoji{position:absolute;bottom:0;font-size:28px;pointer-events:none;z-index:5;
  animation:flyup var(--dur,3.2s) linear forwards;filter:drop-shadow(0 0 4px rgba(13,2,16,.6))}
@keyframes flyup{
  0%{transform:translateY(0) translateX(0) scale(.7);opacity:0}
  8%{opacity:1}
  50%{transform:translateY(-45vh) translateX(var(--sway,20px)) scale(1.05)}
  100%{transform:translateY(-92vh) translateX(calc(var(--sway,20px)*-1)) scale(.9);opacity:0}
}
@media(prefers-reduced-motion:reduce){.flyemoji{display:none}}
button.big{font-family:var(--block);font-size:16px;letter-spacing:.08em;text-transform:uppercase;
  background:var(--pink);color:var(--black);border:3px solid var(--white);border-radius:12px;
  padding:12px 18px;cursor:pointer;box-shadow:4px 4px 0 rgba(13,2,16,.6);width:100%}
button.big.cy{background:var(--cyan)}
button.big{transition:transform .1s cubic-bezier(.34,1.8,.64,1)}
button.big:active{transform:translate(2px,2px) scale(.96) rotate(-.6deg);box-shadow:1px 1px 0 rgba(13,2,16,.6)}
.reacts button{transition:transform .12s cubic-bezier(.34,2,.64,1)}
.reacts button:active{transform:scale(1.35) rotate(-8deg)}
.chip{transition:transform .12s ease}
.trackbtn:active,.emojirow button:active{transform:scale(.9)}
input,textarea,select{width:100%;background:#1c0a1e;border:2px solid var(--pink);border-radius:10px;
  color:var(--white);padding:12px;font-family:var(--body);font-weight:600;font-size:15px;margin-bottom:10px}
input::placeholder,textarea::placeholder{color:#b678a8}
.comment{display:flex;gap:10px;border-left:4px solid var(--cyan);padding:8px 10px;margin-bottom:10px;background:rgba(255,255,255,.05);border-radius:0 10px 10px 0}
.comment .av{flex:0 0 36px;width:36px;height:36px;border-radius:50%;background:var(--deep);
  border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-size:18px}
.comment.judge .av{border-color:var(--yellow);background:#2e2408}
.comment .cbody{flex:1;min-width:0}
.comment.judge{border-left-color:var(--yellow)}
.comment .who{font-weight:800;font-size:13px;color:var(--cyan)}

.comment .aitag{font-size:10px;border-radius:6px;padding:1px 7px;margin-left:6px;letter-spacing:.08em;

.aitag.bronze{background:#2b1a0c;border-color:#cd7f32;color:#e8a463}
.aitag.silver{background:#232328;border-color:#c0c0c0;color:#d9d9de}
.aitag.gold{background:#2e2408;border-color:#ffd700;color:#ffe14d}
.aitag.plat{background:#20242c;border-color:#9ad6e8;color:#d7f4ff}
.aitag.star{background:#3a0a2e;border-color:var(--pink);color:var(--pink)}
.aitag.hq{background:#0a2e1a;border-color:#4ade80;color:#4ade80}
/* Eliora's crew shimmer star */
.shimstar{display:inline-block;margin-left:4px;font-size:14px;
  background:linear-gradient(110deg,#ffd700 20%,#fff8c4 40%,#ffd700 60%,#e8a800 80%);
  background-size:220% 100%;-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;animation:shim 2.2s linear infinite;
  filter:drop-shadow(0 0 3px rgba(255,215,0,.7))}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-20% 0}}
@media(prefers-reduced-motion:reduce){.shimstar{animation:none}}
.comment .pending{font-size:11px;color:var(--yellow);font-style:italic}
.comment .body{font-size:14px;margin-top:2px}
.comment .reply{background:none;border:none;color:var(--pink);font-weight:800;font-size:12px;cursor:pointer;padding:2px 0}
.reacts{display:flex;gap:8px;margin:10px 0}
.reacts button{background:var(--black);border:2px solid var(--magenta);border-radius:999px;
  font-size:18px;padding:6px 12px;cursor:pointer;color:var(--white)}
.reacts button span{font-size:12px;font-weight:800;color:var(--cyan);margin-left:4px}
.starmeter{position:relative;height:26px;background:var(--black);border:2px solid var(--white);border-radius:999px;overflow:hidden;margin:8px 0}
.starmeter .fill{position:absolute;inset:0;width:0;background:linear-gradient(90deg,var(--pink),var(--cyan));transition:width .8s}
.starmeter .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--block);font-size:14px;letter-spacing:.1em;text-shadow:1px 1px 0 var(--black)}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{background:var(--deep);border:2px dashed var(--yellow);border-radius:10px;padding:8px 10px;
  font-size:12px;font-weight:800;transform:rotate(-1deg)}
.zap{position:absolute;font-size:26px;pointer-events:none;animation:zap .9s ease-out forwards}
@keyframes zap{0%{transform:scale(.4) rotate(-20deg);opacity:1}100%{transform:scale(1.8) translateY(-60px) rotate(15deg);opacity:0}}
.hide{display:none}
/* studio */
.camwrap{position:relative;border-radius:12px;overflow:hidden;border:3px solid var(--pink);
  background:#000;margin-bottom:12px;aspect-ratio:9/12}
.camwrap video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
.recdot{position:absolute;top:10px;left:10px;background:rgba(13,2,16,.7);color:#ff4040;
  font:800 14px var(--body);padding:4px 12px;border-radius:999px;animation:blink 1s infinite}
@keyframes blink{50%{opacity:.35}}
.trackbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#1c0a1e;

  font:800 15px var(--body);cursor:pointer;margin-bottom:8px}

.chatbox{height:52vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;

.cmsg{display:flex;gap:8px;align-items:flex-start}
.cmsg .av{flex:0 0 32px;width:32px;height:32px;border-radius:50%;background:var(--deep);
  border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-size:15px}
.cmsg.judge .av{border-color:var(--yellow)}
.cmsg .bub{background:rgba(255,255,255,.06);border-radius:4px 12px 12px 12px;padding:7px 10px;max-width:82%}

.cmsg .cwho{font-weight:800;font-size:12px;color:var(--cyan)}
.cmsg.judge .cwho{color:var(--yellow)}
.cmsg .ctext{font-size:14px;word-break:break-word}
.cmsg img{max-width:100%;border-radius:8px;border:2px solid var(--magenta);margin-top:4px;display:block}

.chatrow{display:flex;gap:8px;align-items:center}
.chatrow input[type=text],#chatIn{flex:1;margin-bottom:0}
.camlbl{font-size:22px;cursor:pointer}

.mention{color:var(--cyan);font-weight:800}
.mention.me{color:var(--yellow);background:rgba(255,225,77,.15);border-radius:4px;padding:0 3px}
.mname{cursor:pointer}
.mdrop{background:var(--black);border:2px solid var(--cyan);border-radius:10px;margin-bottom:8px;

.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chartline{font-family:var(--block);font-size:17px;letter-spacing:.05em;color:var(--yellow);

nav button{position:relative}
/* judges rating bar */
.jbar{position:relative;height:18px;background:#14061a;border:2px solid var(--white);border-radius:999px;

<body>
<header>
  <a class="logo" href="#" onclick="go('feed');return false" id="logo"></a>
  <div class="tag">your stage · your fans · your club ⚡</div>
  <nav id="nav" class="hide">
    <button data-v="feed" class="on" onclick="go('feed')"><span class="ni" data-ic="stage"></span>Stage</button>
    <button data-v="arcade" onclick="go('arcade')"><span class="ni" data-ic="game"></span>Arcade</button>
    <button id="plusBtn" class="plus" onclick="showCreate()"><span data-ic="plus"></span></button>
    <button data-v="chat" onclick="go('chat')"><span class="ni" data-ic="chat"></span>Chat<span id="chatBadge" class="navbadge hide"><b></b></span></button>
    <button data-v="me" onclick="go('me')"><span class="ni" data-ic="star"></span>My Star</button>
  </nav>
  <div id="crownBanner" class="crownbanner hide"></div>
  <div id="createSheet" class="sheet hide" onclick="this.classList.add('hide')">
    <div class="sheetin" onclick="event.stopPropagation()">
      <h2 class="scrawl">Create ⚡</h2>
      <button class="big" onclick="$('#createSheet').classList.add('hide');go('upload')">🎬 Post a video</button>
      <button class="big" style="margin-top:8px;background:var(--yellow)" onclick="$('#createSheet').classList.add('hide');go('studio')">🎤 Studio session</button>
    </div>
  </div>
</header>
<main>
  <!-- LOGIN / JOIN -->
  <section id="v-auth" class="hide">
    <div class="sticker">
      <h2 class="scrawl">Sign in to the club</h2>
      <input id="au" placeholder="username" autocomplete="username">
      <input id="ap" type="password" placeholder="password" autocomplete="current-password">
      <button class="big" onclick="login()">Let me in! ⭐</button>
      <div class="errmsg" id="aerr"></div>
    </div>
    <div class="sticker">
      <h2 class="scrawl">Got an invite code?</h2>
      <input id="jc" placeholder="invite code">
      <input id="jn" placeholder="your name (what fans will see)">
      <input id="ju" placeholder="pick a username">
      <input id="jp" type="password" placeholder="pick a password">
      <button class="big cy" onclick="join()">Join the club 🎤</button>
      <div class="errmsg" id="jerr"></div>
    </div>
  </section>

  <!-- FEED -->
  <section id="v-feed" class="hide"></section>

  <!-- SINGLE VIDEO -->
  <section id="v-video" class="hide"></section>

  <!-- UPLOAD -->
  <section id="v-upload" class="hide">
    <div class="sticker">
      <h2 class="scrawl">Drop a new video 🎬</h2>
      <input id="ut" placeholder="video title — make it POP" maxlength="120">
      <textarea id="ud" rows="2" placeholder="tell your fans about it (optional)" maxlength="500"></textarea>
      <input id="uf" type="file" accept="video/*">
      <button class="big" id="ubtn" onclick="upload()">Post it! ⚡</button>
      <div class="errmsg" id="uerr"></div>
    </div>
  </section>

  <!-- STUDIO -->
  <section id="v-studio" class="hide">
    <div id="studioPick"></div>
    <div id="studioRec" class="hide">
      <div class="sticker">
        <h2 class="scrawl" id="recSong">🎤 Studio</h2>
        <div class="camwrap"><video id="cam" autoplay muted playsinline></video>
          <div id="recDot" class="recdot hide">● REC</div></div>
        <audio id="backing"></audio>
        <button class="big" id="recBtn" onclick="recToggle()">🔴 Record</button>
        <button class="big cy" style="margin-top:8px" onclick="studioBack()">← Pick a different song</button>
      </div>
      <div id="recReview" class="sticker hide">
        <h2 class="scrawl">How'd it go? 🌟</h2>
        <video id="playback" controls playsinline style="width:100%;border-radius:10px;border:3px solid var(--pink)"></video>
        <input id="recTitle" placeholder="name your performance ⭐" maxlength="120" style="margin-top:10px">
        <button class="big" id="recPost" onclick="postRecording()">Post performance ⚡</button>
        <button class="big cy" style="margin-top:8px" onclick="retake()">🔁 Retake</button>
        <div class="errmsg" id="recErr"></div>
      </div>
    </div>
  </section>

  <!-- CLUB CHAT -->
  <section id="v-chat" class="hide">
    <div class="sticker" style="transform:none">
      <h2 class="scrawl">Club Chat 💬</h2>
      <div id="chatBox" class="chatbox"></div>
      <div class="emojirow">
        <button onclick="$('#chatIn').value+='🎉'">🎉</button><button onclick="$('#chatIn').value+='🔥'">🔥</button><button onclick="$('#chatIn').value+='⭐'">⭐</button><button onclick="$('#chatIn').value+='😂'">😂</button><button onclick="$('#chatIn').value+='💜'">💜</button><button onclick="$('#chatIn').value+='🎤'">🎤</button><button onclick="$('#chatIn').value+='👏'">👏</button><button onclick="$('#chatIn').value+='⚡'">⚡</button>
      </div>
      <div id="mentionDrop" class="mdrop hide"></div>
      <div class="chatrow">
        <label class="camlbl">📷<input id="chatImg" type="file" accept="image/*" onchange="sendChatImage()"></label>
        <input id="chatIn" placeholder="message the club… (@ to mention)" maxlength="500"
          oninput="mentionHint(this)" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="act-send" onclick="sendChat()">➤</button>
      </div>
      <div class="errmsg" id="chatErr"></div>
    </div>
  </section>

  <!-- ARCADE -->
  <section id="v-arcade" class="hide">
    <div id="arcadeHub"></div>
    <div id="gameHost" class="hide">
      <div class="sticker gamestage">
        <div class="gamehead">
          <button class="act-mini" onclick="arcade()">← Arcade</button>
          <h2 class="scrawl" id="gameTitle" style="margin:0"></h2>
        </div>
        <div id="gameArea"></div>
      </div>
      <div class="sticker">
        <h2 class="scrawl">🏆 Club Leaderboard</h2>
        <div id="gameBoard"></div>
      </div>
    </div>
    <!-- chat dock: play & chat at the same time -->
    <div id="chatDock" class="chatdock">
      <div class="dockbar" onclick="dockToggle()">
        <span class="dockic">💬</span>
        <span id="dockLatest" class="docklatest">Club Chat — tap to open</span>
        <span id="dockArrow">▲</span>
      </div>
      <div id="dockPanel" class="dockpanel hide">
        <div id="dockMsgs" class="dockmsgs"></div>
        <div class="chatrow">
          <input id="dockIn" placeholder="chat while you play…" maxlength="500"
            onkeydown="if(event.key==='Enter')dockSend()">
          <button class="act-send" onclick="dockSend()">➤</button>
        </div>
      </div>
    </div>
  </section>

  <!-- MY STAR -->
  <section id="v-me" class="hide"></section>
</main>

<script src="/pills.js"></script>
<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ago=d=>{const m=(Date.now()-new Date(d))/60000;
  return m<1?'just now':m<60?Math.floor(m)+' min ago':m<1440?Math.floor(m/60)+'h ago':Math.floor(m/1440)+'d ago'};
const fdate=d=>new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
async function api(url,opts={}){
  const r=await fetch(url,{headers:{'content-type':'application/json'},...opts,
    body:opts.body&&!(opts.body instanceof Blob)?JSON.stringify(opts.body):opts.body});
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||'Something went wrong.');
  return j;
}
// ransom-note logo
$('#logo').innerHTML='KID★STAR★CLUB'.split('').map((c,i)=>
  `<span class="${c==='★'?'star':i%5===3?'cy':''}">${c==='★'?'⭐':c}</span>`).join('');
// ---- sticker icon set (custom SVGs, punk sticker style) ----
const ICONS={
  stage:`<svg viewBox="0 0 48 48"><g transform="rotate(-4 24 24)">
    <path d="M8 40h32v-6H8z" fill="#45d8ff" stroke="#0d0210" stroke-width="4" stroke-linejoin="round"/>
    <path d="M24 6l4.7 9.4 10.3 1.5-7.5 7.3 1.8 10.3L24 29.6l-9.3 4.9 1.8-10.3-7.5-7.3 10.3-1.5z"
      fill="#fff" stroke="#0d0210" stroke-width="4" stroke-linejoin="round"/></g></svg>`,
  chat:`<svg viewBox="0 0 48 48"><g transform="rotate(3 24 24)">
    <path d="M8 10h32a4 4 0 014 4v16a4 4 0 01-4 4H24l-9 8v-8H8a4 4 0 01-4-4V14a4 4 0 014-4z"
      fill="#fff" stroke="#0d0210" stroke-width="4" stroke-linejoin="round"/>
    <path d="M27 14l-8 11h5l-3 9 9-12h-5l4-8z" fill="#ffe14d" stroke="#0d0210" stroke-width="3" stroke-linejoin="round"/></g></svg>`,
  star:`<svg viewBox="0 0 48 48"><g transform="rotate(-3 24 24)">
    <path d="M26 8l4.7 9.4 10.3 1.5-7.5 7.3 1.8 10.3L26 31.6l-9.3 4.9 1.8-10.3-7.5-7.3 10.3-1.5z"
      fill="#45d8ff" opacity=".9" transform="translate(-3,2)"/>
    <path d="M24 6l4.7 9.4 10.3 1.5-7.5 7.3 1.8 10.3L24 29.6l-9.3 4.9 1.8-10.3-7.5-7.3 10.3-1.5z"
      fill="#ffe14d" stroke="#0d0210" stroke-width="4" stroke-linejoin="round"/></g></svg>`,
  plus:`<svg viewBox="0 0 48 48">
    <path d="M24 3l5 8 9-3-1 10 10 3-8 6 5 9-10-1-3 10-7-8-8 7-2-10-10 1 6-9-8-6 10-3-2-10 9 4z"
      fill="#ffe14d" stroke="#0d0210" stroke-width="3" stroke-linejoin="round"/>
    <path d="M24 15v18M15 24h18" stroke="#0d0210" stroke-width="6" stroke-linecap="round"/></svg>`,
  burst:`<svg viewBox="0 0 48 48"><path d="M24 3l5 8 9-3-1 10 10 3-8 6 5 9-10-1-3 10-7-8-8 7-2-10-10 1 6-9-8-6 10-3-2-10 9 4z"
    fill="#ffe14d" stroke="#0d0210" stroke-width="3" stroke-linejoin="round"/></svg>`,
  game:`<svg viewBox="0 0 48 48"><g transform="rotate(-3 24 24)">
    <rect x="6" y="14" width="36" height="22" rx="11" fill="#fff" stroke="#0d0210" stroke-width="4"/>
    <path d="M14 22v8M10 26h8" stroke="#0d0210" stroke-width="4" stroke-linecap="round"/>
    <circle cx="32" cy="23" r="3" fill="#ff2ec4" stroke="#0d0210" stroke-width="2"/>
    <circle cx="38" cy="28" r="3" fill="#45d8ff" stroke="#0d0210" stroke-width="2"/></g></svg>`
};
document.querySelectorAll('[data-ic]').forEach(el=>el.innerHTML=ICONS[el.dataset.ic]||'');
$('#chatBadge').insertAdjacentHTML('afterbegin',ICONS.burst);

let ME=null;
function go(view){
  document.querySelectorAll('main section').forEach(s=>s.classList.toggle('hide',s.id!=='v-'+view));
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===view));
  if(view!=='video')stopPoll();
  if(view!=='studio')stopStudio();
  if(view!=='chat')stopChat();
  if(view!=='arcade'){stopDock();if(typeof gReset==='function')gReset()}
  if(view==='feed')feed(); if(view==='me')meView(); if(view==='arcade')arcade();
  if(view==='studio')studio(); if(view==='chat')chat();
}
// Stage auto-refresh: new videos/counts appear without reloading.
setInterval(()=>{if(!document.hidden&&!$('#v-feed').classList.contains('hide')&&ME)feed()},30000);


function showCreate(){$('#createSheet').classList.remove('hide')}
function applyTheme(t){document.body.classList.toggle('theme-court',t==='court')}
async function setTheme(t){
  ME.theme=t;applyTheme(t);
  await api('/api/profile/theme',{method:'POST',body:{theme:t}}).catch(()=>{});
  meView();
}
async function boot(){
  ME=await api('/api/me').catch(()=>null);
  if(!ME){go('auth');return}
  applyTheme(ME.theme);
  $('#nav').classList.remove('hide');
  go('feed');
}
async function login(){
  try{ME=await api('/api/login',{method:'POST',body:{username:$('#au').value,password:$('#ap').value}});boot()}
  catch(e){$('#aerr').textContent=e.message}
}
async function join(){
  try{ME=await api('/api/join',{method:'POST',body:{code:$('#jc').value,display_name:$('#jn').value,username:$('#ju').value,password:$('#jp').value}});boot()}
  catch(e){$('#jerr').textContent=e.message}
}

// ---- shared renderers ----
const avHtml=(c,cls='')=>{
  if(c.cast_name)return `<div class="av ${cls}">${esc(c.cast_emoji)}</div>`;
  if(c.user_has_avatar)return `<div class="av ${cls}"><img src="/api/users/${c.user_id}/avatar" loading="lazy" alt=""></div>`;
  return `<div class="av ${cls}">${esc(c.user_emoji||'⭐')}</div>`;
};
const shim=u=>((u.joined_code||'').toUpperCase()==='ELIORA')?'<span class="shimstar">★</span>':'';
// pillHtml lives in /pills.js (Cap's zone)
function jbarHtml(avg){
  const a=avg||0;
  const cls=a>=9.5?'max':a>=8.5?'hot':a>=7?'warm':'';
  const label=a>0?`JUDGES ${a.toFixed(1)} / 10`:'JUDGES VOTING…';
  return `<div class="jbar ${cls}"><div class="jfill" style="width:${a*10}%"></div>
    <div class="jlabel">${label}</div></div>`;
}
const MILESTONES=[10,25,50,100,250,500,1000,2500,5000];
function countUp(sel,from,to){
  const el=$(sel);if(!el)return;
  const steps=Math.min(20,to-from)||1,dur=700;let i=0;
  const t=setInterval(()=>{i++;el.textContent=Math.round(from+(to-from)*(i/steps));
    if(i>=steps){el.textContent=to;clearInterval(t)}},dur/steps);
}
function burst(mode='pop'){
  const n=mode==='storm'?44:14;
  if(mode==='storm'){
    const flash=document.createElement('div');
    flash.style.cssText='position:fixed;inset:0;z-index:80;pointer-events:none;background:#fff';
    document.body.appendChild(flash);
    flash.animate([{opacity:.9},{opacity:0}],{duration:500,easing:'ease-out'});
    setTimeout(()=>flash.remove(),520);
    if(navigator.vibrate)navigator.vibrate([60,40,60,40,120]);
  }
  for(let i=0;i<n;i++){
    const z=document.createElement('div');z.className='zap';
    z.textContent=mode==='storm'?'⚡':['⚡','⭐','🎉','💫'][i%4];

const RX_EMOJI={star:'⭐',fire:'🔥',clap:'👏',heart:'💜',wow:'🤩'};
let rainTimer=null;
function spawnFly(emoji){
  const wrap=document.querySelector('.vidwrap');if(!wrap)return;
  const e=document.createElement('span');e.className='flyemoji';e.textContent=emoji;
  e.style.left=(5+Math.random()*88)+'%';
  e.style.setProperty('--dur',(2.4+Math.random()*2.2)+'s');
  e.style.setProperty('--sway',(Math.random()<.5?-1:1)*(10+Math.random()*40)+'px');
  e.style.fontSize=(22+Math.random()*16)+'px';
  wrap.appendChild(e);
  setTimeout(()=>e.remove(),5200);
}
function startRain(rxCounts){
  stopRain();
  const pool=[];
  for(const [k,n] of Object.entries(rxCounts||{}))for(let i=0;i<(n||0);i++)pool.push(RX_EMOJI[k]||'⭐');
  if(!pool.length)return;
  const gap=Math.max(280,2400/Math.min(pool.length,30)); // more reactions = denser rain
  rainTimer=setInterval(()=>{
    const v=$('#mainvid');
    if(!v||v.paused||document.hidden)return;
    spawnFly(pool[Math.floor(Math.random()*pool.length)]);
  },gap);
}
function stopRain(){if(rainTimer){clearInterval(rainTimer);rainTimer=null}}
let livePoll=null,liveVideoId=null,liveCount=0;
function stopPoll(){if(livePoll){clearInterval(livePoll);livePoll=null;liveVideoId=null}stopRain()}
async function openVideo(id){
  stopPoll();
  go('video');
  const v=await api('/api/videos/'+id);
  const cms=await api(`/api/videos/${id}/comments`);
  const rx=Object.fromEntries((v.reactions||[]).map(r=>[r.kind,r.n]));
  const rbtn=(k,e)=>`<button onclick="react(${id},'${k}',event)">${e}<span>${rx[k]||0}</span></button>`;
  $('#v-video').innerHTML=`
    <div class="sticker vcard">
      <div class="vtitle">${esc(v.title)}</div>
      <div class="vmeta">${esc(v.owner_name)} · ${esc(v.channel_name)}</div>
      <div class="vmeta" style="color:#b678a8">posted ${fdate(v.created_at)}
        <span class="chip" id="hypeChip" style="margin-left:8px">⚡ HYPE <span id="hypeN">0</span></span></div>
      <div class="chartline">📈 CHART SCORE <span id="chartN">${v.chart_score||0}</span>
        ${v.judge_count?`<span class="panel">panel: ${v.avg_score.toFixed(1)}/10 · ×${Math.max(1,Math.round(v.avg_score*v.avg_score))} multiplier</span>`:'<span class="panel">judges are still voting…</span>'}</div>
      ${jbarHtml(v.avg_score)}
      ${!v.is_own?`<button class="big ${v.i_subscribe?'cy':''}" style="margin:6px 0"
          onclick="event.stopPropagation();toggleSub(${v.channel_id},${v.i_subscribe},${id})">
          ${v.i_subscribe?'✓ Subscribed':'⭐ Subscribe'}</button>`:''}
      <div class="vidwrap"><video id="mainvid" controls playsinline autoplay src="/api/videos/${id}/stream"></video>
        <button id="unmute" class="unmutepill hide" onclick="$('#mainvid').muted=false;this.classList.add('hide')">🔊 Tap for sound</button></div>
      ${v.description?`<p style="margin-top:8px">${esc(v.description)}</p>`:''}
      <div class="reacts">${rbtn('star','⭐')}${rbtn('fire','🔥')}${rbtn('clap','👏')}${rbtn('heart','💜')}${rbtn('wow','🤩')}</div>
    </div>
    <div class="sticker">
      <h2 class="scrawl">The club says…</h2>
      <div id="cms">${cms.map(c=>commentHtml(c)).join('')||'<p>The crowd is arriving… check back soon! 🎪</p>'}</div>
      <textarea id="cb" rows="2" placeholder="say something nice…" maxlength="500"></textarea>
      <input type="hidden" id="cparent">
      <div id="replyhint" class="errmsg"></div>
      <button class="big cy" onclick="postComment(${id})">Send 💬</button>
      <div class="errmsg" id="cerr"></div>
    </div>`;
  const hype0=(v.reactions||[]).reduce((s,r)=>s+r.n,0)+cms.length*2;
  $('#hypeN').textContent=hype0;
  let viewed=false,lastHype=hype0,lastChart=v.chart_score||0;
  let rxNow=Object.fromEntries((v.reactions||[]).map(r=>[r.kind,r.n]));
  startRain(rxNow);
  // Autoplay: try with sound (we arrived via a tap); fall back to muted + unmute pill.
  {
    const mv=$('#mainvid');
    mv.play().catch(()=>{
      mv.muted=true;
      mv.play().then(()=>$('#unmute').classList.remove('hide')).catch(()=>{});
    });
  }
  // Plays are counted quietly as Chart Score fuel — no counter shown.
  $('#mainvid').addEventListener('play',()=>{
    if(viewed)return;viewed=true;
    api(`/api/videos/${id}/view`,{method:'POST'}).catch(()=>{});
  });
  $('#mainvid').addEventListener('ended',()=>{viewed=false});
  liveVideoId=id;liveCount=cms.length;
  livePoll=setInterval(async()=>{
    if(document.hidden||liveVideoId!==id)return;
    const [fresh,vf]=await Promise.all([
      api(`/api/videos/${id}/comments`).catch(()=>null),
      api(`/api/videos/${id}`).catch(()=>null)]);
    if(vf){
      const cEl=$('#chartN');
      if(cEl&&vf.chart_score>lastChart){
        countUp('#chartN',lastChart,vf.chart_score);
        for(const m of MILESTONES)if(lastChart<m&&vf.chart_score>=m)burst(m>=1000?'storm':'pop');
        lastChart=vf.chart_score;
      }
      const hy=(vf.reactions||[]).reduce((s,r)=>s+r.n,0)+(fresh?fresh.length*2:lastHype);
      if(hy>lastHype){countUp('#hypeN',lastHype,hy);lastHype=hy;
        $('#hypeChip')?.animate([{transform:'scale(1)'},{transform:'scale(1.25)'},{transform:'scale(1)'}],{duration:400})}
      // new reactions since last poll fly up right away
      const rxNew=Object.fromEntries((vf.reactions||[]).map(r=>[r.kind,r.n]));
      let changed=false;
      for(const [k,n] of Object.entries(rxNew)){
        const delta=n-(rxNow[k]||0);
        for(let i=0;i<delta;i++)setTimeout(()=>spawnFly(RX_EMOJI[k]||'⭐'),i*250);
        if(delta>0)changed=true;
      }
      if(changed){rxNow=rxNew;startRain(rxNow)}
    }
    if(fresh&&fresh.length!==liveCount){
      liveCount=fresh.length;
      const box=$('#cms');if(!box)return;
      box.innerHTML=fresh.map(c=>commentHtml(c)).join('');
      box.lastElementChild?.animate([{background:'rgba(69,216,255,.35)'},{background:'transparent'}],{duration:1200});
    }
  },15000);
}

// ---- UPLOAD ----
const uploadKind='video';
// Grab a frame ~1s in (or 10% of duration) as a JPEG thumbnail.
function captureThumb(file){
  return new Promise(resolve=>{
    const v=document.createElement('video');
    v.preload='metadata';v.muted=true;v.playsInline=true;
    v.src=URL.createObjectURL(file);
    const bail=setTimeout(()=>resolve(null),8000);
    v.onloadedmetadata=()=>{v.currentTime=Math.min(1,(v.duration||10)*0.1)};
    v.onseeked=()=>{
      try{
        const c=document.createElement('canvas');
        const w=640,h=Math.round(640*(v.videoHeight/v.videoWidth))||360;
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(v,0,0,w,h);
        c.toBlob(b=>{clearTimeout(bail);URL.revokeObjectURL(v.src);resolve(b)},'image/jpeg',.82);
      }catch(e){clearTimeout(bail);resolve(null)}
    };
    v.onerror=()=>{clearTimeout(bail);resolve(null)};
  });
}
async function upload(){
  const f=$('#uf').files[0], t=$('#ut').value.trim();
  if(!f||!t){$('#uerr').textContent='Need a title and a video!';return}
  if(f.size>5*1024*1024*1024){$('#uerr').textContent='Whoa — 5GB max per video. Trim it a little!';return}
  $('#ubtn').disabled=true;$('#uerr').textContent='';
  try{
    // 1) presign
    const p=await api('/api/videos/presign',{method:'POST',
      body:{title:t,description:$('#ud').value.trim(),kind:uploadKind}});
    // 2) direct PUT to bucket with progress
    await new Promise((res,rej)=>{
      const x=new XMLHttpRequest();
      x.open('PUT',p.put_url);
      x.setRequestHeader('content-type',f.type||'video/mp4');
      x.upload.onprogress=e=>{if(e.lengthComputable)
        $('#ubtn').textContent=`Uploading… ${Math.round(e.loaded/e.total*100)}% 🚀`};
      x.onload=()=>x.status>=200&&x.status<300?res():rej(new Error('Storage upload failed ('+x.status+').'));
      x.onerror=()=>rej(new Error('Network error during upload — try again.'));
      x.send(f);
    });
    // 3) thumbnail (best-effort — feed falls back to a video frame if this fails)
    try{
      const tb=await captureThumb(f);
      if(tb&&p.thumb_put_url)
        await fetch(p.thumb_put_url,{method:'PUT',headers:{'content-type':'image/jpeg'},body:tb});
    }catch(e){}
    // 4) go live
    await api(`/api/videos/${p.video_id}/complete`,{method:'POST'});
    $('#ut').value='';$('#ud').value='';$('#uf').value='';
    alert('🎉 Posted! The club is on its way — cheers and comments will roll in all day. Check back!');
    go('feed');
  }catch(e){$('#uerr').textContent=e.message}
  finally{$('#ubtn').disabled=false;$('#ubtn').textContent='Post it! ⚡'}
}

let camStream=null,recorder=null,recChunks=[],recBlob=null,currentTrack=null;

function recToggle(){
  if(recorder&&recorder.state==='recording'){recorder.stop();return}
  const mime=['video/mp4','video/webm;codecs=vp9,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'';
  recChunks=[];
  recorder=new MediaRecorder(camStream,mime?{mimeType:mime}:{});
  recorder.ondataavailable=e=>e.data.size&&recChunks.push(e.data);
  recorder.onstop=()=>{
    $('#backing').pause();$('#backing').currentTime=0;
    $('#recDot').classList.add('hide');$('#recBtn').textContent='🔴 Record';
    recBlob=new Blob(recChunks,{type:recorder.mimeType||'video/mp4'});
    $('#playback').src=URL.createObjectURL(recBlob);
    $('#recTitle').value=currentTrack?`Singing "${currentTrack.title}" 🎤`:'';
    $('#recReview').classList.remove('hide');
    $('#recReview').scrollIntoView({behavior:'smooth'});
  };
  $('#backing').currentTime=0;$('#backing').play();
  recorder.start();
  $('#recDot').classList.remove('hide');$('#recBtn').textContent='⏹ Stop';
}

// ---- arcade SFX (WebAudio, no files) ----
function sfxTone(freq,dur,type='sine',vol=0.22,when=0,slideTo=null){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime+when;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,t);
    if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
    g.gain.setValueAtTime(0.001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+0.015);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}
function sfxNoise(dur,vol=0.25,when=0){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime+when;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=audioCtx.createBufferSource();src.buffer=buf;
    const g=audioCtx.createGain();g.gain.value=vol;
    const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=1600;
    src.connect(f);f.connect(g);g.connect(audioCtx.destination);src.start(t);
  }catch(e){}
}

function sndCoin(){ // bright two-note chime; combo pitch climbs on quick pickups

// ---- 🎙️ IN-GAME VOICE CHAT (WebRTC mesh; server is signaling-only) ----
const VC={state:'off',peers:new Map(),stream:null,myId:null,timer:null,ctx:null,meter:null};
function vcUI(){
  const b=document.getElementById('ppVoice');
  if(b){
    b.className='ppvoice '+(VC.state==='off'?'':VC.state);
    b.textContent=VC.state==='live'?'🎙️':VC.state==='muted'?'🔇':VC.state==='listen'?'🎧':'🎙️';
    b.title=VC.state==='off'?'Join voice chat'
      :VC.state==='live'?'Talking — tap to mute'
      :VC.state==='muted'?'Muted — tap to leave'
      :'Listening — tap to leave';
    b.style.opacity=VC.state==='off'?'0.65':'1';
  }
  vcChips();
}
function vcChips(){
  const c=document.getElementById('voiceChips');
  if(!c)return;
  c.innerHTML='';
  for(const [id,p] of VC.peers){
    const d=document.createElement('div');
    d.className='voicechip';d.dataset.vid=id;
    d.textContent='🔊 '+(p.name||'Star');
    c.appendChild(d);
  }
}
function vcNewPeer(id,name){
  const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  const p={pc,name,audio:null,an:null};
  VC.peers.set(id,p);
  if(VC.stream)for(const tr of VC.stream.getAudioTracks())pc.addTrack(tr,VC.stream);
  else pc.addTransceiver('audio',{direction:'recvonly'});
  pc.onicecandidate=e=>{if(e.candidate)vcSignal(id,{ice:e.candidate})};
  pc.ontrack=e=>{
    let dock=document.getElementById('voiceDock');
    if(!dock){dock=document.createElement('div');dock.id='voiceDock';dock.style.display='none';document.body.appendChild(dock)}
    const au=document.createElement('audio');
    au.autoplay=true;au.playsInline=true;au.srcObject=e.streams[0];au.volume=0.82;
    dock.appendChild(au);p.audio=au;
    try{ // speaking meter
      VC.ctx=VC.ctx||new (window.AudioContext||window.webkitAudioContext)();
      const src=VC.ctx.createMediaStreamSource(e.streams[0]);
      p.an=VC.ctx.createAnalyser();p.an.fftSize=256;
      src.connect(p.an);
    }catch(err){}
  };
  pc.onconnectionstatechange=()=>{if(['failed','closed','disconnected'].includes(pc.connectionState))vcDrop(id)};
  vcChips();
  return p;
}
function vcDrop(id){
  const p=VC.peers.get(id);
  if(!p)return;
  try{p.pc.close()}catch(e){}
  p.audio?.remove();
  VC.peers.delete(id);
  vcChips();
}
async function vcSignal(to,data){
  try{await fetch('/api/voice/signal',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({to,data})})}catch(e){}
}
async function vcHandle(from,data){
  let p=VC.peers.get(from)||vcNewPeer(from,data.name);
  const pc=p.pc;
  try{
    if(data.sdp){
      await pc.setRemoteDescription(data.sdp);
      if(data.sdp.type==='offer'){
        const ans=await pc.createAnswer();
        await pc.setLocalDescription(ans);
        vcSignal(from,{sdp:pc.localDescription});
      }
    }else if(data.ice){
      await pc.addIceCandidate(data.ice);
    }
  }catch(e){console.warn('[voice]',e.message)}
}
async function vcOffer(id,name){
  const p=vcNewPeer(id,name);
  const off=await p.pc.createOffer();
  await p.pc.setLocalDescription(off);
  vcSignal(id,{sdp:p.pc.localDescription,name:'me'});
}
async function vcPoll(){
  if(VC.state==='off')return;
  try{
    const r=await fetch('/api/voice/poll',{method:'POST'}).then(x=>x.json());
    if(r.gone){ // server forgot us (sleep/timeout) — rejoin quietly
      const j=await fetch('/api/voice/join',{method:'POST'}).then(x=>x.json());
      for(const peer of j.roster||[])if(!VC.peers.has(peer.id))vcOffer(peer.id,peer.name);
      return;
    }
    const ids=new Set((r.roster||[]).map(p=>p.id));
    for(const id of [...VC.peers.keys()])if(!ids.has(id))vcDrop(id);
    for(const peer of r.roster||[])
      if(VC.peers.has(peer.id))VC.peers.get(peer.id).name=peer.name;
    for(const m of r.msgs||[])await vcHandle(m.from,m.data);
    // speaking glow
    const buf=new Uint8Array(128);
    for(const [id,p] of VC.peers){
      if(!p.an)continue;
      p.an.getByteFrequencyData(buf);
      let lvl=0;for(let i=0;i<buf.length;i++)lvl+=buf[i];
      const chip=document.querySelector('.voicechip[data-vid="'+id+'"]');
      if(chip)chip.classList.toggle('talking',lvl/buf.length>18);
    }
  }catch(e){}
}
async function voiceToggle(){
  if(VC.state==='off'){
    // join: try for a mic; denied = listen-only
    try{
      VC.stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
      VC.state='live';
      try{ // 🎚️ noise gate: the mic only transmits while you're talking (kills same-room echo loops)
        VC.ctx=VC.ctx||new (window.AudioContext||window.webkitAudioContext)();
        const mSrc=VC.ctx.createMediaStreamSource(VC.stream);
        VC.meter=VC.ctx.createAnalyser();VC.meter.fftSize=256;
        mSrc.connect(VC.meter);
        VC.lastVoice=0;
        VC.gateT=setInterval(()=>{
          if(VC.state!=='live'||!VC.stream)return;
          const buf=new Uint8Array(128);
          VC.meter.getByteFrequencyData(buf);
          let lvl=0;for(let i=0;i<buf.length;i++)lvl+=buf[i];
          lvl/=buf.length;
          const now=performance.now();
          if(lvl>15)VC.lastVoice=now;
          const open=now-VC.lastVoice<700;
          for(const tr of VC.stream.getAudioTracks())tr.enabled=open;
        },120);
      }catch(e){}
    }catch(e){VC.stream=null;VC.state='listen'}
    try{
      const j=await fetch('/api/voice/join',{method:'POST'}).then(x=>x.json());
      VC.myId=j.you;
      for(const peer of j.roster||[])vcOffer(peer.id,peer.name); // newcomer calls everyone
      VC.timer=setInterval(vcPoll,1100);
    }catch(e){
      VC.state='off';
      VC.stream?.getTracks().forEach(t=>t.stop());VC.stream=null;
    }
  }else if(VC.state==='live'){
    for(const tr of VC.stream.getAudioTracks())tr.enabled=false;
    VC.state='muted';
  }else{ // muted or listen → leave
    clearInterval(VC.timer);VC.timer=null;
    clearInterval(VC.gateT);VC.gateT=null;
    fetch('/api/voice/leave',{method:'POST'}).catch(()=>{});
    for(const id of [...VC.peers.keys()])vcDrop(id);
    VC.stream?.getTracks().forEach(t=>t.stop());VC.stream=null;
    VC.state='off';
  }
  vcUI();
}
// unmute path: tapping while muted leaves; long-press unmutes back to live
(function(){
  let pt=null;
  addEventListener('pointerdown',e=>{
    if(e.target?.id!=='ppVoice'||VC.state!=='muted')return;
    pt=setTimeout(()=>{
      for(const tr of VC.stream?.getAudioTracks()||[])tr.enabled=true;
      VC.lastVoice=performance.now(); // gate opens with you
      VC.state='live';vcUI();pt='fired';
    },450);
  },true);
  addEventListener('pointerup',e=>{
    if(e.target?.id!=='ppVoice')return;
    if(pt==='fired'){e.stopPropagation();e.preventDefault();pt=null;return}
    clearTimeout(pt);pt=null;
  },true);
})();

    <div class="sbtop">SCORE <span id="sbscore">0</span></div>
    <div id="sbgrid" class="sbgrid"></div>
    <div id="sbtray" class="sbtray"></div>
    <p class="sbhint">Tap a piece, then tap the board. Fill a full row or column to BLAST it! 💥</p>
    <button class="big cy" onclick="sbNew()">🔁 New game</button>`;
  sb.grid=Array.from({length:8},()=>Array(8).fill(0));
  sb.score=0;sb.over=false;sbFill();sbRender();
}
function sbFill(){
  sb.tray=[0,1,2].map(()=>({m:SB_SHAPES[Math.floor(Math.random()*SB_SHAPES.length)],
    c:1+Math.floor(Math.random()*SB_COLORS.length)}));
  sb.sel=-1;
}
function sbCan(m,r,c){
  for(let i=0;i<m.length;i++)for(let j=0;j<m[0].length;j++)
    if(m[i][j]&&(r+i>7||c+j>7||sb.grid[r+i][c+j]))return false;
  return true;
}
function sbAnyFit(){
  return sb.tray.some(p=>p&&[...Array(8)].some((_,r)=>[...Array(8)].some((_,c)=>sbCan(p.m,r,c))));
}
function sbPlace(r,c){
  if(sb.over||sb.busy)return;
  const p=sb.tray[sb.sel];if(!p)return;
  if(!sbCan(p.m,r,c)){
    sndBad();
    $('#sbgrid').animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:200});
    return;
  }
  let cells=0;
  for(let i=0;i<p.m.length;i++)for(let j=0;j<p.m[0].length;j++)
    if(p.m[i][j]){sb.grid[r+i][c+j]=p.c;cells++}
  sb.tray[sb.sel]=null;sb.sel=-1;
  const rows=[],cols=[];
  for(let i=0;i<8;i++){if(sb.grid[i].every(v=>v))rows.push(i)}
  for(let j=0;j<8;j++){if(sb.grid.every(row=>row[j]))cols.push(j)}
  const lines=rows.length+cols.length;
  const finish=()=>{
    rows.forEach(i=>sb.grid[i]=Array(8).fill(0));
    cols.forEach(j=>sb.grid.forEach(row=>row[j]=0));
    sb.score+=cells+(lines?10*lines*lines:0);
    if(sb.tray.every(x=>!x))sbFill();
    if(!sbAnyFit()){sb.over=true;sndWin();
      submitScore('starblast',sb.score).then(x=>setTimeout(()=>alert('Game over! ⭐ '+sb.score+' points'+x),300))}
    sb.busy=false;
    sbRender();
  };
  if(lines){
    sndBlast(lines);burst(lines>=3?'storm':'pop');
    sb.busy=true;
    sbRender(); // show the placed piece first…
    const gEl=$('#sbgrid');
    if(gEl){ // …then light up the full lines and let them SHATTER
      rows.forEach(i=>{for(let j=0;j<8;j++)gEl.children[i*8+j]?.classList.add('blast')});
      cols.forEach(j=>{for(let i=0;i<8;i++)gEl.children[i*8+j]?.classList.add('blast')});
    }
    setTimeout(finish,340);
  }else{
    sndDrop();
    finish();
  }
}
function sbRender(){
  const g=$('#sbgrid');if(!g)return;
  g.innerHTML=sb.grid.map((row,r)=>row.map((v,c)=>
    `<div class="sbcell${v?' fill':''}" style="${v?'background:'+SB_COLORS[v-1]:''}"
      onclick="sbPlace(${r},${c})"></div>`).join('')).join('');
  $('#sbscore').textContent=sb.score;
  $('#sbtray').innerHTML=sb.tray.map((p,i)=>{
    if(!p)return '<div class="sbpiece empty"></div>';
    const mini=p.m.map(row=>`<div class="sbrow">${row.map(v=>
      `<span class="sbmini" style="${v?'background:'+SB_COLORS[p.c-1]:'visibility:hidden'}"></span>`).join('')}</div>`).join('');
    return `<div class="sbpiece${sb.sel===i?' on':''}" onclick="sb.sel=${sb.sel===i?-1:i};sbRender()"
      onpointerdown="sbDragStart(${i},event)">${mini}</div>`;
  }).join('');
}

// drag & drop (tap-to-place still works)
let sbDragState=null;
function sbDragStart(i,ev){
  const p=sb.tray[i];if(!p||sb.over)return;
  // clean up any leaked drag (Android can interrupt mid-gesture)
  if(sbDragState){try{sbDragState.ghost.remove()}catch(e){}
    removeEventListener('pointermove',sbDragMove);
    removeEventListener('pointerup',sbDragEnd);
    removeEventListener('pointercancel',sbDragEnd);
    document.querySelectorAll('.sbcell').forEach(el=>el.classList.remove('prev','badprev'));
    sbDragState=null;}
  ev.preventDefault();
  try{ev.target.setPointerCapture&&ev.target.setPointerCapture(ev.pointerId)}catch(e){}
  sndPick();
  sb.sel=i;sbRender();
  const cellPx=Math.min(34,Math.floor(($('#sbgrid').getBoundingClientRect().width-12)/8));
  const ghost=document.createElement('div');
  ghost.className='sbghost';
  ghost.innerHTML=p.m.map(row=>`<div class="sbrow">${row.map(v=>
    `<span style="width:${cellPx}px;height:${cellPx}px;border-radius:5px;display:inline-block;margin:1px;
      ${v?'background:'+SB_COLORS[p.c-1]+';box-shadow:0 0 8px '+SB_COLORS[p.c-1]:'visibility:hidden'}"></span>`).join('')}</div>`).join('');
  document.body.appendChild(ghost);
  sbDragState={i,p,ghost,cellPx,r:-1,c:-1};
  sbDragMove(ev);
  addEventListener('pointermove',sbDragMove,{passive:false});
  addEventListener('pointerup',sbDragEnd);
  addEventListener('pointercancel',sbDragEnd); // Android fires THIS when it hijacks a gesture
}
function sbDragMove(ev){
  const d=sbDragState;if(!d)return;
  if(ev.pointerType==='mouse'&&ev.buttons===0)return sbDragEnd();
  ev.preventDefault?.();
  const lift=70; // piece floats above the finger so she can see it
  const gx=ev.clientX-(d.p.m[0].length*d.cellPx)/2;
  const gy=ev.clientY-lift-(d.p.m.length*d.cellPx)/2;
  d.ghost.style.left=gx+'px';d.ghost.style.top=gy+'px';
  const rect=$('#sbgrid').getBoundingClientRect();
  const cw=rect.width/8;
  const c=Math.round((gx-rect.left-4)/cw), r=Math.round((gy-rect.top-4)/cw);
  d.r=r;d.c=c;
  document.querySelectorAll('.sbcell').forEach(el=>el.classList.remove('prev','badprev'));
  if(r<-1||c<-1||r>8||c>8)return;
  const ok=sbCan(d.p.m,r,c);
  for(let i2=0;i2<d.p.m.length;i2++)for(let j=0;j<d.p.m[0].length;j++){
    if(!d.p.m[i2][j])continue;
    const rr=r+i2,cc=c+j;
    if(rr<0||cc<0||rr>7||cc>7)continue;
    const cell=$('#sbgrid').children[rr*8+cc];
    if(cell)cell.classList.add(ok?'prev':'badprev');
  }
}
function sbDragEnd(){
  const d=sbDragState;if(!d)return;
  removeEventListener('pointermove',sbDragMove);
  removeEventListener('pointerup',sbDragEnd);
  removeEventListener('pointercancel',sbDragEnd);
  d.ghost.remove();
  document.querySelectorAll('.sbcell').forEach(el=>el.classList.remove('prev','badprev'));
  sbDragState=null;
  if(d.r>=0&&d.c>=0&&d.r<8&&d.c<8&&sbCan(d.p.m,d.r,d.c)){sb.sel=d.i;sbPlace(d.r,d.c)}
  else sbRender();
}

// ---- GAME 3: STAR MATCH ----
const SM_EMOJI=['🎤','⚡','⭐','🔥','💜','🎸','👑','🎪'];
let sm={deck:[],open:[],found:0,moves:0,t0:0,lock:false};
function smNew(){
  const pairs=[...SM_EMOJI,...SM_EMOJI].sort(()=>Math.random()-.5);
  sm={deck:pairs,open:[],found:0,moves:0,t0:Date.now(),lock:false};
  $('#gameArea').innerHTML=`
    <div class="sbtop">MOVES <span id="smmoves">0</span></div>
    <div class="smgrid">${pairs.map((e,i)=>
      `<button class="smcard" id="sm${i}" onclick="smFlip(${i})"><span class="smface">${e}</span></button>`).join('')}</div>
    <p class="sbhint">Find all 8 pairs — fewer moves & faster time = bigger score!</p>
    <button class="big cy" onclick="smNew()">🔁 New game</button>`;
}
function smFlip(i){
  if(sm.lock)return;
  const card=$('#sm'+i);
  if(card.classList.contains('up')||card.classList.contains('done'))return;
  card.classList.add('up');
  sm.open.push(i);
  if(sm.open.length===2){
    sm.moves++;$('#smmoves').textContent=sm.moves;
    const [a,b]=sm.open;sm.open=[];
    if(sm.deck[a]===sm.deck[b]){
      $('#sm'+a).classList.add('done');$('#sm'+b).classList.add('done');
      sm.found++;sndBlast(1);burst('pop');
      if(sm.found===8){
        const secs=Math.round((Date.now()-sm.t0)/1000);
        const score=Math.max(50,2000-secs*15-sm.moves*20);sndWin();
        submitScore('starmatch',score).then(x=>setTimeout(()=>alert('All pairs! 🃏 '+score+' points ('+secs+'s, '+sm.moves+' moves)'+x),300));
      }
    }else{
      sm.lock=true;
      setTimeout(()=>{$('#sm'+a).classList.remove('up');$('#sm'+b).classList.remove('up');sm.lock=false},700);
    }
  }
}


// ---- shared game loop management ----
let __raf=null,__ivals=[];
function gReset(){if(__raf)cancelAnimationFrame(__raf);__raf=null;
  __ivals.forEach(clearInterval);__ivals=[];}
function gIval(fn,ms){const t=setInterval(fn,ms);__ivals.push(t);return t}

let fl={};
function flNew(){
  gReset();
  $('#gameArea').innerHTML=`
    <div class="sbtop">SCORE <span id="flscore">0</span></div>
    <div id="flfield" class="gfield" onpointerdown="fl.vy=-2.6;sndPick()">
      <div id="flstar" class="flstar">⭐</div></div>
