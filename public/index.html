<!DOCTYPE html>
<html lang="en">
<head>

<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0a1a2f;font-family:system-ui,-apple-system,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block}
  /* ---------- loading / title ---------- */
  #title{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5vh;
    background:linear-gradient(180deg,rgba(12,42,82,.88) 0%,rgba(26,106,168,.42) 45%,rgba(62,201,176,0) 78%);color:#fff;text-align:center;transition:opacity .6s;pointer-events:none}
  #title h1,#title p,#picker,#playBtn,#loadBar,#loadPct,#hero{pointer-events:auto}
  #title h1{font-size:clamp(34px,8vw,72px);margin:0;letter-spacing:.06em;text-shadow:0 4px 0 rgba(0,0,0,.25)}
  #title p{opacity:.9;margin:10px 0 26px;font-size:15px}
  #playBtn{font-size:20px;font-weight:800;padding:16px 40px;border-radius:999px;border:3px solid #fff;cursor:pointer;
    background:#ffb62e;color:#4a2c00;box-shadow:0 6px 0 rgba(0,0,0,.25);display:none}
  #playBtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.25)}
  #loadBar{width:min(70vw,340px);height:12px;border-radius:999px;background:rgba(255,255,255,.25);overflow:hidden}

  #loadPct{margin-top:8px;font-size:13px;opacity:.85}
  #hero{font-size:64px;margin-bottom:6px;filter:drop-shadow(0 4px 4px rgba(0,0,0,.3))}
  /* ---------- HUD ---------- */
  .hud{position:fixed;z-index:10;pointer-events:none}
  #hint{left:50%;transform:translateX(-50%);bottom:calc(14px + var(--ksnav));background:rgba(6,20,40,.65);color:#fff;
    padding:8px 16px;border-radius:999px;font-size:13px;white-space:nowrap}
  #tag{right:12px;top:58px;background:rgba(6,20,40,.5);color:#9fd8ff;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}
  /* ---------- touch controls ---------- */
  /* ---------- ⚡ KIDSTARCLUB BAR ---------- */
  :root{--ksnav:66px}
  #ksbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:space-around;align-items:center;
    padding:6px 6px calc(8px + env(safe-area-inset-bottom));
    background:rgba(13,2,16,.96);border-top:3px solid #ff2ec4}
  #ksbar button{background:none;border:none;color:#fff;font-size:9px;font-weight:800;letter-spacing:.1em;
    text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 10px;
    opacity:.82;cursor:pointer;position:relative;transition:transform .12s cubic-bezier(.34,1.8,.64,1)}
  #ksbar button span{font-size:20px;line-height:1}
  #ksbar button:active{transform:scale(.84) rotate(-4deg)}
  #ksbar button.star{width:58px;height:58px;border-radius:50%;background:#ff2ec4;border:3px solid #fff;
    margin-top:-22px;font-size:26px;opacity:1;box-shadow:0 4px 0 rgba(13,2,16,.6);justify-content:center;padding:0}
  #chatDot{display:none;position:absolute;top:-1px;right:6px;width:11px;height:11px;border-radius:50%;
    background:#45d8ff;border:2px solid #0d0210;animation:dotpulse 1.1s ease-in-out infinite}
  #chatDot.on{display:block}
  @keyframes dotpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
  /* ---------- 💬 the full chat, right inside the game ---------- */
  #chatbox{display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--ksnav) + 10px);z-index:40;
    width:min(94vw,440px);background:rgba(13,2,16,.96);border:2px solid #ff2ec4;border-radius:18px;padding:10px;
    flex-direction:column;gap:8px;box-shadow:0 -10px 44px rgba(0,0,0,.55)}
  #chatbox.on{display:flex}
  #chathead{display:flex;align-items:center;justify-content:space-between;color:#fff;font-size:11px;
    font-weight:800;letter-spacing:.12em;text-transform:uppercase}
  #chatclose{background:none;border:none;color:#ff77dd;font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
  #chatlist{overflow-y:auto;display:flex;flex-direction:column;gap:6px;min-height:110px;max-height:36vh;padding-right:4px}
  .cmsg{background:rgba(255,255,255,.07);border-left:3px solid #45d8ff;border-radius:8px;padding:6px 9px;
    color:#fff;font-size:13px;line-height:1.4;word-break:break-word}
  .cmsg b{color:#ff77dd}
  .cmsg.me{border-left-color:#ff2ec4;background:rgba(255,46,196,.15)}
  #joy{position:fixed;left:26px;bottom:calc(26px + var(--ksnav));width:118px;height:118px;border-radius:50%;z-index:11;
    background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.35);display:none}
  #joy i{position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px 0 0 -26px;border-radius:50%;
    background:rgba(255,255,255,.55)}
  #jump{position:fixed;right:26px;bottom:calc(34px + var(--ksnav));width:76px;height:76px;border-radius:50%;z-index:11;display:none;
    background:rgba(255,182,46,.85);border:3px solid #fff;font-size:30px;line-height:70px;text-align:center;color:#4a2c00}
  @media (pointer:coarse){#joy,#jump{display:block}}
  #board{min-width:270px !important;border:1.5px solid rgba(79,216,255,.4);box-shadow:0 0 16px rgba(43,217,255,.25)}
  @keyframes lbPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
</style>

<body>
<canvas id="c"></canvas>
<div id="title">
  <div id="hero">🏝️</div>

<button id="exitBtn" style="position:fixed;right:12px;top:12px;z-index:12;padding:8px 14px;border-radius:999px;border:2px solid rgba(255,255,255,.6);background:rgba(6,20,40,.7);color:#ffe14d;font-weight:800;font-size:13px;cursor:pointer">← Arcade</button>

<button id="mic" style="position:fixed;left:14px;top:56px;z-index:12;width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,.7);background:rgba(6,20,40,.7);font-size:20px;opacity:.65">🎙️</button>

</nav>

<button id="emote" style="position:fixed;right:26px;bottom:calc(124px + var(--ksnav));z-index:11;width:56px;height:56px;border-radius:50%;border:2px solid #fff;background:rgba(157,92,255,.85);font-size:24px">🎉</button>
<button id="atk" style="position:fixed;right:108px;bottom:calc(44px + var(--ksnav));z-index:11;width:74px;height:74px;border-radius:50%;border:3px solid #fff;background:rgba(232,72,63,.9);font-size:32px">⚔️</button>
<div id="pwrwrap" style="display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:calc(110px + var(--ksnav));z-index:11;width:220px;height:16px;border-radius:999px;background:rgba(6,20,40,.7);border:2px solid rgba(255,255,255,.5);overflow:hidden">
  <div id="pwr" style="height:100%;width:0%;background:linear-gradient(90deg,#4ade80,#facc15,#fb923c,#ef4444);box-shadow:0 0 12px rgba(250,204,21,.8)"></div>
</div>
<div class="hud" id="hpwrap" style="left:14px;top:158px;width:150px;height:16px;border-radius:999px;background:rgba(6,20,40,.65);border:2px solid rgba(255,255,255,.5);overflow:hidden">
  <div id="hpbar" style="height:100%;width:100%;background:linear-gradient(90deg,#4ade80,#a3e635);border-radius:999px;transition:width .18s"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/vendor/GLTFLoader.js"></script>
<script src="/vendor/DRACOLoader.js"></script>
<script src="/vendor/SkeletonUtils.js"></script>
<script src="/vendor/Sky.js"></script>
<script>
'use strict';
/* ============================================================
   STARVILLE ISLAND · clean rebuild
   Everything here uses the pipeline proven on 2026-07-12:
   · factory-wired GLBs (textures embedded from Synty's prefabs)
   · retarget: body rest-delta + raw arm locals (6 rigs verified)
   · linear color space everywhere, ACES, warm sun 1.05 / hemi 0.5
   ============================================================ */
const lin=h=>new THREE.Color(h).convertSRGBToLinear();

/* ---------- renderer ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(2,window.devicePixelRatio));
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(lin(0xaad6f2),0.0019); // tropical haze (key-art softness)
const cam=new THREE.PerspectiveCamera(50,1,0.1,1600);

function resize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h,false);
  cam.aspect=w/h;cam.updateProjectionMatrix();
}
addEventListener('resize',resize);resize();

/* ---------- lighting: golden hour, values from the closed-form palette check ---------- */
const sun=new THREE.DirectionalLight(lin(0xffe2a8),1.05);
sun.position.set(60,90,40);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-200;sun.shadow.camera.right=200;
sun.shadow.camera.top=200;sun.shadow.camera.bottom=-200;
sun.shadow.camera.far=400;sun.shadow.bias=-0.0006;
const hemi=new THREE.HemisphereLight(lin(0x9ecfff),lin(0x3e7a36),0.5);
scene.add(sun,hemi,new THREE.AmbientLight(0xffffff,0.05));

/* ---------- hand-painted tropical sky: rich colors by choice, not chance ---------- */
{
  const cv=document.createElement('canvas');cv.width=64;cv.height=1024;
  const g=cv.getContext('2d');
  const gr=g.createLinearGradient(0,0,0,1024);
  gr.addColorStop(0.00,'#0e4fc4');  // deep azure zenith
  gr.addColorStop(0.30,'#2a7de0');  // classic sky blue
  gr.addColorStop(0.55,'#59b6f0');  // bright tropical
  gr.addColorStop(0.74,'#a8e4f5');  // pale turquoise
  gr.addColorStop(0.86,'#ffe9c2');  // warm cream horizon
  gr.addColorStop(1.00,'#ffcf9e');  // peach at the waterline
  g.fillStyle=gr;g.fillRect(0,0,64,1024);
  const tex=new THREE.CanvasTexture(cv);tex.encoding=THREE.sRGBEncoding;
  const dome=new THREE.Mesh(new THREE.SphereGeometry(1200,24,20),
    new THREE.MeshBasicMaterial({map:tex,side:THREE.BackSide,fog:false}));
  scene.add(dome);
  // ☀️ the sun: bright core + soft golden glow, placed where the light comes from
  const sunDir=new THREE.Vector3(60,90,40).normalize();
  const mkGlow=(size,inner,outer,op)=>{
    const c2=document.createElement('canvas');c2.width=128;c2.height=128;
    const gg=c2.getContext('2d');
    const rg=gg.createRadialGradient(64,64,4,64,64,62);
    rg.addColorStop(0,inner);rg.addColorStop(1,outer);
    gg.fillStyle=rg;gg.fillRect(0,0,128,128);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c2),transparent:true,opacity:op,fog:false,depthWrite:false}));
    sp.scale.setScalar(size);
    sp.position.copy(sunDir).multiplyScalar(1100);
    scene.add(sp);
    return sp;
  };
  mkGlow(420,'rgba(255,244,200,0.9)','rgba(255,214,140,0)',0.85); // outer glow
  mkGlow(120,'rgba(255,255,240,1)','rgba(255,240,190,0)',1);      // the sun itself
  sun.position.copy(sunDir).multiplyScalar(160);
  // stylised cloud strips (flattened white blobs, slow drift)
  window.CLOUDS=[];
  const cm=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.92,fog:false});
  for(let i=0;i<16;i++){
    const w=30+Math.random()*70;
    const cl=new THREE.Mesh(new THREE.SphereGeometry(1,10,6),cm);
    cl.scale.set(w,4+Math.random()*4,10+Math.random()*10);
    const a=Math.random()*Math.PI*2,r=180+Math.random()*320;
    cl.position.set(Math.cos(a)*r,70+Math.random()*70,Math.sin(a)*r);
    cl.userData.sp=0.5+Math.random();
    scene.add(cl);CLOUDS.push(cl);
  }
}

/* ============================================================
   THE ISLAND · heightfield (lobed coast, volcano, terrace)
   ============================================================ */
const IC={x:0,z:0,R:156}; // 4x the island, same soul
const VOLC={x:16,z:-88,R:36,H:34};
function isleR(a){return IC.R+Math.sin(a*3+1.2)*16+Math.sin(a*7+0.5)*7}
function groundNat(x,z){ // the raw island, before anything is built on it
  const dx=x-IC.x,dz=z-IC.z,d=Math.hypot(dx,dz);
  let h=0;
  if(d<IC.R+14){
    const R=isleR(Math.atan2(dz,dx));
    if(d<R){
      h=Math.max(0.15,4.2*(1-Math.pow(d/R,1.6)));           // gentle dome
      if(dz<-8&&dx>-28){                                     // NE jungle terrace
        const s=Math.min(1,Math.max(0,(80-d)/8))*Math.min(1,Math.max(0,(d-48)/8));
        h=Math.max(h,4.0+s*3.0);
      }
      if(d>R-22)h*=Math.max(.06,(R-d)/22);                   // beach taper
    }
  }
  const vd=Math.hypot(x-VOLC.x,z-VOLC.z);                    // the volcano
  if(vd<VOLC.R){
    const t=1-vd/VOLC.R;
    h=Math.max(h,Math.pow(t,1.35)*VOLC.H*(vd<6?0.86:1));   // crater dip at the top
  }
  return h;
}

/* ============================================================
   🏀 ELIKAI'S COURT · THE PAD
   Declared HERE — above the terrain mesh — so the island is
   *built* with a level slab under the court instead of the
   court being dropped onto a hill afterwards. (That was the
   bug: the mesh baked its vertices before __courtReady flipped,
   so grass grew straight through the hardwood.)
   Regulation NBA full court: 28.65m x 15.24m (94ft x 50ft).
   ============================================================ */
const COURT={
  W:15.24, L:28.65,     // regulation full court
  cx:-58, cz:98,        // west shelf above the beach — flattest legal site on the island
  ry:0.9,               // heading (long axis points out to sea)
  pad:2.4,              // sand apron outside the painted lines
  blend:8,              // terrain ramps back to natural over this many metres
  y:0
};
COURT.y=groundNat(COURT.cx,COURT.cz);
COURT.cos=Math.cos(COURT.ry);COURT.sin=Math.sin(COURT.ry);
const CHW=COURT.W/2+COURT.pad, CHL=COURT.L/2+COURT.pad;
function courtLocal(x,z){ // world -> court-local (inverse of holder rotation.y = ry)
  const dx=x-COURT.cx, dz=z-COURT.cz;
  return {lx:dx*COURT.cos-dz*COURT.sin, lz:dx*COURT.sin+dz*COURT.cos};
}
function courtBlend(x,z){ // 1 = dead-flat pad · 0 = untouched island · smooth in between
  const L=courtLocal(x,z);
  const d=Math.max(Math.abs(L.lx)-CHW, Math.abs(L.lz)-CHL);
  if(d<=0)return 1;
  if(d>=COURT.blend)return 0;
  const t=1-d/COURT.blend;
  return t*t*(3-2*t); // smoothstep — no cliff edge
}
function onCourt(x,z){ // inside the painted lines
  const L=courtLocal(x,z);
  return Math.abs(L.lx)<COURT.W/2 && Math.abs(L.lz)<COURT.L/2;
}
const onPad=(x,z)=>courtBlend(x,z)>0.02; // nothing grows, spawns or scatters here

function groundAt(x,z){
  const h=groundNat(x,z);
  const w=courtBlend(x,z);
  return w>0 ? h+(COURT.y-h)*w : h;
}
const inOcean=(x,z)=>groundAt(x,z)<0.12;

/* ---------- island mesh with painted vertex colours ---------- */
{
  const S=400,SEG=150;
  const g=new THREE.PlaneGeometry(S,S,SEG,SEG);
  g.rotateX(-Math.PI/2);
  const pos=g.attributes.position;
  const cols=new Float32Array(pos.count*3);
  const sand=lin(0xecd29b),grass=lin(0x3fa14b),jung=lin(0x2f7d3a),rock=lin(0xc7a184),ash=lin(0x8a6f5e);
  const c=new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i);
    const h=groundAt(x,z);
    pos.setY(i,h);
    const vd=Math.hypot(x-VOLC.x,z-VOLC.z);
    if(vd<VOLC.R&&h>4.5)c.copy(rock).lerp(ash,Math.min(1,(h-4.5)/16));
    else if(h<0.75)c.copy(sand);
    else if(h<1.4)c.copy(sand).lerp(grass,(h-0.75)/0.65);
    else c.copy(grass).lerp(jung,Math.min(1,(h-1.4)/3));
    // hand-jitter so the ground never reads flat
    const j=(Math.sin(x*12.9+z*7.7)*0.5+0.5)*0.08;
    cols[i*3]=c.r*(1-j);cols[i*3+1]=c.g*(1-j*0.6);cols[i*3+2]=c.b*(1-j);
    // 🏀 the court pad reads as raked sand, so nothing green can peek under the hardwood
    const cb=courtBlend(x,z);
    if(cb>0){
      c.copy(sand);
      cols[i*3]  +=(c.r-cols[i*3])  *cb;
      cols[i*3+1]+=(c.g-cols[i*3+1])*cb;
      cols[i*3+2]+=(c.b-cols[i*3+2])*cb;
    }
  }
  g.setAttribute('color',new THREE.BufferAttribute(cols,3));
  g.computeVertexNormals();
  const isle=new THREE.Mesh(g,new THREE.MeshLambertMaterial({vertexColors:true}));
  isle.receiveShadow=true;
  scene.add(isle);
}

/* ---------- the sea: depth-gradient, gentle swell, shore foam ---------- */
let ocean,oceanPos,oceanPhase;
{
  const g=new THREE.PlaneGeometry(2400,2400,110,110);
  g.rotateX(-Math.PI/2);
  oceanPos=g.attributes.position;
  oceanPhase=new Float32Array(oceanPos.count);
  const cols=new Float32Array(oceanPos.count*3);
  const shallow=lin(0x66e6cf),deep=lin(0x0b5a9e),c=new THREE.Color();
  for(let i=0;i<oceanPos.count;i++){
    const x=oceanPos.getX(i),z=oceanPos.getZ(i);
    const R=isleR(Math.atan2(z-IC.z,x-IC.x));
    const dd=Math.max(0,Math.hypot(x-IC.x,z-IC.z)-R);
    c.copy(shallow).lerp(deep,Math.pow(Math.min(1,dd/58),0.72));
    cols[i*3]=c.r;cols[i*3+1]=c.g;cols[i*3+2]=c.b;
    oceanPhase[i]=Math.random()*6.28;
  }
  g.setAttribute('color',new THREE.BufferAttribute(cols,3));
  const oceanMat=new THREE.MeshPhongMaterial({color:0xffffff,vertexColors:true,
    shininess:220,specular:lin(0xdff2ff),transparent:true,opacity:.92});
  oceanMat.onBeforeCompile=(sh)=>{ // 🌊 stylized Gerstner waves + Fresnel rim — the free 'Water Pro' look
    sh.uniforms.uTime={value:0};
    oceanMat.userData.sh=sh;
    sh.vertexShader='uniform float uTime;\nvarying float vFoam;\n'+sh.vertexShader
      .replace('#include <begin_vertex>',
`#include <begin_vertex>
{
  vec3 wp = (modelMatrix * vec4(transformed,1.0)).xyz;
  float w1 = sin(dot(wp.xz, vec2(0.16,0.11)) + uTime*1.15);

  shiba:'animals_pack_ShibaInu.glb',

const assets={};
function loadAll(onProgress){
  const loader=new THREE.GLTFLoader();
  const draco=new THREE.DRACOLoader();
  draco.setDecoderPath('/vendor/draco/');
  loader.setDRACOLoader(draco);
  const names=Object.values(FILES);
  let done=0;
  return Promise.all(names.map(f=>new Promise(res=>{
    loader.load('/assets/'+f+'?v='+ASSET_V,g=>{
      g.scene.traverse(m=>{if(m.isMesh){m.castShadow=true;
        const mats=Array.isArray(m.material)?m.material:[m.material];
        for(const mm of mats){
          if(!mm)continue;
          if(mm.map)mm.map.anisotropy=4;
          if(mm.alphaTest>0){mm.transparent=false;mm.depthWrite=true;mm.needsUpdate=true} // crisp cutout cards
        }
      }});
      assets[f]={scene:g.scene,animations:g.animations||[]};
      done++;onProgress(done,names.length);res();
    },undefined,()=>{console.warn('missing',f);done++;onProgress(done,names.length);res()});
  })));
}
function spawn(file,targetH){
  const src=assets[file];if(!src)return null;
  const obj=THREE.SkeletonUtils?THREE.SkeletonUtils.clone(src.scene):src.scene.clone(true);
  const box=new THREE.Box3().setFromObject(obj);
  const size=new THREE.Vector3();box.getSize(size);
  obj.scale.setScalar(targetH/(size.y||1));
  const box2=new THREE.Box3().setFromObject(obj);
  obj.position.y=-box2.min.y;
  const root=new THREE.Group();root.add(obj);
  root.userData.inner=obj;
  return root;
}
const put=(key,x,z,h,ry)=>{

function skinMat(color,opt){
  return new THREE.MeshLambertMaterial(Object.assign({color:lin(color),skinning:true},opt||{}));
}
function hideParts(root,keys){
  root.userData.inner.traverse(m=>{

function paintPart(root,key,color){
  root.userData.inner.traverse(m=>{

  });

function bone(root,name){
  const inner=root.userData.inner;
  return inner.getObjectByName(name)                       // as authored
      || inner.getObjectByName(name.replace(/[.\-\s]/g,'')) // GLTFLoader strips '.' — 'upperarm.r' -> 'upperarmr'
      || inner.getObjectByName(name.replace(/\./g,'_'));
}
// a tattoo sleeve that actually follows the limb: the child bone's local
// position IS the limb direction, so we can align without guessing axes
function inkBand(root,boneName,childName,frac,r,h,mat){
  const b=bone(root,boneName);
  if(!b)return;
  const want=childName.replace(/[.\-\s]/g,'');
  const kid=b.children.find(c=>c.name.replace(/[.\-\s]/g,'')===want)||b.children.find(c=>c.isBone);
  const dir=kid?kid.position.clone():new THREE.Vector3(0,1,0);
  const len=dir.length()||0.3;
  dir.normalize();
  const band=new THREE.Mesh(new THREE.CylinderGeometry(r,r*0.92,h,14,1,true),mat);
  band.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
  band.position.copy(dir).multiplyScalar(len*frac);
  b.add(band);
}
function tribalTex(){ // Polynesian-style banding: transparent everywhere but the ink
  const cv=document.createElement('canvas');cv.width=128;cv.height=128;
  const g=cv.getContext('2d');
  g.clearRect(0,0,128,128);
  g.fillStyle='#1b1410';
  for(let row=0;row<4;row++){
    const y=row*32;
    for(let i=0;i<8;i++){ // rows of teeth
      const x=i*16;
      g.beginPath();g.moveTo(x,y+26);g.lineTo(x+8,y+8);g.lineTo(x+16,y+26);g.closePath();g.fill();
    }
    g.fillRect(0,y+27,128,4);
  }
  g.strokeStyle='#1b1410';g.lineWidth=3;
  for(let i=0;i<128;i+=16){g.beginPath();g.arc(i,64,7,Math.PI,0);g.stroke()} // wave motif
  const t=new THREE.CanvasTexture(cv);t.encoding=THREE.sRGBEncoding;
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
function inkMat(rx,ry){
  const t=tribalTex();t.repeat.set(rx,ry);
  return new THREE.MeshLambertMaterial({map:t,transparent:true,alphaTest:0.35,
    side:THREE.DoubleSide,depthWrite:false});
}

function nativeActions(root,anims){ // Quaternius clips ship inside the GLB — just normalize names
  const mixer=new THREE.AnimationMixer(root);
  const acts={},byName={};
  for(const clip of anims){
    const k=clip.name.split('|').pop();
    byName[k]=mixer.clipAction(clip);
    acts[k]=byName[k];
  }
  const prefer={Idle:['Idle','Unarmed_Idle'],Walk:['Walking_A','Walk','Walking_B'],
    Run:['Running_A','Run','Running_B'],Jump:['Jump_Full_Short','Jump_Full_Long','Jump'],
    Cheer:['Cheer'],Sit:['Sit_Floor_Idle'],Magic:['Spellcast_Shoot','Spellcasting','Interact'],
    Attack:['1H_Melee_Attack_Slice_Diagonal','2H_Melee_Attack_Chop','1H_Melee_Attack_Stab','1H_Melee_Attack_Chop','Spellcast_Shoot'],
    Hit:['Hit_A','Hit_B'],Down:['Death_A']};
  for(const want in prefer){
    for(const cand of prefer[want])if(byName[cand]){acts[want]=byName[cand];break}
    if(!acts[want])for(const k in byName)if(k.includes(want)){acts[want]=byName[k];break}
  }
  if(!acts.Walk&&acts.Run)acts.Walk=acts.Run;
  return {mixer,acts};
}
let player,mixer,actions={},current=null;
function playAnim(name,fade=0.18){
  if(current===name||!actions[name])return;
  if(current&&actions[current])actions[current].fadeOut(fade);
  actions[name].reset().fadeIn(fade).play();
  current=name;
}

let frondTex=null;
function getFrondTex(){
  if(frondTex)return frondTex;
  const cv=document.createElement('canvas');cv.width=128;cv.height=256;
  const g=cv.getContext('2d');
  g.clearRect(0,0,128,256);
  // a tapered frond with notched edges
  g.fillStyle='#2f9e46';
  g.beginPath();g.moveTo(64,0);
  for(let i=0;i<=10;i++){
    const t=i/10,w=Math.sin(t*Math.PI)*46;
    g.lineTo(64+w*(i%2?0.72:1),t*256);
  }
  for(let i=10;i>=0;i--){
    const t=i/10,w=Math.sin(t*Math.PI)*46;
    g.lineTo(64-w*(i%2?0.72:1),t*256);
  }
  g.closePath();g.fill();
  const gr=g.createLinearGradient(0,0,0,256);
  gr.addColorStop(0,'rgba(255,240,150,0.35)');gr.addColorStop(1,'rgba(0,60,20,0.35)');
  g.globalCompositeOperation='source-atop';g.fillStyle=gr;g.fillRect(0,0,128,256);
  frondTex=new THREE.CanvasTexture(cv);
  frondTex.encoding=THREE.sRGBEncoding;
  return frondTex;
}
function makePalm(h){
  const g=new THREE.Group();
  const barkM=new THREE.MeshLambertMaterial({color:lin(0x8a6a44)});
  const segs=6;let px=0,py=0,tilt=(Math.random()-0.5)*0.16;
  for(let i=0;i<segs;i++){
    const t=i/segs;
    const seg=new THREE.Mesh(new THREE.CylinderGeometry(0.16*(1-t*0.5)*h/7,0.2*(1-t*0.45)*h/7,h/segs,7),barkM);
    px+=tilt*h/segs*i*0.5;
    seg.position.set(px,py+h/segs/2,0);
    seg.rotation.z=-tilt*i*0.8;
    py+=h/segs*0.98;
    g.add(seg);
  }
  const crown=new THREE.Group();crown.position.set(px,py,0);
  const fm=new THREE.MeshLambertMaterial({map:getFrondTex(),alphaTest:0.4,side:THREE.DoubleSide});
  for(let i=0;i<8;i++){
    const fr=new THREE.Mesh(new THREE.PlaneGeometry(h*0.24,h*0.66,1,6),fm);
    // droop: bend the frond down along its length
    const pos=fr.geometry.attributes.position;
    for(let vi=0;vi<pos.count;vi++){
      const y=pos.getY(vi),t=(y+h*0.33)/(h*0.66);
      pos.setZ(vi,-Math.pow(1-t,2)*h*0.14);
    }
    pos.needsUpdate=true;fr.geometry.computeVertexNormals();
    fr.position.y=h*0.3;
    fr.rotation.set(-0.55-Math.random()*0.25,i/8*Math.PI*2,0);
    const hold=new THREE.Group();hold.rotation.y=i/8*Math.PI*2;
    fr.rotation.y=0;hold.add(fr);crown.add(hold);
  }
  for(let i=0;i<3;i++){ // coconuts
    const nut=new THREE.Mesh(new THREE.SphereGeometry(h*0.045,8,6),new THREE.MeshLambertMaterial({color:lin(0x5f4a2e)}));
    nut.position.set(Math.cos(i*2.1)*h*0.06,-h*0.02,Math.sin(i*2.1)*h*0.06);
    crown.add(nut);
  }
  g.add(crown);
  g.traverse(m=>{if(m.isMesh)m.castShadow=true});
  return g;
}
function makeCoral(){
  const g=new THREE.Group();
  const cols=[0xff5f8f,0xff8c42,0x27e6ff,0x9d5cff,0x37ffb0];
  const n=2+Math.floor(Math.random()*3);

    const geo=new THREE.IcosahedronGeometry(0.4+Math.random()*0.5,0);
    const pos=geo.attributes.position;
    for(let vi=0;vi<pos.count;vi++)

    geo.computeVertexNormals();
    const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:lin(cols[(Math.random()*cols.length)|0])}));
    m.position.set((Math.random()-0.5)*1.2,0.3,(Math.random()-0.5)*1.2);
    g.add(m);
  }
  return g;
}

const critters=[];

  const src=assets[FILES[fileKey]];

function critAnim(cr,name){
  if(cr.cur===name||!cr.acts[name])return;
  if(cr.cur&&cr.acts[cr.cur])cr.acts[cr.cur].fadeOut(0.2);
  cr.acts[name].reset().fadeIn(0.2).play();

}
let buddy=null;
function tickCritters(dt){
  for(const cr of critters){
    const dx=cr.tx-cr.root.position.x,dz=cr.tz-cr.root.position.z;
    const dist=Math.hypot(dx,dz);
    if(cr.isBuddy){ // the shiba shadows the player
      const bd=Math.hypot(P.x-cr.root.position.x,P.z-cr.root.position.z);
      if(bd>3.4){cr.tx=P.x+Math.sin(P.yaw+2.4)*1.6;cr.tz=P.z+Math.cos(P.yaw+2.4)*1.6}
    }else if(dist<0.5){
      cr.wait-=dt;
      if(cr.wait<=0){
        cr.wait=3+Math.random()*6;
        for(let t=0;t<10;t++){
          const nx=cr.root.position.x+(Math.random()-0.5)*22,nz=cr.root.position.z+(Math.random()-0.5)*22;
          if(groundAt(nx,nz)>0.7){cr.tx=nx;cr.tz=nz;break}
        }
      }
    }
    if(dist>0.5){
      const sp=(cr.isBuddy&&dist>6?7.5:2.6)*dt;
      const ny=Math.atan2(dx,dz);
      cr.root.rotation.y+=(((ny-cr.root.rotation.y+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*8);
      cr.root.position.x+=Math.sin(ny)*Math.min(sp,dist);
      cr.root.position.z+=Math.cos(ny)*Math.min(sp,dist);
      critAnim(cr,cr.isBuddy&&dist>6?'Run':'Walk');
    }else critAnim(cr,'Idle');
    cr.root.position.y=groundAt(cr.root.position.x,cr.root.position.z);
    cr.mixer.update(dt);
  }
}

async function presenceTick(){

          +'<span style="position:relative;flex:1;min-width:96px;height:11px;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden;box-shadow:inset 0 0 4px rgba(0,0,0,.5)">'

        +'</div>';
      }).join('');

        },5000);
      }
    }
    { // ⚔️ incoming battle damage — every swing counts, exactly once
      const hits=r.hits||[];
      if(hits.length){
        const total=hits.reduce((a,h)=>a+(h.dmg||1),0);
        playerHurt(total,hits[hits.length-1].from,true); // force: the i-frame must not eat the batch
      }
    }
    for(const ev of r.events||[]){ // 🎆 shared spectacle
      if(ev.id>evAfter)evAfter=ev.id;
      if(ev.from===myName)continue; // already celebrated locally
      if(ev.kind==='swish')celebrate(ev.from,ev.pts,ev.x,ev.z);
      else if(ev.kind==='boom')ballExplode(ev.x,ev.z,false);
    }
    const seen=new Set();
    for(const o of r.others||[]){
      if(o.name===myName)continue;
      seen.add(o.name);
      let rm=remotes.get(o.name);
      if(rm&&rm.hero!==o.hero){scene.remove(rm.root);remotes.delete(o.name);rm=null}
      if(!rm){rm=spawnRemote(o);if(!rm)continue;remotes.set(o.name,rm)}
      { // snapshot interpolation: glide between updates instead of sprint-and-freeze
        const now3=performance.now();
        rm.fx=rm.root.position.x;rm.fz=rm.root.position.z;
        rm.gx=o.x;rm.gz=o.z;rm.ty=o.y||0;rm.tr=o.ry||0;
        rm.dur=Math.min(1900,Math.max(500,now3-(rm.last||now3-1200)));
        rm.t0=now3;rm.last=now3;
        rm.spd=Math.hypot(rm.gx-rm.fx,rm.gz-rm.fz)/(rm.dur/1000);
        rm.ballState=o.ball||null; // 🏀 friends' shots replay with local physics
      }
    }
    for(const [nm,rm] of remotes)
      if(!seen.has(nm)&&performance.now()-rm.last>12000){scene.remove(rm.root);remotes.delete(nm)}
  }catch(e){}
}
setInterval(presenceTick,1200);
function tickRemotes(dt){
  const now3=performance.now();
  for(const rm of remotes.values()){
    if(rm.t0){ // constant-velocity glide across the update window
      const k=Math.min(1.15,(now3-rm.t0)/rm.dur); // slight overshoot window extrapolates through late packets
      rm.root.position.x=rm.fx+(rm.gx-rm.fx)*k;
      rm.root.position.z=rm.fz+(rm.gz-rm.fz)*k;
    }
    {
      const rg=groundAt(rm.root.position.x,rm.root.position.z);
      rm.root.position.y=(rg<0.12?0.55:rg)+(rm.ty||0); // surfers float, walkers walk
    }
    rm.root.rotation.y+=(((rm.tr-rm.root.rotation.y+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*7);
    const spd=rm.spd||0;
    remoteAnim(rm,spd>6?'Run':spd>0.4?'Walk':'Idle');
    rm.mixer&&rm.mixer.update(dt);
    tickRemoteBall(rm,dt);
  }
}
function tickRemoteBall(rm,dt){
  const bs=rm.ballState;
  if(!bs||!bs.m){ // no ball — hide theirs
    if(rm.ballMesh){rm.ballMesh.visible=false}
    return;
  }
  if(!rm.ballMesh){
    rm.ballMesh=ball?ball.clone():null;
    if(!rm.ballMesh)return;
    scene.add(rm.ballMesh);
    rm.ballSim=null;
  }
  rm.ballMesh.visible=true;
  if(bs.m==='carried'){
    rm.ballSim=null;
    rm.ballMesh.position.set(
      rm.root.position.x+Math.sin(rm.root.rotation.y+0.5)*0.55,
      rm.root.position.y+1.05,
      rm.root.position.z+Math.cos(rm.root.rotation.y+0.5)*0.55);
  }else{ // flying: seed a local sim from the snapshot, then let physics fly it smoothly
    if(!rm.ballSim||rm.ballSim.seed!==bs.t){
      rm.ballSim={seed:bs.t,x:bs.x,y:bs.y,z:bs.z,vx:bs.vx,vy:bs.vy,vz:bs.vz};
    }
    const b2=rm.ballSim;
    b2.vy-=13.5*dt;
    b2.x+=b2.vx*dt;b2.y+=b2.vy*dt;b2.z+=b2.vz*dt;
    const g0b=groundAt(b2.x,b2.z);
    if(b2.y<g0b+0.34){
      b2.y=g0b+0.34;
      if(Math.abs(b2.vy)>1.6){b2.vy*=-0.52;b2.vx*=0.8;b2.vz*=0.8}
      else{b2.vy=0;b2.vx*=0.9;b2.vz*=0.9}
    }
    rm.ballMesh.rotation.x+=dt*9;
    rm.ballMesh.position.set(b2.x,b2.y,b2.z);
  }
}

let chatAfter=0,chatBoot=true;
async function chatPoll(){
  if(!started)return;
  try{
    const r=await fetch('/api/chat?after='+chatAfter).then(x=>x.json());
    const msgs=(r&&r.messages)||r||[];
    if(!Array.isArray(msgs))return;
    let fresh=0;
    for(const m of msgs){
      if(m.id>chatAfter)chatAfter=m.id;
      const who=(m.user_name||m.cast_name||'Star')+(m.cast_name?' 🤖':'');
      const body=m.body||(m.has_image?'📷 photo':'');
      if(!body)continue;
      chatRow(who,body,false);              // the full log always fills — that's the scrollback
      if(chatBoot)continue;                 // …but don't replay history as floating bubbles
      fresh++;
      if(!chatOpen)chatBubble(who,body);    // bubbles only when the sheet is shut
    }
    if(fresh&&!chatOpen)document.getElementById('chatDot').classList.add('on');
    chatBoot=false;
  }catch(e){}
}

const VC={state:'off',peers:new Map(),stream:null,timer:null,gateT:null,ctx:null,meter:null,lastVoice:0,needsUnlock:false};

const micBtn=document.getElementById('mic'),chipsEl=document.getElementById('vchips');
function vcUI(){

async function vcJoinOnly(){
  try{
    const jn=await fetch('/api/voice/join',{method:'POST'}).then(x=>x.json());
    if(jn&&jn.error)throw new Error(jn.error);
    for(const pr of (jn&&jn.roster)||[])vcOffer(pr.id,pr.name);
    VC.timer=setInterval(vcPoll,1100);
  }catch(e){
    toast('🎙️ Voice room unreachable — are you logged into the club?');
    VC.state='off';VC.stream?.getTracks().forEach(t=>t.stop());VC.stream=null;
  }
}
function vcNewPeer(id,name){
  const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  const pr={pc,name,audio:null,an:null};
  VC.peers.set(id,pr);
  if(VC.stream)for(const tr of VC.stream.getAudioTracks())pc.addTrack(tr,VC.stream);
  else pc.addTransceiver('audio',{direction:'recvonly'});
  pc.onicecandidate=e=>{if(e.candidate)vcSignal(id,{ice:e.candidate})};
  pc.ontrack=e=>{
    const au=document.createElement('audio');
    au.autoplay=true;au.playsInline=true;au.srcObject=e.streams[0];au.volume=0.82;
    au.style.display='none';document.body.appendChild(au);pr.audio=au;
    au.play().catch(()=>{VC.needsUnlock=true}); // autoplay policy: retry on next tap
    toast('🔊 Voice connected: '+(pr.name||'friend'));
    try{
      VC.ctx=VC.ctx||new (window.AudioContext||window.webkitAudioContext)();
      const src=VC.ctx.createMediaStreamSource(e.streams[0]);
      pr.an=VC.ctx.createAnalyser();pr.an.fftSize=256;src.connect(pr.an);
    }catch(err){}
  };
  pc.onconnectionstatechange=()=>{if(['failed','closed','disconnected'].includes(pc.connectionState))vcDrop(id)};
  vcUI();
  return pr;
}
function vcDrop(id){
  const pr=VC.peers.get(id);if(!pr)return;
  try{pr.pc.close()}catch(e){}
  pr.audio?.remove();VC.peers.delete(id);vcUI();
}
const vcSignal=(to,data)=>fetch('/api/voice/signal',{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({to,data})}).catch(()=>{});
async function vcHandle(from,data){
  let pr=VC.peers.get(from)||vcNewPeer(from,data.name);
  try{
    if(data.sdp){
      await pr.pc.setRemoteDescription(data.sdp);
      if(data.sdp.type==='offer'){
        const ans=await pr.pc.createAnswer();
        await pr.pc.setLocalDescription(ans);
        vcSignal(from,{sdp:pr.pc.localDescription});
      }
    }else if(data.ice)await pr.pc.addIceCandidate(data.ice);
  }catch(e){}
}
async function vcOffer(id,name){
  const pr=vcNewPeer(id,name);
  const off=await pr.pc.createOffer();
  await pr.pc.setLocalDescription(off);
  vcSignal(id,{sdp:pr.pc.localDescription});
}
async function vcPoll(){
  if(VC.state==='off')return;
  try{
    const r=await fetch('/api/voice/poll',{method:'POST'}).then(x=>x.json());
    if(r.gone){
      const jn=await fetch('/api/voice/join',{method:'POST'}).then(x=>x.json());
      for(const pr of jn.roster||[])if(!VC.peers.has(pr.id))vcOffer(pr.id,pr.name);
      return;
    }
    const ids=new Set((r.roster||[]).map(p2=>p2.id));
    for(const id of [...VC.peers.keys()])if(!ids.has(id))vcDrop(id);
    for(const pr of r.roster||[])if(VC.peers.has(pr.id))VC.peers.get(pr.id).name=pr.name;
    for(const m of r.msgs||[])await vcHandle(m.from,m.data);
    const buf=new Uint8Array(128);
    for(const [id,pr] of VC.peers){
      if(!pr.an)continue;
      pr.an.getByteFrequencyData(buf);
      let lvl=0;for(let i=0;i<buf.length;i++)lvl+=buf[i];
      const chip=chipsEl.querySelector('[data-vid="'+id+'"]');
      if(chip){const talk=lvl/buf.length>18;
        chip.style.borderColor=talk?'#4ade80':'rgba(255,255,255,.4)';
        chip.style.boxShadow=talk?'0 0 10px rgba(74,222,128,.9)':'none'}
    }
  }catch(e){}
}
async function voiceToggle(){
  if(VC.state==='off'){
    // pre-flight: explain exactly what's wrong instead of failing silently
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      toast('🎙️ This browser blocks mic access — try Chrome or Safari over https');
      return;
    }
    try{
      if(navigator.permissions&&navigator.permissions.query){
        const st=await navigator.permissions.query({name:'microphone'}).catch(()=>null);
        if(st&&st.state==='denied'){
          toast('🎙️ Mic is BLOCKED for this site — tap the 🔒 by the address bar → Site settings → allow Microphone, then reload');
          VC.state='listen';await vcJoinOnly();vcUI();return;
        }
      }
    }catch(e){}
    try{
      try{
        VC.stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
      }catch(e1){ // some devices reject fancy constraints — plain request re-prompts
        VC.stream=await navigator.mediaDevices.getUserMedia({audio:true});
      }
      toast('🎙️ Mic LIVE — friends can hear you!');
      for(const tr of VC.stream.getAudioTracks())tr.enabled=true; // open until the gate proves it works
      VC.lastVoice=performance.now();
      VC.state='live';
      try{ // VAD gate: only transmit while talking (kills same-room echo loops)
        VC.ctx=VC.ctx||new (window.AudioContext||window.webkitAudioContext)();
        const src=VC.ctx.createMediaStreamSource(VC.stream);
        VC.meter=VC.ctx.createAnalyser();VC.meter.fftSize=256;src.connect(VC.meter);
        VC.meterAlive=0;VC.gateBypass=false;
        VC.gateT=setInterval(()=>{
          if(VC.state!=='live'||!VC.stream)return;
          try{VC.ctx&&VC.ctx.state==='suspended'&&VC.ctx.resume()}catch(e){}
          if(VC.gateBypass){for(const tr of VC.stream.getAudioTracks())tr.enabled=true;return}
          const buf=new Uint8Array(128);VC.meter.getByteFrequencyData(buf);
          let lvl=0;for(let i=0;i<buf.length;i++)lvl+=buf[i];lvl/=buf.length;
          const now=performance.now();
          if(lvl>1)VC.meterAlive=now;
          if(now-(VC.meterAlive||0)>4000){ // meter is dead — FAIL OPEN: always transmit, never silence
            VC.gateBypass=true;
            for(const tr of VC.stream.getAudioTracks())tr.enabled=true;
            return;
          }
          if(lvl>9)VC.lastVoice=now;
          const open=now-VC.lastVoice<900;
          for(const tr of VC.stream.getAudioTracks())tr.enabled=open;
        },120);
      }catch(e){}
    }catch(e){
      VC.stream=null;VC.state='listen';
      toast(e&&e.name==='NotAllowedError'
        ?'🎙️ Mic permission denied — you can hear friends but not talk. Allow the mic in browser settings to speak'
        :'🎙️ Mic unavailable ('+(e&&e.name||'error')+') — listen-only mode');
    }
    await vcJoinOnly();
  }else if(VC.state==='live'){
    for(const tr of VC.stream.getAudioTracks())tr.enabled=false;
    VC.state='muted';
  }else{
    clearInterval(VC.timer);clearInterval(VC.gateT);VC.timer=VC.gateT=null;
    fetch('/api/voice/leave',{method:'POST'}).catch(()=>{});
    for(const id of [...VC.peers.keys()])vcDrop(id);
    VC.stream?.getTracks().forEach(t=>t.stop());VC.stream=null;
    VC.state='off';
  }
  vcUI();
}

/* ============================================================
   CONTROLS · third-person: orbit camera + move-relative-to-camera
   ============================================================ */
const keys={};
const KEYMAP={arrowup:'w',arrowdown:'s',arrowleft:'a',arrowright:'d'};
const normKey=k=>{k=k.toLowerCase();return KEYMAP[k]||k};
addEventListener('keydown',e=>{
  if(e.target&&e.target.tagName==='INPUT')return; // typing in chat, not steering
  keys[normKey(e.key)]=true;if(e.key===' '||e.key.startsWith('Arrow'))e.preventDefault()});
addEventListener('keyup',e=>{
  if(e.target&&e.target.tagName==='INPUT')return;
  keys[normKey(e.key)]=false});
let camYaw=2.6,camPitch=0.32,camDist=9.5,dragId=null,lx=0,ly=0;
let slopeTilt=0,lookReleasedAt=0;
let smBoom=9.5,smLead=0,followRamp=0;
const lookTarget=new THREE.Vector3(0,2,20);
let pinchId2=null,pinchD0=0,pinchDist0=0;
addEventListener('wheel',e=>{camDist=Math.max(5.5,Math.min(16,camDist+e.deltaY*0.01))},{passive:true});
let joyId=null,jx=0,jy=0;
const joyEl=document.getElementById('joy'),joyKnob=joyEl.querySelector('i');
canvas.addEventListener('pointerdown',e=>{
  if(dragId===null){dragId=e.pointerId;lx=e.clientX;ly=e.clientY}
  else if(pinchId2===null){
    pinchId2=e.pointerId;
    pinchD0=Math.hypot(e.clientX-lx,e.clientY-ly);
    pinchDist0=camDist;
  }
});
addEventListener('pointermove',e=>{
  if(e.pointerId===dragId){
    camYaw-=(e.clientX-lx)*0.0052;
    camPitch=Math.max(0.06,Math.min(1.1,camPitch+(e.clientY-ly)*0.0038));
    lx=e.clientX;ly=e.clientY;
  }
  if(e.pointerId===pinchId2&&dragId!==null){
    const d=Math.hypot(e.clientX-lx,e.clientY-ly);
    if(pinchD0>10)camDist=Math.max(5.5,Math.min(16,pinchDist0*(pinchD0/Math.max(30,d))));
  }
  if(e.pointerId===joyId){
    const r=joyEl.getBoundingClientRect();
    const dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2);
    const m=Math.min(1,Math.hypot(dx,dy)/46);
    const a=Math.atan2(dy,dx);
    jx=Math.cos(a)*m;jy=Math.sin(a)*m;
    joyKnob.style.transform=`translate(${jx*32}px,${jy*32}px)`;
  }
});
addEventListener('pointerup',e=>{
  if(e.pointerId===dragId){dragId=null;lookReleasedAt=performance.now()}
  if(e.pointerId===pinchId2)pinchId2=null;
  if(e.pointerId===joyId){joyId=null;jx=jy=0;joyKnob.style.transform=''}
});
joyEl.addEventListener('pointerdown',e=>{joyId=e.pointerId;e.stopPropagation()});
document.getElementById('exitBtn').addEventListener('pointerdown',e=>{e.stopPropagation()});
document.getElementById('exitBtn').addEventListener('click',()=>{
  try{fetch('/api/voice/leave',{method:'POST'})}catch(e){}
  location.assign('/#arcade');
});
let wantJump=false;
document.getElementById('jump').addEventListener('pointerdown',e=>{wantJump=true;e.stopPropagation()});
let emoteUntil=0;const EMOTES=['Cheer','Magic','Sit'];let emoteIx=0;
document.getElementById('emote').addEventListener('pointerdown',e=>{
  e.stopPropagation();
  const em=EMOTES[emoteIx++%EMOTES.length];
  if(actions[em]){playAnim(em,0.12);emoteUntil=performance.now()+(em==='Sit'?4000:1800)}

/* ============================================================
   🏀 ELIKAI'S COURT · walk to the ball to pick it up ·
   hold ⚔️ to charge · release to launch — up to 100 feet!
   ============================================================ */
const HOOP={ry:COURT.ry,rimY:0,rimW:null,courtC:{x:COURT.cx,z:COURT.cz}};
const RIMS=[]; // both hoops score
const c2w=(lx,lz)=>({x:COURT.cx+lx*COURT.cos+lz*COURT.sin, z:COURT.cz-lx*COURT.sin+lz*COURT.cos});

/* one regulation hoop: cantilever pole *behind* the baseline, rim 1.575m in.
   Group origin sits directly under the rim centre, facing local +Z (into the court). */
function makeHoopAt(lz,flip){
  const g=new THREE.Group();
  const steel=new THREE.MeshLambertMaterial({color:lin(0x8a93a5)});
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.10,0.13,4.2,10),steel);
  pole.position.set(0,2.1,-2.0);g.add(pole);                       // outside the baseline
  const arm=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.14,1.6),steel);
  arm.position.set(0,3.72,-1.2);g.add(arm);                        // cantilever out to the board
  const brace=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,1.35),steel);
  brace.position.set(0,3.16,-1.32);brace.rotation.x=-0.42;g.add(brace);
  // backboard (front face lands exactly 1.2m inside the baseline)
  const cv=document.createElement('canvas');cv.width=144;cv.height=96;
  const gg=cv.getContext('2d');
  gg.fillStyle='#f4f7fb';gg.fillRect(0,0,144,96);
  gg.strokeStyle='#e8483f';gg.lineWidth=6;gg.strokeRect(48,36,48,40); // the shooter's square
  gg.strokeStyle='#c9d2df';gg.lineWidth=5;gg.strokeRect(3,3,138,90);
  const bbT=new THREE.CanvasTexture(cv);bbT.encoding=THREE.sRGBEncoding;
  const board=new THREE.Mesh(new THREE.BoxGeometry(1.83,1.07,0.07),
    new THREE.MeshLambertMaterial({map:bbT}));
  board.position.set(0,3.5,-0.505);g.add(board);                   // rim is 0.375m off the face
  // the rim — dead centre of the group
  const rim=new THREE.Mesh(new THREE.TorusGeometry(0.4572,0.035,8,22),
    new THREE.MeshLambertMaterial({color:lin(0xff7a1a),emissive:lin(0x5f2400)}));
  rim.rotation.x=Math.PI/2;rim.position.set(0,3.05,0);g.add(rim);
  const net=new THREE.Mesh(new THREE.CylinderGeometry(0.44,0.26,0.52,10,3,true),
    new THREE.MeshBasicMaterial({color:0xffffff,wireframe:true,transparent:true,opacity:0.72}));
  net.position.set(0,2.79,0);g.add(net);
  g.traverse(m=>{if(m.isMesh)m.castShadow=true});
  const w=c2w(0,lz);
  g.position.set(w.x,COURT.y,w.z);
  g.rotation.y=COURT.ry+(flip?Math.PI:0);
  scene.add(g);
  RIMS.push({x:w.x,y:COURT.y+3.05,z:w.z});
}
function makeHoop(){
  makeHoopAt(-(COURT.L/2-1.575),false); // north basket
  makeHoopAt( (COURT.L/2-1.575),true);  // south basket
  HOOP.rimW=RIMS[0];HOOP.rimY=RIMS[0].y;
}

function makeCourt(){
  /* 🏀 REGULATION, painted properly:
     28.65 x 15.24 · rim 1.575 in from baseline · key 4.88 wide x 5.79 deep
     FT circle r1.83 · restricted arc r1.22 · 3pt arc r7.24 with 0.914 corner inset */
  const W=COURT.W,L=COURT.L,PX=26;
  const cw=Math.round(W*PX), ch=Math.round(L*PX);
  const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;
  const g=cv.getContext('2d');
  const X=lx=>cw/2+lx*PX, Y=lz=>ch/2+lz*PX;   // canvas top = court-local -Z
  // hardwood
  g.fillStyle='#d8b781';g.fillRect(0,0,cw,ch);
  g.strokeStyle='rgba(150,110,62,0.20)';g.lineWidth=2;
  for(let lx=-W/2;lx<=W/2;lx+=0.85){g.beginPath();g.moveTo(X(lx),0);g.lineTo(X(lx),ch);g.stroke()} // planks
  g.lineCap='round';g.lineJoin='round';
  const white='#fdfdf6', paint='rgba(255,140,66,0.32)', orange='#ff8c42';
  const T3=Math.atan2(2.729,6.706); // where the 3pt arc meets the corner straights
  for(const e of [-1,1]){
    const base=e*L/2, rim=e*(L/2-1.575), ft=e*(L/2-5.79);
    // the key
    g.fillStyle=paint;
    g.fillRect(X(-2.44),Math.min(Y(base),Y(ft)),4.88*PX,Math.abs(Y(ft)-Y(base)));
    g.strokeStyle=orange;g.lineWidth=5;
    g.strokeRect(X(-2.44),Math.min(Y(base),Y(ft)),4.88*PX,Math.abs(Y(ft)-Y(base)));
    // free-throw circle
    g.strokeStyle=white;g.lineWidth=5;
    g.beginPath();g.arc(X(0),Y(ft),1.83*PX,0,7);g.stroke();
    // restricted arc under the rim
    g.lineWidth=4;
    g.beginPath();
    if(e<0)g.arc(X(0),Y(rim),1.22*PX,0,Math.PI);
    else    g.arc(X(0),Y(rim),1.22*PX,Math.PI,Math.PI*2);
    g.stroke();
    // the three-point line: two corner straights + the big arc
    g.lineWidth=6;
    g.beginPath();
    g.moveTo(X(-6.706),Y(base));g.lineTo(X(-6.706),Y(e*(L/2-4.304)));
    g.moveTo(X( 6.706),Y(base));g.lineTo(X( 6.706),Y(e*(L/2-4.304)));
    g.stroke();
    g.beginPath();
    if(e<0)g.arc(X(0),Y(rim),7.24*PX,T3,Math.PI-T3);
    else    g.arc(X(0),Y(rim),7.24*PX,-(Math.PI-T3),-T3);
    g.stroke();
  }
  // 🚀 DOWNTOWN: the half-court line (≈14.3m from either rim — cross it and it's +20)
  g.strokeStyle='#2bd9ff';g.lineWidth=7;g.setLineDash([16,11]);
  g.beginPath();g.moveTo(X(-W/2),Y(0));g.lineTo(X(W/2),Y(0));g.stroke();
  g.setLineDash([]);
  // centre circle + a Starville star
  g.strokeStyle=white;g.lineWidth=5;
  g.beginPath();g.arc(X(0),Y(0),1.83*PX,0,7);g.stroke();
  g.fillStyle='#2bd9ff';g.beginPath();
  for(let i=0;i<10;i++){const r=(i%2?0.5:1.25)*PX,a=-Math.PI/2+i*Math.PI/5;
    const px=X(0)+Math.cos(a)*r,py=Y(0)+Math.sin(a)*r;i?g.lineTo(px,py):g.moveTo(px,py)}
  g.closePath();g.fill();
  // boundary last, so it sits on top of everything
  g.strokeStyle=white;g.lineWidth=8;
  g.strokeRect(4,4,cw-8,ch-8);

  const t=new THREE.CanvasTexture(cv);t.encoding=THREE.sRGBEncoding;
  t.anisotropy=renderer.capabilities.getMaxAnisotropy?renderer.capabilities.getMaxAnisotropy():1;
  const court=new THREE.Mesh(new THREE.PlaneGeometry(W,L),
    new THREE.MeshLambertMaterial({map:t}));
  court.rotation.x=-Math.PI/2;   // canvas-top -> court-local -Z
  const holder=new THREE.Group();
  holder.rotation.y=COURT.ry;
  holder.position.set(COURT.cx,COURT.y+0.045,COURT.cz); // the pad under it is already dead flat
  holder.add(court);
  court.receiveShadow=true;
  scene.add(holder);
  HOOP.courtC={x:COURT.cx,z:COURT.cz};
  window.__courtY=COURT.y;window.__courtReady=true;
}

/* ============================================================
   🌊 THE VOLCANO WATERSLIDE
   Climb the crater · drop in · 125m of chute · and get FIRED
   199m across the island. (Tuned in a headless sim against the
   real curve + real physics: 4.1s ride, exit 26 m/s at 21°,
   5.3s of airtime, 44m apex, lands on the far beach.)
   ============================================================ */
const RIDE={on:false,u:0,spd:0,y:0,curve:null,len:1,water:null,start:null};
const FLY={on:false,vx:0,vy:0,vz:0,x0:0,z0:0};
const SL={tower:4,a0:1.15,turns:0.72,r0:6,rg:34,rp:1.9,yEnd:5.5,yp:0.85,
          aim:0.7,kick:2.3,gA:34,drag:0.10,boost:1.55,pop:11,g:10.5};

function slidePath(){
  const pts=[],N=28;
  const yTop=groundAt(VOLC.x,VOLC.z)+SL.tower;
  for(let i=0;i<=N;i++){
    const t=i/N;
    const a=SL.a0+t*SL.turns*Math.PI*2;
    const r=SL.r0+Math.pow(t,SL.rp)*SL.rg;      // hugs the cone, then swings wide
    const x=VOLC.x+Math.cos(a)*r, z=VOLC.z+Math.sin(a)*r;
    let y=yTop-(yTop-SL.yEnd)*Math.pow(t,SL.yp); // the plunge
    y=Math.max(y,groundAt(x,z)+1.6);             // never sinks into the mountain
    pts.push(new THREE.Vector3(x,y,z));
  }
  // the run-out, straightened across the map, with a kicker that lifts the nose
  const end=pts[pts.length-1],prev=pts[pts.length-2];
  const dir=new THREE.Vector3().subVectors(end,prev).setY(0).normalize();
  const aim=new THREE.Vector3(0,0,70).sub(new THREE.Vector3(end.x,0,end.z)).setY(0).normalize();
  dir.lerp(aim,SL.aim).normalize();
  for(let i=1;i<=5;i++){
    const d=i*6, x=end.x+dir.x*d, z=end.z+dir.z*d;
    const kick=i>=3?(i-2)*SL.kick:0;
    pts.push(new THREE.Vector3(x,Math.max(groundAt(x,z)+1.6,end.y-0.8)+kick,z));
  }
  return new THREE.CatmullRomCurve3(pts,false,'catmullrom',0.35);
}
/* the flume: an OPEN U-channel. The curve is the FLOOR, and the cross-section
   is swept with a frame built from world-up (not Frenet) so the U always opens
   skyward instead of barrel-rolling through the corners. */
function flumeGeo(curve,segs,r,span,mat){
  const pos=[],uv=[],idx=[],RS=12;
  const up=new THREE.Vector3(0,1,0),T=new THREE.Vector3(),R=new THREE.Vector3(),U=new THREE.Vector3();
  for(let i=0;i<=segs;i++){
    const t=i/segs, P0=curve.getPointAt(t);
    T.copy(curve.getTangentAt(t)).normalize();
    R.crossVectors(T,up);
    if(R.lengthSq()<1e-5)R.set(1,0,0);
    R.normalize();
    U.crossVectors(R,T).normalize();
    for(let j=0;j<=RS;j++){
      const a=-span/2+(j/RS)*span, c=Math.cos(a), sn=Math.sin(a);
      pos.push(P0.x+R.x*sn*r+U.x*r*(1-c),
               P0.y+R.y*sn*r+U.y*r*(1-c),
               P0.z+R.z*sn*r+U.z*r*(1-c));
      uv.push(j/RS, t*14);
    }
  }
  for(let i=0;i<segs;i++)for(let j=0;j<RS;j++){
    const a=i*(RS+1)+j,b=a+RS+1;
    idx.push(a,b,a+1, b,b+1,a+1);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);g.computeVertexNormals();
  return new THREE.Mesh(g,mat);
}
function buildSlide(){
  const curve=slidePath();
  RIDE.curve=curve;RIDE.len=curve.getLength();RIDE.start=curve.getPointAt(0);
  // candy-striped chute — KidStarClub magenta & cyan
  const cv=document.createElement('canvas');cv.width=64;cv.height=64;
  const g=cv.getContext('2d');
  g.fillStyle='#ff2ec4';g.fillRect(0,0,64,64);
  g.fillStyle='#45d8ff';g.fillRect(0,0,64,32);
  g.fillStyle='rgba(255,255,255,.85)';g.fillRect(0,28,64,7);
  const t=new THREE.CanvasTexture(cv);t.encoding=THREE.sRGBEncoding;
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(1,1);
  const chute=flumeGeo(curve,180,2.3,Math.PI*1.12,
    new THREE.MeshLambertMaterial({map:t,side:THREE.DoubleSide}));
  chute.receiveShadow=true;chute.castShadow=true;
  scene.add(chute);
  // the water, rushing down it
  const wv=document.createElement('canvas');wv.width=32;wv.height=64;
  const wg=wv.getContext('2d');
  wg.fillStyle='#39c7ef';wg.fillRect(0,0,32,64);
  wg.fillStyle='rgba(255,255,255,.75)';
  for(let i=0;i<7;i++)wg.fillRect(Math.random()*26,i*9,6,3);
  const wt=new THREE.CanvasTexture(wv);wt.encoding=THREE.sRGBEncoding;
  wt.wrapS=wt.wrapT=THREE.RepeatWrapping;wt.repeat.set(1,10);
  const water=flumeGeo(curve,180,2.05,Math.PI*0.72,
    new THREE.MeshLambertMaterial({map:wt,transparent:true,opacity:0.8,
      side:THREE.DoubleSide,emissive:lin(0x0a4a66)}));
  water.position.y=0.12;
  scene.add(water);RIDE.water=water;
  // stilts down to the mountain
  const legM=new THREE.MeshLambertMaterial({color:lin(0xdfe8f2)});
  for(let i=2;i<=44;i++){
    const u=i/46, P0=curve.getPointAt(u), gh=groundAt(P0.x,P0.z);
    const h=P0.y-gh;
    if(h<1.2)continue;
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.3,h,7),legM);
    leg.position.set(P0.x,gh+h/2,P0.z);leg.castShadow=true;scene.add(leg);
  }
  // 🗼 the tower: the chute's mouth sits ~6.6m above the crater rim, so give it
  // something to stand on — a deck, a fat pillar and a wrap-around stair
  const s0=curve.getPointAt(0), s1=curve.getPointAt(0.02);
  const gs=groundAt(s0.x,s0.z);
  const deckM=new THREE.MeshLambertMaterial({color:lin(0xfff3d6)});
  const deck=new THREE.Mesh(new THREE.CylinderGeometry(4.2,4.2,0.5,16),deckM);
  deck.position.set(s0.x,s0.y-0.55,s0.z);deck.castShadow=deck.receiveShadow=true;scene.add(deck);
  const pillar=new THREE.Mesh(new THREE.CylinderGeometry(1.5,2.1,Math.max(1,s0.y-gs),12),
    new THREE.MeshLambertMaterial({color:lin(0xdfe8f2)}));
  pillar.position.set(s0.x,gs+(s0.y-gs)/2,s0.z);pillar.castShadow=true;scene.add(pillar);
  const stepM=new THREE.MeshLambertMaterial({color:lin(0x45d8ff)});
  const nStep=Math.max(4,Math.round((s0.y-gs)/0.62));
  for(let i=0;i<nStep;i++){
    const a=i*0.55, rr=3.4;
    const st=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.24,1.2),stepM);
    st.position.set(s0.x+Math.cos(a)*rr, gs+0.35+i*((s0.y-gs-0.6)/nStep), s0.z+Math.sin(a)*rr);
    st.rotation.y=-a;st.castShadow=true;scene.add(st);
  }
  // 🚪 DROP IN — the arch, so nobody can miss it
  const arch=new THREE.Group();
  const ring=new THREE.Mesh(new THREE.TorusGeometry(3.1,0.32,8,22),
    new THREE.MeshLambertMaterial({color:lin(0xff2ec4),emissive:lin(0x6b0050)}));
  arch.add(ring);
  const glow=new THREE.Mesh(new THREE.TorusGeometry(3.1,0.62,8,22),
    new THREE.MeshBasicMaterial({color:0x45d8ff,transparent:true,opacity:0.3,depthWrite:false}));
  arch.add(glow);
  arch.position.set(s0.x,s0.y+1.6,s0.z);
  arch.lookAt(s1.x,s1.y+1.6,s1.z);
  scene.add(arch);
  RIDE.arch=arch;
}

function tickRide(dt){
  if(RIDE.water)RIDE.water.material.map.offset.y-=dt*1.9; // the water always runs
  if(RIDE.arch)RIDE.arch.children[1].scale.setScalar(1+Math.sin(performance.now()/380)*0.06);
  if(!RIDE.curve)return;

  if(FLY.on){ // 🚀 the cannonball arc — steerable, so you can aim for the sea
    const ax=(keys.d?1:0)-(keys.a?1:0)+jx, az=(keys.s?1:0)-(keys.w?1:0)+jy;
    if(Math.hypot(ax,az)>0.06){
      const a=Math.atan2(ax,az)+camYaw+Math.PI;
      FLY.vx+=Math.sin(a)*8*dt;FLY.vz+=Math.cos(a)*8*dt;
    }
    FLY.vy-=SL.g*dt;
    P.x+=FLY.vx*dt;P.z+=FLY.vz*dt;RIDE.y+=FLY.vy*dt;
    P.yaw=Math.atan2(FLY.vx,FLY.vz);
    if(Math.random()<dt*16)fxImpact(P.x,RIDE.y-0.4,P.z,0xbfefff);
    const gh=groundAt(P.x,P.z);
    if((RIDE.y<=gh+0.1&&FLY.vy<0)||Math.hypot(P.x,P.z)>700)slideLand(gh);
    return;
  }
  if(!RIDE.on){ // ready to drop in?
    if(!started||performance.now()<downUntil)return;
    const s0=RIDE.start;
    if(Math.hypot(P.x-s0.x,P.z-s0.z)<3.8&&groundAt(P.x,P.z)>16){
      RIDE.on=true;RIDE.u=0;RIDE.spd=8;RIDE.y=s0.y+0.45;
      P.x=s0.x;P.z=s0.z;P.air=0;P.vy=0;
      window.surfing=false;
      toast('🌊 DROP IN!!! hold on…');sfxZap();
    }
    return;
  }
  // 🌊 riding the chute
  const tan=RIDE.curve.getTangentAt(Math.min(0.999,RIDE.u));
  RIDE.spd+=(-tan.y)*SL.gA*dt;      // gravity down the flume
  RIDE.spd*=(1-SL.drag*dt);
  RIDE.spd=Math.max(6,Math.min(52,RIDE.spd));
  RIDE.u+=RIDE.spd*dt/RIDE.len;
  if(RIDE.u>=1){ // 🚀 LAUNCH
    const e=RIDE.curve.getPointAt(0.999), t2=RIDE.curve.getTangentAt(0.999);
    RIDE.on=false;FLY.on=true;
    FLY.vx=t2.x*RIDE.spd*SL.boost;
    FLY.vz=t2.z*RIDE.spd*SL.boost;
    FLY.vy=Math.max(10,t2.y*RIDE.spd*SL.boost+SL.pop);
    FLY.x0=e.x;FLY.z0=e.z;
    P.x=e.x;P.z=e.z;RIDE.y=e.y+0.6;
    shakeT=0.35;toast('🚀 LAUNCH!!!');sfxFanfare();
    return;
  }
  const pt=RIDE.curve.getPointAt(RIDE.u);
  P.x=pt.x;P.z=pt.z;RIDE.y=pt.y+0.45;

    }

    ball.rotation.x+=dt*9;
    // 🎯 the swish check: falling through EITHER rim
    if(!BALL.scored&&BALL.vy<0){
      for(const R of RIMS){
        if(BALL.prevY<=R.y||BALL.y>R.y)continue;
        if(Math.hypot(BALL.x-R.x,BALL.z-R.z)>=0.44)continue;
        // 🎯 points by where you shot from — the court lines tell the story
        const sd=Math.hypot((BALL.fromX||0)-R.x,(BALL.fromZ||0)-R.z);

        else if(sd>=12.75){pts=20;label='🚀 DOWNTOWN!! +20 💎'}
        else if(sd>=7.24){pts=10;label='🎯 THREE-POINTER! +10 💎'}
        else if(sd>=4.6){pts=5;label='🏀 Free-throw range! +5 💎'}
        starCount+=pts;
        document.getElementById('stars').textContent='💎 '+starCount;

        celebrate(myName||'You',pts,R.x,R.z); // 🎆 the big one

        break;
      }
    }
    const g0b=groundAt(BALL.x,BALL.z);
    if(BALL.y<g0b+0.34){ // touched down
      if(!BALL.scored&&!onCourt(BALL.x,BALL.z)){ // 💣 out of bounds = GRENADE
        ballExplode(BALL.x,BALL.z,true);

      BALL.y=g0b+0.34;

      else{BALL.vy=0;BALL.vx*=0.9;BALL.vz*=0.9;

        }

    }

  }

  }
}

const skels=[];
function addSkel(x,z){
  const root=spawn(FILES.kkSkel,1.8);
  if(!root)return;
  root.position.set(x,groundAt(x,z),z);
  const na=nativeActions(root.userData.inner,assets[FILES.kkSkel].animations);
  root.traverse(m=>{if(m.isMesh)m.castShadow=true});

function skAnim(sk,name){
  if(sk.cur===name||!sk.acts[name])return;
  if(sk.cur&&sk.acts[sk.cur])sk.acts[sk.cur].fadeOut(0.15);
  sk.acts[name].reset().fadeIn(0.15).play();
  sk.cur=name;
}
function tickSkels(dt){
  for(let i=skels.length-1;i>=0;i--){
    const sk=skels[i];
    const dx=P.x-sk.root.position.x,dz=P.z-sk.root.position.z;
    const dist=Math.hypot(dx,dz);
    sk.atkCd=Math.max(0,sk.atkCd-dt);
    if(sk.hitFlash>0){sk.hitFlash-=dt}
    if(dist<70&&dist>1.9&&downUntil<performance.now()){ // raiders hunt across the island
      const ny=Math.atan2(dx,dz);
      sk.root.rotation.y+=(((ny-sk.root.rotation.y+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*6);
      sk.root.position.x+=Math.sin(ny)*2.2*dt;
      sk.root.position.z+=Math.cos(ny)*2.2*dt;
      skAnim(sk,'Walk');
    }else if(dist<=1.9&&sk.atkCd<=0&&downUntil<performance.now()){ // bonk!
      skAnim(sk,'Attack');sk.atkCd=1.6;
      setTimeout(()=>{
        if(Math.hypot(P.x-sk.root.position.x,P.z-sk.root.position.z)<2.4)playerHurt(1);
      },420);
    }else if(sk.cur!=='Attack'||sk.atkCd<1.1){
      skAnim(sk,'Idle');
    }
    sk.root.position.y=groundAt(sk.root.position.x,sk.root.position.z);
    sk.mixer.update(dt);
  }
}
function playerHurt(dmg=1,from=null,force=false){
  if(performance.now()<downUntil)return;                 // down is down
  if(!force&&performance.now()<hurtUntil)return;          // i-frame — but only for LOCAL sources

/* ============================================================
   🌋 THE LAVA TITAN · every 20 minutes a thousand-foot lava-stone
   woman walks the horizon and hurls burning meteorites.
   Wall-clock seeded: every player sees the exact same apparition.
   ============================================================ */
function mulberry32(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const TITAN={cycleMs:20*60*1000,lastCycle:-1,group:null,phaseT:0,meteors:[],rings:[],warned:false,armT:0};
function lavaTex(){
  const cv=document.createElement('canvas');cv.width=128;cv.height=256;
  const g=cv.getContext('2d');
  g.fillStyle='#1d1512';g.fillRect(0,0,128,256);
  g.strokeStyle='#ff5a1a';g.lineWidth=3;g.shadowColor='#ff7a2a';g.shadowBlur=6;
  for(let i=0;i<14;i++){ // glowing magma cracks
    g.beginPath();
    let x=Math.random()*128,y=Math.random()*256;
    g.moveTo(x,y);
    for(let k=0;k<4;k++){x+=(Math.random()-0.5)*40;y+=Math.random()*40;g.lineTo(x,y)}
    g.stroke();
  }
  const t=new THREE.CanvasTexture(cv);t.encoding=THREE.sRGBEncoding;t.wrapS=t.wrapT=10497;
  return t;
}
function buildTitan(){
  const g=new THREE.Group();
  const lt=lavaTex();
  // ⚠️ fog:false on EVERY part of her. She stands 780u out, where FogExp2 would
  // paint her 89% sky-blue and she vanishes into the haze (only her toes stayed
  // visible, against the darker ocean). She is a landmark — the haze doesn't get her.
  const rockM=new THREE.MeshLambertMaterial({map:lt,color:lin(0x5a4438),emissive:lin(0x481700),emissiveMap:lt,fog:false});
  const seg=(w,h,d)=>new THREE.Mesh(new THREE.BoxGeometry(w,h,d),rockM);
  // legs
  const legL=seg(26,120,30);legL.position.set(-18,60,0);g.add(legL);
  const legR=seg(26,120,30);legR.position.set(18,60,0);g.add(legR);
  g.userData.legs=[legL,legR];
  // torso — a mountain of a woman
  const hips=seg(58,34,36);hips.position.y=132;g.add(hips);
  const waist=seg(44,30,30);waist.position.y=162;g.add(waist);
  const chest=seg(64,46,38);chest.position.y=198;g.add(chest);
  // arms
  const armL=seg(16,86,18);armL.position.set(-46,178,0);g.add(armL);
  const armR=seg(16,86,18);armR.geometry.translate(0,-38,0);armR.position.set(46,214,0);g.add(armR);
  g.userData.arm=armR; // the throwing arm pivots at the shoulder
  // head with molten eyes + flowing lava hair
  const head=seg(30,32,28);head.position.y=238;g.add(head);
  const eyeM=new THREE.MeshBasicMaterial({color:0xffb02a,fog:false});
  for(const ex of [-8,8]){
    const eye=new THREE.Mesh(new THREE.SphereGeometry(3,8,6),eyeM);
    eye.position.set(ex,240,15);g.add(eye);
  }
  const hair=seg(36,44,10);hair.position.set(0,232,-16);
  hair.material=new THREE.MeshLambertMaterial({map:lt,color:lin(0x7a2408),emissive:lin(0x8a2600),emissiveMap:lt,fog:false});
  g.add(hair);
  // her own glow lights the smoke around her
  const glow=new THREE.PointLight(0xff6a22,1.2,600);glow.position.y=200;g.add(glow);
  g.traverse(m=>{if(m.isMesh){m.frustumCulled=false}});
  return g;
}
function titanMeteorTargets(rand,n){
  const out=[];
  for(let i=0;i<n;i++){
    const a=rand()*6.28,r=rand()*120;
    out.push({x:Math.cos(a)*r,z:Math.sin(a)*r});
  }
  return out;
}
function spawnMeteor(target,fromPos){
  const core=new THREE.Mesh(new THREE.IcosahedronGeometry(3.2,0),
    new THREE.MeshBasicMaterial({color:0xff7a1a}));
  const halo=new THREE.Sprite(new THREE.SpriteMaterial({color:0xffb02a,transparent:true,opacity:0.85,depthWrite:false}));
  halo.scale.setScalar(16);core.add(halo);
  core.position.copy(fromPos);
  const T=4.2; // seconds of flight
  core.userData={t:0,T,sx:fromPos.x,sy:fromPos.y,sz:fromPos.z,tx:target.x,tz:target.z,
    ty:groundAt(target.x,target.z)};
  scene.add(core);
  TITAN.meteors.push(core);
  // ⭕ the dodge ring — get OUT of the circle!
  const ring=new THREE.Mesh(new THREE.RingGeometry(7.4,9,36),
    new THREE.MeshBasicMaterial({color:0xff3a2a,transparent:true,opacity:0.65,side:THREE.DoubleSide,depthWrite:false}));
  ring.rotation.x=-Math.PI/2;
  ring.position.set(target.x,groundAt(target.x,target.z)+0.15,target.z);
  ring.userData={pulse:0};
  scene.add(ring);

}
let shakeT=0;
function meteorImpact(m){

  // ☠️ the blast: KO everyone inside 9 units (each client judges itself — same meteor everywhere)
  if(Math.hypot(P.x-x,P.z-z)<9&&performance.now()>downUntil){
    hp=0;heartsUI();
    playerHurt(999); // full KO: all diamonds burst, beach respawn

  }
  for(const sk of [...skels]){
    if(Math.hypot(sk.root.position.x-x,sk.root.position.z-z)<9){
      boneScatter(sk.root.position.x,sk.root.position.y+1,sk.root.position.z);
      scene.remove(sk.root);skels.splice(skels.indexOf(sk),1);
    }

}
function tickTitan(dt){
  const now=Date.now();
  const cycle=Math.floor(now/TITAN.cycleMs);
  const tIn=(now%TITAN.cycleMs)/1000; // seconds into this cycle
  const VISIT=75; // she's visible for 75 seconds each cycle
  if(tIn<VISIT){
    if(TITAN.lastCycle!==cycle){ // she rises
      TITAN.lastCycle=cycle;
      TITAN.group=buildTitan();
      scene.add(TITAN.group);
      TITAN.rand=mulberry32(cycle*7919+13);
      TITAN.nMet=3+((cycle%2)?1:0); // 3 or 4, everyone agrees
      TITAN.targets=titanMeteorTargets(TITAN.rand,TITAN.nMet);
      TITAN.thrown=0;
      TITAN.a0=TITAN.rand()*6.28;
      toast('🌋 THE LAVA TITAN RISES ON THE HORIZON…');
      try{const c=sctx(),t=c.currentTime; // deep rumble
        const o=c.createOscillator();o.type='sawtooth';o.frequency.value=32;
        const g2=c.createGain();g2.gain.setValueAtTime(0.16,t);g2.gain.exponentialRampToValueAtTime(0.001,t+3);
        o.connect(g2).connect(c.destination);o.start();o.stop(t+3);
      }catch(e){}
    }
    if(TITAN.group){
      // she strides along the horizon arc
      const a=TITAN.a0+(tIn/VISIT)*0.7;
      const R=700; // close enough to loom, far enough to be a horizon event
      TITAN.group.position.set(Math.cos(a)*R,0,Math.sin(a)*R);
      TITAN.group.lookAt(0,0,0);
      // walk cycle: legs scissor, body sways
      const w=tIn*1.4;
      TITAN.group.userData.legs[0].rotation.x=Math.sin(w)*0.22;
      TITAN.group.userData.legs[1].rotation.x=-Math.sin(w)*0.22;
      TITAN.group.position.y=Math.abs(Math.sin(w))*6;
      TITAN.group.rotation.z=Math.sin(w)*0.02;
      // throws at 18s, 32s, 46s, 60s
      const throwTimes=[18,32,46,60];
      if(TITAN.thrown<TITAN.nMet&&tIn>throwTimes[TITAN.thrown]){
        const hand=new THREE.Vector3(46,240,0).applyMatrix4(TITAN.group.matrixWorld);
        spawnMeteor(TITAN.targets[TITAN.thrown],hand);
        TITAN.thrown++;
        TITAN.armT=0.8; // wind-up pose
      }
      if(TITAN.armT>0){TITAN.armT-=dt;TITAN.group.userData.arm.rotation.x=-2.2*Math.min(1,TITAN.armT/0.8)}
      else TITAN.group.userData.arm.rotation.x=0;
    }
  }else if(TITAN.group){ // she sinks beyond the horizon
    TITAN.group.position.y-=dt*30;
    if(TITAN.group.position.y<-320){scene.remove(TITAN.group);TITAN.group=null}
  }
  // meteors fly a shaped arc
  for(let i=TITAN.meteors.length-1;i>=0;i--){
    const m=TITAN.meteors[i],u=m.userData;
    u.t+=dt;
    const k=Math.min(1,u.t/u.T);
    m.position.x=u.sx+(u.tx-u.sx)*k;
    m.position.z=u.sz+(u.tz-u.sz)*k;
    m.position.y=u.sy+(u.ty-u.sy)*k+Math.sin(k*Math.PI)*120; // a high burning arc
    m.rotation.x+=dt*4;m.rotation.y+=dt*3;
    if(k>=1){
      meteorImpact(m);
      scene.remove(m);TITAN.meteors.splice(i,1);
    }
  }
  for(let i=TITAN.rings.length-1;i>=0;i--){
    const r2=TITAN.rings[i];
    r2.userData.pulse+=dt*6;
    r2.material.opacity=0.4+Math.sin(r2.userData.pulse)*0.3;
    // ring dies when its meteor lands
    if(!TITAN.meteors.some(m=>Math.abs(m.userData.tx-r2.position.x)<0.5&&Math.abs(m.userData.tz-r2.position.z)<0.5)){
      scene.remove(r2);TITAN.rings.splice(i,1);
    }
  }
}

/* ============================================================
   GAME STATE + MAIN LOOP
   ============================================================ */
const P={x:-84,z:74,vy:0,air:0,yaw:0};   // spawn on the cove shelf by the dock — clear of the court
let started=false,last=performance.now();

let lobby=false;
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  if(!started){
    if(lobby&&player){ // 🎭 hero showcase: the world is the backdrop, your pick struts on the beach
      mixer&&mixer.update(dt);
      const orb=now/1000*0.35;
      const ox=P.x+Math.sin(orb)*6.5, oz=P.z+Math.cos(orb)*6.5;
      cam.position.lerp(new THREE.Vector3(ox,groundAt(P.x,P.z)+2.6,oz),Math.min(1,dt*4));
      cam.lookAt(P.x,groundAt(P.x,P.z)+1.3,P.z);
      player.position.set(P.x,groundAt(P.x,P.z),P.z);
      renderer.render(scene,cam);
    }
    return;
  }

  tickRide(dt);                      // 🌊 the waterslide owns the hero while she's on it
  const onSlide=RIDE.on||FLY.on;

  // input vector (keys or joystick), camera-relative
  let ix=(keys.d?1:0)-(keys.a?1:0)+jx;
  let iz=(keys.s?1:0)-(keys.w?1:0)+jy;
  if(onSlide){ix=0;iz=0}             // the chute steers, not the joystick
  const mag=Math.min(1,Math.hypot(ix,iz));
  if(mag>0.05){
    const a=Math.atan2(ix,iz);
    P.yaw=camYaw+a+Math.PI;
    const speed=(mag>0.85?10.5:5.2)*mag;
    const canSurf=!!(ROSTER[heroKey]&&ROSTER[heroKey].surf);
    const surfSpeed=window.surfing?13.5:speed; // 🏄‍♀️ she flies on the water
    const nx=P.x+Math.sin(P.yaw)*surfSpeed*dt;
    const nz=P.z+Math.cos(P.yaw)*surfSpeed*dt;
    const gh=groundAt(nx,nz);
    if(gh>0.12&&Math.abs(gh-groundAt(P.x,P.z))<1.4){P.x=nx;P.z=nz;window.surfing=false}
    else if(canSurf&&gh<=0.12&&Math.hypot(nx,nz)<560){P.x=nx;P.z=nz;window.surfing=true} // out on the water
    else{ // slide along
      const gx=groundAt(nx,P.z),gz=groundAt(P.x,nz);
      if(gx>0.12&&Math.abs(gx-groundAt(P.x,P.z))<1.4)P.x=nx;
      else if(gz>0.12&&Math.abs(gz-groundAt(P.x,P.z))<1.4)P.z=nz;
    }
    if(window.surfing&&groundAt(P.x,P.z)>0.2)window.surfing=false;
  }
  // jump + gravity
  const g0=groundAt(P.x,P.z);
  if(onSlide){wantJump=false;P.vy=0;P.air=0}
  else{
    if((keys[' ']||wantJump)&&P.air<=0.01){P.vy=8.4}
    wantJump=false;
    P.vy-=22*dt;
    P.air=Math.max(0,P.air+P.vy*dt);
    if(P.air<=0){P.air=0;if(P.vy<0)P.vy=0}
  }
  // apply to player object
  let py=g0+P.air;
  if(window.surfing){
    py=0.55+Math.sin(t*2.2)*0.1+P.air; // riding the swell
    // the board slides under her feet
    const bg=player.userData.board;
    if(bg&&bg.parent!==player){
      bg.parent.remove(bg);player.add(bg);
      bg.position.set(0,0.06,0);bg.rotation.set(0,0,0);
      bg.scale.setScalar(1.35);
    }
    if(bg){bg.rotation.z=Math.sin(t*2.6)*0.08;bg.rotation.x=mag>0.05?-0.1:0.02}
    // 🌊 spray off the tail when she's moving
    if(mag>0.2&&Math.random()<dt*14){
      fxImpact(P.x-Math.sin(P.yaw)*0.9,0.5,P.z-Math.cos(P.yaw)*0.9,0xeafcff);
    }
  }else if(player.userData.board&&player.userData.boardHome&&player.userData.board.parent===player){
    const bg=player.userData.board,h=player.userData.boardHome;
    player.remove(bg);h.parent.add(bg);
    bg.position.copy(h.pos);bg.rotation.copy(h.rot);bg.scale.setScalar(1);
  }
  if(onSlide)py=RIDE.y;   // hero AND camera boom ride the flume
  player.position.set(P.x,py,P.z);
  player.rotation.y+=(((P.yaw-player.rotation.y+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*10);
  // animation state
  const now2=performance.now();
  const emoting=now2<emoteUntil&&mag<0.05&&P.air<=0.05;
  const fighting=now2<attackUntil||now2<hurtUntil||now2<downUntil;
  if(onSlide){
    playAnim(RIDE.on?(actions['Sit_Floor_Idle']?'Sit_Floor_Idle':'Idle'):'Jump',0.12);
  }else if(!fighting){
    if(window.surfing)playAnim(actions['Jump_Idle']?'Jump_Idle':'Idle',0.15); // the surf crouch
    else if(P.air>0.05)playAnim('Jump',0.08);
    else if(mag>0.85)playAnim('Run');
    else if(mag>0.05)playAnim('Walk');
    else if(!emoting)playAnim('Idle');
  }
  mixer&&mixer.update(dt);

  // 🎥 follow-camera brain: swing behind on direction change · flow back after free-look · tilt on slopes
  {
    const lookHeld=dragId!==null;
    const easeAng=(from,to,k)=>from+(((to-from+Math.PI*3)%(Math.PI*2))-Math.PI)*k;
    {
      // flow back behind the hero — rate ramps in softly, angular speed capped
      const since=performance.now()-lookReleasedAt;
      const grace=mag>0.05?0:600;
      if(since>grace)followRamp=Math.min(1,followRamp+dt*2.2); // rate fades in — no kick
      else followRamp=0;
      if(followRamp>0&&!lookHeld){
        const rate=(mag>0.85?3.0:mag>0.05?2.2:1.1)*followRamp;
        const step=(((P.yaw-camYaw+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*rate);
        const cap=2.6*dt; // angular speed ceiling: hard reversals sweep, never snap
        camYaw+=Math.max(-cap,Math.min(cap,step));
      }
    }
    // slope tilt: look up hills you're climbing, down slopes you're descending
    const aheadG=groundAt(P.x+Math.sin(P.yaw)*4.5,P.z+Math.cos(P.yaw)*4.5);
    const slope=Math.max(-0.4,Math.min(0.5,(aheadG-g0)/4.5));

  // camera: Starville boom — orbit-follow, occlusion pull-in sampled along the boom, zoomable
  {

    const ch=3.0+pEff*5.2;
    const dirX=-Math.sin(camYaw)*Math.cos(pEff), dirZ=-Math.cos(camYaw)*Math.cos(pEff);
    let boom=camDist;
    const eyeY=py+1.7;
    for(let tt=0.25;tt<=1.001;tt+=0.15){ // sample the sightline: hills never eat the view
      const sx=P.x+dirX*camDist*tt, sz=P.z+dirZ*camDist*tt;
      const sy=eyeY+(ch-1.7)*tt;
      const g=groundAt(sx,sz);
      if(g+0.9>sy){boom=Math.min(boom,camDist*tt-0.6);}
    }
    boom=Math.max(3.4,boom);
    smBoom+=(boom-smBoom)*Math.min(1,dt*(boom<smBoom?11:2.6)); // in fast (no clipping) · out slow (no lurch)
    let cx=P.x+dirX*smBoom, cz=P.z+dirZ*smBoom;
    let cy=py+1.7+(ch-1.7)*(smBoom/camDist);
    cy=Math.max(cy,groundAt(cx,cz)+1.5);
    cam.position.lerp(new THREE.Vector3(cx,cy,cz),Math.min(1,dt*6.5));
    if(shakeT>0){ // 🌋 impact tremor
      shakeT-=dt;
      const sh=shakeT*0.9;
      cam.position.x+=(Math.random()-0.5)*sh;
      cam.position.y+=(Math.random()-0.5)*sh*0.6;
      cam.position.z+=(Math.random()-0.5)*sh;
    }
    smLead+=((mag>0.05?1.8:0)-smLead)*Math.min(1,dt*3.5);
    lookTarget.lerp(new THREE.Vector3(
      P.x+Math.sin(P.yaw)*smLead,
      py+1.7+slopeTilt*3,
      P.z+Math.cos(P.yaw)*smLead),Math.min(1,dt*9));
    cam.lookAt(lookTarget);
  }

  // world life
  const t=now/1000;
  if(ocean.material.userData.sh)ocean.material.userData.sh.uniforms.uTime.value=t;
  foam.material.opacity=0.22+Math.sin(t*1.6)*0.09+Math.sin(t*4.1)*0.03; // lively surf line
  for(const cl of CLOUDS){cl.position.x+=cl.userData.sp*dt;if(cl.position.x>560)cl.position.x=-560}
  for(const sp of smoke){
    sp.userData.ph=(sp.userData.ph+dt*0.11)%1;
    const ph=sp.userData.ph,peak=groundAt(VOLC.x,VOLC.z);
    sp.position.set(VOLC.x+Math.sin(ph*8)*1.5+ph*4,peak+2+ph*18,VOLC.z+ph*2);
    sp.scale.setScalar(4+ph*12);
    sp.material.opacity=0.45*(1-ph);
  }
  craterGlow.intensity=0.4+Math.random()*0.15;
  tickStars(dt,t);
  tickRemotes(dt);
  tickCritters(dt);
  tickSkels(dt);
  tickBursts(dt);
  tickFx(dt);
  tickBall(dt);
  tickConfetti(dt);
  tickTitan(dt);
  { // board twirl during her swing
    const bg=player&&player.userData.board;
    if(bg&&bg.userData.spin>0){
      bg.userData.spin-=dt;
      bg.rotation.y+=dt*16;
      if(bg.userData.spin<=0)bg.rotation.y=0;
    }
  }

  renderer.render(scene,cam);
}

/* ---------- boot ---------- */
const bar=document.querySelector('#loadBar i'),pct=document.getElementById('loadPct');
loadAll((n,total)=>{
  const p=Math.round(n/total*100);
  bar.style.width=p+'%';pct.textContent=p+'%';
}).then(()=>{
  buildWorld();
  // the King
  window.swapHero=()=>{
    const h=ROSTER[heroKey];
    const nm=spawn(h.file,h.h);
    if(!nm)return;
    if(h.costume)addCostume(nm,h.costume);
    const na=nativeActions(nm.userData.inner,assets[h.file].animations);
    nm.traverse(m=>{if(m.isMesh)m.castShadow=true});
    if(player){nm.position.copy(player.position);nm.rotation.y=player.rotation.y;scene.remove(player)}
    scene.add(nm);
    player=nm;mixer=na.mixer;actions=na.acts;current=null;
    playAnim('Idle');
  };
  swapHero();
  lobby=true; // lights, camera — the showcase begins
  pct.textContent='ready!';
  { // build the hero picker
    const pk=document.getElementById('picker');
    for(const [k,h] of Object.entries(ROSTER)){
      const b=document.createElement('button');
      b.textContent=h.emoji+' '+h.name;
      b.style.cssText='font-size:13px;font-weight:800;padding:9px 12px;border-radius:999px;border:2px solid '+(k===heroKey?'#ffe14d':'rgba(255,255,255,.55)')+';background:'+(k===heroKey?'#ffb62e':'rgba(255,255,255,.14)')+';color:'+(k===heroKey?'#4a2c00':'#fff')+';cursor:pointer';
      b.onclick=()=>{heroKey=k;localStorage.setItem('isl_hero',k);
        for(const bb of pk.children){bb.style.borderColor='rgba(255,255,255,.55)';bb.style.background='rgba(255,255,255,.14)';bb.style.color='#fff'}
        b.style.borderColor='#ffe14d';b.style.background='#ffb62e';b.style.color='#4a2c00';
        swapHero();
      };
      pk.appendChild(b);
    }
  }
  const btn=document.getElementById('playBtn');
  document.getElementById('loadBar').style.display='none';pct.style.display='none';
  btn.style.display='block';
  btn.onclick=()=>{
    document.getElementById('title').style.opacity='0';
    setTimeout(()=>document.getElementById('title').remove(),650);
    started=true;
  };
});
loop();
</script>
