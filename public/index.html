    <button class="big cy" onclick="flNew()">🔁 New game</button>`;
  fl={y:40,vy:0,pipes:[],score:0,over:false};
  const field=$('#flfield');
  gIval(()=>{ if(fl.over)return;
    const gapY=15+Math.random()*50, gapH=30;
    const top=document.createElement('div'),bot=document.createElement('div');
    top.className='flpipe';bot.className='flpipe';
    top.style.cssText=`left:102%;top:0;height:${gapY}%`;
    bot.style.cssText=`left:102%;top:${gapY+gapH}%;height:${100-gapY-gapH}%`;
    field.append(top,bot);
    fl.pipes.push({top,bot,x:102,gapY,gapH,passed:false});
  },1900);
  const loop=()=>{
    if(fl.over)return;
    fl.vy+=0.09;fl.y+=fl.vy;
    if(fl.y<2||fl.y>92)return flEnd();
    $('#flstar').style.top=fl.y+'%';
    $('#flstar').style.transform=`rotate(${Math.max(-30,Math.min(60,fl.vy*14))}deg)`;
    for(const p of [...fl.pipes]){
      p.x-=0.55;p.top.style.left=p.x+'%';p.bot.style.left=p.x+'%';
      if(!p.passed&&p.x<14){p.passed=true;fl.score+=10;$('#flscore').textContent=fl.score;sndDrop()}
      if(p.x>8&&p.x<22&&(fl.y<p.gapY+3||fl.y>p.gapY+p.gapH-3))return flEnd();
      if(p.x<-14){p.top.remove();p.bot.remove();fl.pipes=fl.pipes.filter(z=>z!==p)}
    }
    __raf=requestAnimationFrame(loop);
  };
  __raf=requestAnimationFrame(loop);
}
function flEnd(){
  if(fl.over)return;fl.over=true;sndBad();sndBlast(1);
  submitScore('flappy',fl.score).then(x=>setTimeout(()=>alert('💥 '+fl.score+' points'+x),300));
}

// ---- GAME 6: SIMON STARS (repeat the light sequence) ----
const SI_TONES=[392,494,587,698];
const SI_COLORS=['#ff2ec4','#45d8ff','#ffe14d','#4ade80'];
let si={};
function siNew(){
  gReset();
  $('#gameArea').innerHTML=`
    <div class="sbtop">ROUND <span id="siround">1</span></div>
    <div class="sigrid">${[0,1,2,3].map(i=>
      `<button class="sipad" id="sip${i}" style="--pc:${SI_COLORS[i]}" onclick="siTap(${i})">⭐</button>`).join('')}</div>
    <p class="sbhint" id="sihint">Watch the pattern… then repeat it!</p>
    <button class="big cy" onclick="siNew()">🔁 New game</button>`;
  si={seq:[],pos:0,round:1,lock:true,over:false};
  setTimeout(siGrow,700);
}
function siGrow(){
  si.seq.push(Math.floor(Math.random()*4));
  $('#siround').textContent=si.round;
  $('#sihint').textContent='Watch the pattern…';
  si.lock=true;
  si.seq.forEach((p,i)=>setTimeout(()=>siFlash(p),500+i*560));
  setTimeout(()=>{si.lock=false;si.pos=0;$('#sihint').textContent='Your turn! ⭐'},500+si.seq.length*560);
}
function siFlash(i){
  const pad=$('#sip'+i);if(!pad)return;
  sfxTone(SI_TONES[i],0.32,'triangle',0.28);
  pad.classList.add('lit');setTimeout(()=>pad.classList.remove('lit'),320);
}
function siTap(i){
  if(si.lock||si.over)return;
  siFlash(i);
  if(i===si.seq[si.pos]){
    si.pos++;
    if(si.pos===si.seq.length){
      si.round++;sndDrop();burst('pop');
      setTimeout(siGrow,700);
    }
  }else{
    si.over=true;sndBad();
    const score=(si.round-1)*(si.round-1)*10;
    submitScore('simon',score).then(x=>setTimeout(()=>alert('Round '+si.round+'! 🧠 '+score+' points'+x),300));
  }
}

// ---- GAME 7: SKY STACKER (stack the blocks to the stars) ----
let st={};
function stNew(){
  gReset();
  $('#gameArea').innerHTML=`
    <div class="sbtop">HEIGHT <span id="stscore">0</span></div>
    <div id="stfield" class="gfield" onpointerdown="stDrop()"></div>
    <p class="sbhint">Tap to drop the block on the tower. Perfect drops = bonus + it grows back!</p>
    <button class="big cy" onclick="stNew()">🔁 New game</button>`;
  const field=$('#stfield');
  st={rows:0,w:44,x:28,dir:1,lastX:28,lastW:44,score:0,over:false,speed:0.9};
  const base=document.createElement('div');
  base.className='stblock';base.style.cssText=`left:28%;width:44%;bottom:0;background:${SB_COLORS[0]}`;
  field.appendChild(base);
  stSpawn();
  const loop=()=>{
    if(st.over)return;
    st.x+=st.dir*st.speed;
    if(st.x<0||st.x+st.w>100)st.dir*=-1;
    if(st.cur)st.cur.style.left=st.x+'%';
    __raf=requestAnimationFrame(loop);
  };
  __raf=requestAnimationFrame(loop);
}
function stSpawn(){
  const field=$('#stfield');
  st.cur=document.createElement('div');
  st.cur.className='stblock moving';
  const bottom=Math.min(84,(st.rows+1)*7);
  st.cur.style.cssText=`left:${st.x}%;width:${st.w}%;bottom:${bottom}%;background:${SB_COLORS[(st.rows+1)%SB_COLORS.length]}`;
  field.appendChild(st.cur);
  if(st.rows>10)field.style.setProperty('--shift',Math.min(40,(st.rows-10)*7)+'%');
}
function stDrop(){
  if(st.over||!st.cur)return;
  const L=Math.max(st.x,st.lastX), R=Math.min(st.x+st.w,st.lastX+st.lastW);
  const overlap=R-L;
  if(overlap<=2){
    st.over=true;st.cur.classList.add('fall');sndBad();
    submitScore('stacker',st.score).then(x=>setTimeout(()=>alert('Timber! 🏗️ '+st.score+' points'+x),300));
    return;
  }
  const perfect=Math.abs(st.x-st.lastX)<2.5;
  st.cur.classList.remove('moving');
  st.cur.style.left=L+'%';st.cur.style.width=overlap+'%';
  st.rows++;st.score+=perfect?25:10;
  $('#stscore').textContent=st.score;
  if(perfect){sndBlast(1);burst('pop');st.w=Math.min(50,overlap+6)}
  else{sndDrop();st.w=overlap}
  st.lastX=L;st.lastW=overlap;
  st.speed=Math.min(2.4,0.9+st.rows*0.07);
  st.x=st.dir>0?0:100-st.w;
  stSpawn();
}

    const el=document.createElement('div');el.className='btnote';el.textContent='⭐';
    el.style.color=SI_COLORS[l];
    document.querySelectorAll('.btlane')[l].appendChild(el);
    bt.notes.push({el,l,y:-8});
    setTimeout(spawn,bt.bpmGap*(0.7+Math.random()*0.6));
  };
  spawn();
  const loop=()=>{
    if(bt.over)return;
    for(const n of [...bt.notes]){
      n.y+=1.15;n.el.style.top=n.y+'%';
      if(n.y>96){n.el.remove();bt.notes=bt.notes.filter(z=>z!==n);
        bt.combo=0;$('#btcombo').textContent=0}
    }
    __raf=requestAnimationFrame(loop);
  };
  __raf=requestAnimationFrame(loop);
}
function btTap(l){
  if(bt.over)return;
  sfxTone(BT_TONES[l],0.12,'square',0.14);
  const hit=bt.notes.filter(n=>n.l===l&&n.y>68&&n.y<92)
    .sort((a,b)=>Math.abs(80-a.y)-Math.abs(80-b.y))[0];
  if(!hit){bt.combo=0;$('#btcombo').textContent=0;return}
  const perfect=Math.abs(hit.y-80)<5;
  hit.el.remove();bt.notes=bt.notes.filter(z=>z!==hit);
  bt.combo++;
  bt.score+=(perfect?20:10)*Math.min(10,Math.ceil(bt.combo/5));
  $('#btscore').textContent=bt.score;$('#btcombo').textContent=bt.combo;
  if(perfect)sfxTone(BT_TONES[l]*2,0.1,'triangle',0.16);
  if(bt.combo%10===0&&bt.combo>0)burst('pop');
}
function btEnd(){
  if(bt.over)return;bt.over=true;sndWin();
  submitScore('beatstar',bt.score).then(x=>setTimeout(()=>alert("That's a wrap! 🎵 "+bt.score+' points'+x),300));
}

function loadWorldLibs(cb,failEl){
  const seq=['/vendor/GLTFLoader.js','/vendor/DRACOLoader.js','/vendor/SkeletonUtils.js','/vendor/post.js'];

    let i=0;
    const next=()=>{
      if(i>=seq.length)return cb();
      if((seq[i].includes('GLTF')&&THREE.GLTFLoader)||(seq[i].includes('DRACO')&&THREE.DRACOLoader)||(seq[i].includes('Skeleton')&&THREE.SkeletonUtils)||(seq[i].includes('post')&&THREE.UnrealBloomPass)){i++;return next()}
      const want=seq[i];
      const sc=document.createElement('script');sc.src=want;i++;
      sc.onload=()=>{ // verify the script actually delivered its library (catch-all 404s serve HTML)
        const ok=(want.includes('GLTF')&&THREE.GLTFLoader)||(want.includes('DRACO')&&THREE.DRACOLoader)||(want.includes('Skeleton')&&THREE.SkeletonUtils)||(want.includes('post')&&THREE.UnrealBloomPass);
        if(ok)next();
        else if(failEl)failEl.innerHTML='<div class="pphud" style="color:#7a1a1a">Missing file on the server: '+want+' — the public/vendor folder needs to be uploaded to the repo! 📦</div>';
      };
      sc.onerror=()=>{if(failEl)failEl.innerHTML='<div class="pphud" style="color:#7a1a1a">Missing file on the server: '+want+' — the public/vendor folder needs to be uploaded! 📦</div>'};
      document.head.appendChild(sc);
    };
    next();
  },failEl);
}

        drop.mesh.position.y=34+Math.sin(drop.t*0.7)*0.35;

        ppAnim(player,A_IDLE);
        if(k>=1)dropJump(); // end of the line — everybody out

          const mx=Math.sin(af)*(-vz)+Math.sin(af-Math.PI/2)*vx;
          const mz=Math.cos(af)*(-vz)+Math.cos(af-Math.PI/2)*vx;
          player.position.x=Math.max(-B+2,Math.min(B-2,player.position.x+mx*8*dt4));
          player.position.z=Math.max(-B+2,Math.min(B-2,player.position.z+mz*8*dt4));

        if(drop.mesh.position.x>B+80){drop.mesh.visible=false;drop.live=false}

    // ---- Starville ambient sound engine (WebAudio, gain-driven by proximity) ----
    const snd={ready:false};
    function sndBoot(){
      if(snd.ready||!audioCtx)return;
      try{
        const ctx=audioCtx;
        // Chompy growl: low wobbling saw through a lowpass
        const gOsc=ctx.createOscillator();gOsc.type='sawtooth';gOsc.frequency.value=52;
        const gLfo=ctx.createOscillator();gLfo.frequency.value=5.2;
        const gLfoG=ctx.createGain();gLfoG.gain.value=14;
        gLfo.connect(gLfoG);gLfoG.connect(gOsc.frequency);
        const gFilt=ctx.createBiquadFilter();gFilt.type='lowpass';gFilt.frequency.value=240;
        snd.growl=ctx.createGain();snd.growl.gain.value=0;
        gOsc.connect(gFilt);gFilt.connect(snd.growl);snd.growl.connect(ctx.destination);
        gOsc.start();gLfo.start();
        // helicopter: looped noise chopped by an LFO + low rotor hum
        const nb=ctx.createBuffer(1,ctx.sampleRate,ctx.sampleRate);
        const nd=nb.getChannelData(0);
        for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
        const mkHeli=()=>{
          // heavy slow rotor "wop": deep-filtered noise, gentle sine chop, soft low rumble
          const src=ctx.createBufferSource();src.buffer=nb;src.loop=true;
          const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=220;lp.Q.value=0.5;
          const chop=ctx.createGain();chop.gain.value=0.7;
          const lfo=ctx.createOscillator();lfo.type='sine';lfo.frequency.value=6;
          const lfoG=ctx.createGain();lfoG.gain.value=0.3; // shallow modulation, not a buzz
          lfo.connect(lfoG);lfoG.connect(chop.gain);
          const hum=ctx.createOscillator();hum.type='sawtooth';hum.frequency.value=46;
          const humF=ctx.createBiquadFilter();humF.type='lowpass';humF.frequency.value=120;
          const humG=ctx.createGain();humG.gain.value=0.10;
          const out=ctx.createGain();out.gain.value=0;
          src.connect(lp);lp.connect(chop);chop.connect(out);
          hum.connect(humF);humF.connect(humG);humG.connect(out);
          out.connect(ctx.destination);
          src.start();lfo.start();hum.start();

      {

      // bonk button shows when a chomper is in bopping range
      {

        }else{
          d.normalize();

      // ⚡ blasters: spawn, spin, pick up
      if(!pp.over&&!pp.chatting){

        for(let i=blasters.length-1;i>=0;i--){

            scene.add(puff);c.smoke.push(puff);

        }
        for(let i=c.smoke.length-1;i>=0;i--){
          const pf=c.smoke[i], u=pf.userData;

      }
      // the CHOMPY pack hunts your bones — hide in a clubhouse or hop in a car!
      if(!pp.over&&!pp.chatting){

        }else if(pp.wavePhase==='hunt'&&pp.waveT<=0){

            const eg=groundAt(ex,ez);
            player.position.set(ex,eg,ez);
            pp.jumpY=eg;pp.vy=0; // step out onto the roof (or the ground)
            player.visible=true;sndPick();
          }:null;
        }else{
          let nh=null,nhd=1e9;
          for(const h of helis){const d=h.mesh.position.distanceTo(player.position);if(d<nhd){nhd=d;nh=h}}
          if(nh&&nhd<3.6&&!pp.driving&&!pp.riding&&!pp.chatting){
            fb2.textContent=nh.ship?'🛸 Fly the STARFIGHTER!':'🚁 Fly!';fb2.classList.remove('hide');
            fb2.onclick=()=>{pp.flying=nh;pp.lift=0;sndWin();
              const popEl=document.createElement('div');popEl.className='chomppop';
              popEl.style.color='#45d8ff';popEl.textContent='🚁 SPOOLING UP! Hold 🦘 to climb!';
              wrap.appendChild(popEl);setTimeout(()=>popEl.remove(),1500);};
          }else fb2.classList.add('hide');
        }
      }
      const dnb=$('#ppDown');
      if(dnb)dnb.classList.toggle('hide',!pp.flying);
      const db=$('#ppDrive');
      if(db){
        if(pp.driving){
          db.textContent='⏏️ Hop out';db.classList.remove('hide');
          db.onclick=()=>{
            const car=pp.driving;pp.driving=null;
            player.position.set(car.mesh.position.x+2,0,car.mesh.position.z);
            player.visible=true;sndPick();
          };
        }else{
          let nc=null,ncd=1e9;
          for(const c of cars){const d=c.mesh.position.distanceTo(player.position);if(d<ncd){ncd=d;nc=c}}
          if(nc&&ncd<3.5&&!pp.chatting&&!pp.riding&&!pp.flying){
            if(nc.heat>30){
              db.textContent='🔥 ENGINE COOLING…';db.classList.remove('hide');
              db.onclick=null;
            }else{
              db.textContent='🚗 Drive!';db.classList.remove('hide');
              db.onclick=()=>{pp.driving=nc;sndDrop()};
            }
          }else db.classList.add('hide');
        }
      }
      for(const b of bones){
        b.rotation.y+=dt*2.4;
        b.position.y=0.9+groundAt(b.position.x,b.position.z)+Math.sin(t+b.position.x)*0.15;
        if(b.userData.ttl){
          const left=b.userData.ttl-performance.now();
          if(left<=0){placeBone(b);}
          else if(left<3200){ // last seconds: urgent blink
            const on=Math.sin(left/110)>0;
            b.children[0].material.emissiveIntensity=on?1.6:0.15;
            b.visible=Math.sin(left/70)>-0.6;
          }
        }
        if(!pp.over&&!pp.chatting&&b.position.distanceTo(player.position)<((pp.flying?3.2:pp.driving?2.6:1.9)*(POWER==='pw_magnet'?2:1))){
          pp.score+=(POWER==='pw_star15'?15:10);const se=$('#ppscore');if(se)se.textContent=pp.score;
          sndCoin();burst('pop');placeBone(b);
        }
      }
      {
        const now=performance.now();
        for(const rec of others.values()){
          const r2=rec.root;
          ensureVeh(rec);
          const k=Math.min(1,(now-rec.t0)/rec.dur); // constant-velocity glide across the segment
          r2.position.x=rec.fx+(rec.tx-rec.fx)*k;
          r2.position.z=rec.fz+(rec.tz-rec.fz)*k;
          // helicopters glide in real 3D; everything else rides the terrain
          r2.position.y=(rec.mode==='heli'||rec.mode==='drop'||rec.mode==='ship')
            ? rec.fy+(rec.ty-rec.fy)*k
            : groundAt(r2.position.x,r2.position.z);
          let da=((rec.try-rec.fry+Math.PI*3)%(Math.PI*2))-Math.PI;
          r2.rotation.y=rec.fry+da*k;
          const speed=rec.seg/(rec.dur/1000); // units per second over this segment
          const moving=k<1&&speed>0.4;
          if(rec.mode==='walk'){
            ppAnim(rec.av,moving?(speed>4.5?A_RUN:A_WALK):A_IDLE);
            rec.av.userData.mixer?.update(dt);ppBlockyUpdate(rec.av,dt);
          }else if(rec.mode==='dino'&&rec.veh){
            ppAnim(rec.veh,moving?A_RUN:A_IDLE);
            rec.veh.userData.mixer?.update(dt);
          }else if(rec.veh?.userData.rotor){
            rec.veh.userData.rotor.rotation.y+=dt*24;
          }else if(rec.veh?.userData.wheels&&moving){
            rec.veh.userData.wheels.forEach(w=>w.rotation.x+=dt*speed*0.8);
          }
        }
      }
      player.userData.mixer?.update(dt);ppBlockyUpdate(player,dt);
      buddy?.userData.mixer?.update(dt);
      for(const h of helis)if(h!==pp.flying&&h.rpm>0){h.rpm=Math.max(0,h.rpm-dt*.4);h.rotor.rotation.y+=h.rpm*dt*26}
      if(!keys.Shift&&!camHold){ // ease the camera around behind the player/car
        const want=pp.dropping?player.rotation.y+Math.PI
          :pp.flying?pp.flying.mesh.rotation.y+Math.PI
          :pp.driving?pp.driving.mesh.rotation.y+Math.PI
          :(mag>0.05?player.rotation.y+Math.PI:null);
        if(want!==null){
          const dd=((want-pp.camYaw+Math.PI*3)%(Math.PI*2))-Math.PI;
          pp.camYaw+=dd*Math.min(1,dt*3.6);
        }
      }
      // slope-driven camera: climbing flattens the pitch AND zooms out for a wider view
      const fx2=Math.sin(player.rotation.y), fz2=Math.cos(player.rotation.y);
      const px2=player.position.x, pz2=player.position.z;
      const slope=(groundAt(px2+fx2*3,pz2+fz2*3)-groundAt(px2-fx2*3,pz2-fz2*3)); // rise over 6 units
      const zb=pp.dropping?1.15:Math.min(1.5,Math.max(0,slope)*0.42); // moderate pull-back; the lifted camera does the rest
      pp.zoomBoost=(pp.zoomBoost||0)+(zb-(pp.zoomBoost||0))*Math.min(1,dt*3);
      if(pp.dropping&&!keys.Shift&&!camHold){
        pp.camPitch+=(0.42-pp.camPitch)*Math.min(1,dt*2);
      }else if(!keys.Shift&&!camHold&&!pp.flying){
        const g3=groundAt(px2,pz2);
        // with the big zoom-out doing the work, keep a moderate angle so the crest stays in frame
        let want2=0.58 - Math.max(0,slope)*0.055
                       + Math.max(0,-slope)*0.045
                       - Math.min(0.14,g3*0.011);
        want2=Math.max(0.28,Math.min(0.85,want2));
        pp.camPitch+=(want2-pp.camPitch)*Math.min(1,dt*3.2);
      }
      const z=pp.zoom||1;
      const r=((pp.driving||pp.flying)?11.5:6.2)*z*(1+(pp.zoomBoost||0));
      const hor=r*Math.cos(pp.camPitch);
      const target=new THREE.Vector3(
        player.position.x+Math.sin(pp.camYaw)*hor,
        player.position.y+r*Math.sin(pp.camPitch),
        player.position.z+Math.cos(pp.camYaw)*hor);
      // never sink the camera into a hillside…
      const camG=groundAt(target.x,target.z);
      if(target.y<camG+2.2)target.y=camG+2.2;
      // …and never let a slope crest block the view: lift over terrain along the sightline
      {
        const lookY2=player.position.y+1.3;
        for(const t5 of [0.3,0.55,0.8]){
          const sx=target.x+(player.position.x-target.x)*t5;
          const sz=target.z+(player.position.z-target.z)*t5;
          const gS=groundAt(sx,sz)+1.5;
          const need=(gS-lookY2*t5)/(1-t5);
          if(need>target.y)target.y=need;
        }
      }
      dropUpdate(dt,vx,vz,mag);
      sun.position.set(player.position.x+30,52,player.position.z+18);
      sun.target.position.set(player.position.x,0,player.position.z);
      // 🗺️ minimap: you, the bad guys, and your friends
      pp.mapT=(pp.mapT||0)-dt;
      if(pp.mapT<=0){
        pp.mapT=0.12;
        drawMiniMap();
      }
      tickCompass();
      function drawMiniMap(){try{
        const mc=$('#ppMap');
        if(mc){
          const g5=mc.getContext('2d'), S2=132, k2=S2/(B*2);
          const mx2=w2=>(w2+B)*k2, mz2=w2=>(w2+B)*k2;
          g5.clearRect(0,0,S2,S2);
          // zone tints
          g5.fillStyle='rgba(227,201,142,.20)';g5.fillRect(mx2(72),0,S2-mx2(72),S2);            // desert
          g5.fillStyle='rgba(30,126,200,.5)';g5.fillRect(mx2(OCEAN_X),0,S2-mx2(OCEAN_X),S2);    // the sea
          g5.fillStyle='rgba(67,178,67,.75)';
          g5.beginPath();g5.arc(mx2(IC.x),mz2(IC.z),IC.R*(S2/(B*2)),0,7);g5.fill();             // the Isle
          g5.fillStyle='#ffd24a';
          g5.beginPath();g5.arc(mx2(IC.x),mz2(IC.z),2.4,0,7);g5.fill();                          // Starhaven
          g5.fillStyle='rgba(181,80,46,.25)';g5.fillRect(0,mz2(CANYON_Z),S2,S2-mz2(CANYON_Z)); // canyons
          g5.fillStyle='rgba(90,60,180,.28)';g5.fillRect(0,0,S2,mz2(SPACE_Z));                 // moon base
          // road + castle beacon
          g5.fillStyle='rgba(255,255,255,.18)';g5.fillRect(mx2(33),0,mx2(51)-mx2(33),S2);
          g5.fillStyle='#ffd24a';
          g5.beginPath();g5.arc(mx2(MTNS[0].x),mz2(MTNS[0].z),3,0,7);g5.fill();
          // mega star
          if(mega.mesh&&Math.sin(performance.now()/120)>0){
            g5.fillStyle='#b45cff';
            g5.beginPath();g5.arc(mx2(mega.mesh.position.x),mz2(mega.mesh.position.z),2.5,0,7);g5.fill();
          }
          // chompers (red)
          if(pp.wavePhase==='hunt'){
            g5.fillStyle='#ff3b3b';
            for(const c of chompers){
              if(c.dead||c.waveOut)continue;
              g5.beginPath();g5.arc(mx2(c.mesh.position.x),mz2(c.mesh.position.z),c.boss?3.4:2.2,0,7);g5.fill();
            }
          }
          // bandits (orange; hollow while parachuting)
          for(const bd of bandits){
            const bx3=mx2(bd.mesh.position.x),bz3=mz2(bd.mesh.position.z);
            g5.strokeStyle=g5.fillStyle='#ff8c1a';
            g5.beginPath();g5.arc(bx3,bz3,2.2,0,7);
            bd.state==='drop'?g5.stroke():g5.fill();
          }
          // supply crates (gold squares)
          g5.fillStyle='#ffd24a';
          for(const cr of crates)
            g5.fillRect(mx2(cr.mesh.position.x)-2,mz2(cr.mesh.position.z)-2,4,4);
          // gloom patrol (violet)
          g5.fillStyle='#c084fc';
          for(const gl of gloomies){
            g5.beginPath();g5.arc(mx2(gl.mesh.position.x),mz2(gl.mesh.position.z),2,0,7);g5.fill();
          }
          // other human players (cyan)
          g5.fillStyle='#45d8ff';
          for(const rec of others.values()){
            g5.beginPath();g5.arc(mx2(rec.root.position.x),mz2(rec.root.position.z),2.4,0,7);g5.fill();
          }
          // you: white arrow showing facing
          const px3=mx2(player.position.x),pz3=mz2(player.position.z);
          const fy2=(pp.flying?pp.flying.mesh.rotation.y:player.rotation.y);
          g5.save();g5.translate(px3,pz3);g5.rotate(Math.atan2(Math.sin(fy2),Math.cos(fy2)));
          g5.fillStyle='#ffffff';
          g5.beginPath();g5.moveTo(0,-4.6);g5.lineTo(3.2,3.6);g5.lineTo(-3.2,3.6);g5.closePath();g5.fill();
          g5.restore();
        }
      }catch(e){console.error('[map]',e)}}
      window.__drawMap=drawMiniMap;
      worldEvents(dt);
      sndFrame(dt);
      cam.position.lerp(target,Math.min(1,dt*9)); // fast follow, framerate-independent
      cam.lookAt(player.position.x,player.position.y+(pp.flying?1:1.3*z),player.position.z); // always track HIS height
      // 🩺 NaN watchdog: a single non-finite number blanks the whole render — catch & heal it
      {
        const bads=[];
        if(!isFinite(player.position.x+player.position.y+player.position.z))bads.push('player');
        if(!isFinite(pp.camPitch))bads.push('pitch');
        if(!isFinite(pp.camYaw))bads.push('yaw');
        if(!isFinite(pp.zoomBoost||0))bads.push('zoom');
        if(!isFinite(pp.jumpY)||!isFinite(pp.vy))bads.push('vert');
        if(!isFinite(cam.position.x+cam.position.y+cam.position.z))bads.push('cam');
        if(bads.length){
          if(bads.includes('player')){player.position.set(IC.x-14,groundAt(IC.x-14,IC.z+2),IC.z+2)}
          pp.camPitch=0.58;pp.camYaw=0;pp.zoomBoost=0;
          pp.jumpY=isFinite(pp.jumpY)?pp.jumpY:groundAt(player.position.x,player.position.z);
          pp.vy=0;
          cam.position.set(player.position.x,player.position.y+4,player.position.z+8);
          if(!pp.nanPop){pp.nanPop=true;
            const popEl=document.createElement('div');popEl.className='chomppop';
            popEl.style.color='#ff8c1a';
            popEl.textContent='📷 camera glitch ('+bads.join(',')+') auto-fixed — tell HQ!';
            wrap.appendChild(popEl);setTimeout(()=>popEl.remove(),2200);
            console.error('[nan]',bads);}
        }
      }
      if(fx&&fx.on){try{fx.comp.render()}catch(e){fx.on=false;renderer.render(scene,cam)}}
      else renderer.render(scene,cam);
      // 📉 auto-fallback: if a tablet can't hold ~24fps with bloom, drop the post stack
      if(fx&&fx.on){
        fx.slow=dt>0.045?fx.slow+1:Math.max(0,fx.slow-2);
        if(fx.slow>240){fx.on=false;console.warn('[fx] bloom disabled for performance')}
      }
      }catch(err){
        console.error('[starville frame]',err);
        if(!wrap.querySelector('.svsnag')){
          const d=document.createElement('div');d.className='pphud svsnag';
          d.style.cssText='z-index:9;background:#87d8ff;color:#7a1a1a;font-size:13px';
          d.textContent='🌟 Starville hit a snag ('+SV_BUILD+'): '+(err?.message||err)+' — screenshot this for HQ!';
          wrap.appendChild(d);
        }
        return; // stop the loop cleanly
      }
      __raf=requestAnimationFrame(loop);
    };
    __raf=requestAnimationFrame(loop);
  }catch(err){
    console.error('[starville build]',err);
    const d=document.createElement('div');d.className='pphud';
    d.style.cssText='z-index:9;background:#87d8ff;color:#7a1a1a;font-size:13px';
    d.textContent='🌟 Starville hit a snag ('+SV_BUILD+'): '+(err?.message||err)+' — screenshot this for HQ!';
    wrap.appendChild(d);
  }});
}

  if(window.THREE)return cb();
  const sc=document.createElement('script');
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  sc.onload=cb;
  sc.onerror=()=>{if(failEl)failEl.innerHTML='<div class="pphud">Could not load 3D engine — check the connection and retry! 🏀</div>'};
  document.head.appendChild(sc);
}

      new THREE.MeshBasicMaterial({color:0xffffff,wireframe:true,transparent:true,opacity:0.7}));
    net2.position.set(0,tier.y-0.42,RIMZ);net2.rotation.x=Math.PI;grp.add(net2);
    const lbl=ptsSprite(tier.pts,tier.color);
    lbl.position.set(1.85,tier.y+0.65,RIMZ);grp.add(lbl);
    HOOPS.push({grp,rim:rim2,net:net2,y:tier.y,pts:tier.pts});
  }
  function syncHoops(lvl){
    while(HOOPS.length<Math.min(TIERS.length,lvl)){
      addHoop(TIERS[HOOPS.length]);
      const H=HOOPS[HOOPS.length-1];
      const popEl=document.createElement('div');popEl.className='chomppop';
      popEl.style.color='#45d8ff';popEl.textContent='🏀 NEW BASKET! '+H.pts+' PTS ⬆';
      wrap.appendChild(popEl);setTimeout(()=>popEl.remove(),1400);
    }
  }
  addHoop(TIERS[0]); // level 1: one basket, standing still

  // defender (jumps to block on level 2+)
  const defender=new THREE.Group();
  const dj=new THREE.Mesh(new THREE.BoxGeometry(.9,1.1,.45),mat(0x223a6b));dj.position.y=1.15;
  const dh=new THREE.Mesh(new THREE.SphereGeometry(.3,10,10),mat(0xc98a4b));dh.position.y=2.0;
  const dArmL=new THREE.Mesh(new THREE.BoxGeometry(.2,1.1,.2),mat(0x223a6b));dArmL.position.set(-.62,1.7,0);
  const dArmR=dArmL.clone();dArmR.position.x=.62;
  const dLegs=new THREE.Mesh(new THREE.BoxGeometry(.75,.9,.4),mat(0x111a2e));dLegs.position.y=.45;
  defender.add(dj,dh,dArmL,dArmR,dLegs);
  defender.traverse(m=>m.castShadow=true);
  defender.visible=false;scene.add(defender);

  // wild animals (level 3+): raccoon runs the floor, pigeon buzzes the rim
  function raccoonMesh(){
    const g=new THREE.Group();
    const b0=new THREE.Mesh(new THREE.BoxGeometry(.9,.45,.45),mat(0x777788));b0.position.y=.35;
    const h0=new THREE.Mesh(new THREE.BoxGeometry(.4,.35,.35),mat(0x99a));h0.position.set(.6,.5,0);
    const mask=new THREE.Mesh(new THREE.BoxGeometry(.42,.14,.37),mat(0x222));mask.position.set(.6,.55,0);
    const tail=new THREE.Mesh(new THREE.CylinderGeometry(.09,.13,.8,6),mat(0x555));
    tail.position.set(-.65,.5,0);tail.rotation.z=1.1;
    g.add(b0,h0,mask,tail);g.traverse(m=>m.castShadow=true);return g;
  }
  function pigeonMesh(){
    const g=new THREE.Group();
    const b0=new THREE.Mesh(new THREE.SphereGeometry(.28,8,8),mat(0x8892a8));
    const h0=new THREE.Mesh(new THREE.SphereGeometry(.15,8,8),mat(0x5a6478));h0.position.set(.3,.18,0);
    const wL=new THREE.Mesh(new THREE.BoxGeometry(.5,.05,.3),mat(0x6a7488));wL.position.set(0,.1,.3);
    const wR=wL.clone();wR.position.z=-.3;
    g.add(b0,h0,wL,wR);g.userData.wings=[wL,wR];return g;
  }
  let critters=[];

  // ball
  const ball=new THREE.Group();
  const sphere=new THREE.Mesh(new THREE.SphereGeometry(0.32,18,18),
    new THREE.MeshLambertMaterial({color:0xe86a1a,emissive:0x000000}));
  sphere.castShadow=true;
  for(const rz of [0,Math.PI/2]){
    const seam=new THREE.Mesh(new THREE.TorusGeometry(0.32,0.012,6,24),mat(0x1a1a1a));
    seam.rotation.y=rz;ball.add(seam);
  }
  ball.add(sphere);
  const fireLight=new THREE.PointLight(0xff5510,0,6);
  ball.add(fireLight);
  scene.add(ball);
  // ghost spot ring
  const spotRing=new THREE.Mesh(new THREE.RingGeometry(0.5,0.68,24),paint(0xffe14d));
  spotRing.rotation.x=-Math.PI/2;spotRing.position.y=0.02;scene.add(spotRing);

  hp={score:0,time:60,over:false,streak:0,fire:false,flying:false,scored:false,
    touched:false,pos:new THREE.Vector3(),vel:new THREE.Vector3(),drag:null,spot:new THREE.Vector3(),three:false,
    level:1,nextJump:2};

  gIval(()=>{ if(hp.over)return;
    hp.time--;const el=$('#hptime');if(el)el.textContent=hp.time;
    if(hp.time<=0){hp.over=true;sndWin();
      submitScore('hoops',hp.score).then(x=>setTimeout(()=>alert('Buzzer! 🏀 '+hp.score+' points'+x),300))}
  },1000);

  function newSpot(){
    const ang=(Math.random()*1.6-0.8);            // fan around the key
    const dist=3.5+Math.random()*5.5;             // 3.5..9m from hoop
    hp.three=dist>6.7;
    hp.spot.set(Math.sin(ang)*dist, 0, RIMZ+Math.cos(ang)*dist);
    hp.pos.set(hp.spot.x,1.5,hp.spot.z);
    hp.vel.set(0,0,0);hp.flying=false;hp.scored=false;hp.touched=false;
    spotRing.position.x=hp.spot.x;spotRing.position.z=hp.spot.z;
    spotRing.material.color.set(hp.three?0xff8c1a:0xffe14d);
    const l=$('#hpspotlbl');
    if(l){l.textContent=hp.three?'3PT':'2PT';l.classList.toggle('deep',hp.three)}
    // defender guards the lane on level 2+
    defender.visible=hp.level>=2;
    if(defender.visible){
      const toward=new THREE.Vector3(HOOPS[0].grp.position.x,0,RIMZ).sub(hp.spot).multiplyScalar(0.4);
      defender.position.set(hp.spot.x+toward.x,0,hp.spot.z+toward.z);
      defender.lookAt(hp.spot.x,1.5,hp.spot.z);
      hp.nextJump=1+Math.random()*2;
    }
  }
  newSpot();

  // aim preview: dotted trajectory arc
  const dots=[];
  for(let i=0;i<14;i++){
    const d0=new THREE.Mesh(new THREE.SphereGeometry(0.07,6,6),
      new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.85-i*0.05}));
    d0.visible=false;scene.add(d0);dots.push(d0);
  }
  const GRAV=0.0058;
  function calcShot(dx,dy){
    // gentler power curve: full power at a ~230px drag, hard cap 1.0
    const toHoop=new THREE.Vector3(HOOPS[0].grp.position.x,0,RIMZ).sub(hp.pos);toHoop.y=0;
    const d=toHoop.length();toHoop.normalize();
    const power=Math.min(1,Math.hypot(dx,dy)/230);
    const v=new THREE.Vector3();
    v.copy(toHoop).multiplyScalar((0.052+d*0.0095)*(0.35+power*0.65));
    v.y=(0.105+d*0.0042)*(0.5+power*0.5)+Math.max(0,-dy)*0.00035;
    v.x+=dx*0.00028;
    return {v,power};
  }
  function showAim(dx,dy){
    const {v,power}=calcShot(dx,dy);
    const p=hp.pos.clone(), vv=v.clone();
    for(const dot of dots){
      for(let k=0;k<4;k++){vv.y-=GRAV;p.add(vv)}
      dot.position.copy(p);dot.visible=true;
    }
    $('#pwbar').classList.remove('hide');
    const f=$('#pwfill');f.style.height=(power*100)+'%';
    f.style.background=power<0.5?'#4ade80':power<0.8?'#ffe14d':'#ff5540';
  }
  function hideAim(){dots.forEach(d0=>d0.visible=false);$('#pwbar')?.classList.add('hide')}
  const el=renderer.domElement;
  el.style.touchAction='none';
  el.addEventListener('pointerdown',e=>{if(!hp.flying&&!hp.over){hp.drag={x:e.clientX,y:e.clientY};sndPick()}});
  el.addEventListener('pointermove',e=>{
    if(!hp.drag||hp.flying)return;
    const dx=e.clientX-hp.drag.x, dy=e.clientY-hp.drag.y;
    if(Math.hypot(dx,dy)>=12)showAim(dx,dy);else hideAim();
  });
  el.addEventListener('pointerup',e=>{
    if(!hp.drag)return;
    const dx=e.clientX-hp.drag.x, dy=e.clientY-hp.drag.y;
    hp.drag=null;hideAim();
    if(Math.hypot(dx,dy)<12)return;
    hp.vel.copy(calcShot(dx,dy).v);
    hp.flying=true;sndDrop();
  });

  let t=0;
  const loop=()=>{
    if(!document.body.contains(el)){renderer.dispose();return}
    t+=0.06;
    spotRing.scale.setScalar(1+Math.sin(t*2)*0.08);
    // only the TOP basket slides (from level 2 on); the rest hold still
    for(let i2=0;i2<HOOPS.length;i2++){
      const H=HOOPS[i2];
      if(i2===HOOPS.length-1&&HOOPS.length>=2){
        const amp=Math.min(4.5,1.6+(hp.level-2)*0.7), spd=0.5+hp.level*0.1;
        H.grp.position.x=Math.sin(t*spd)*amp;
        if(hp.level>=3)H.rim.material.color.setHSL((t*0.11)%1,1,0.55);
      }else H.grp.position.x*=0.94;
    }
    // defender jumps
    if(defender.visible){
      hp.nextJump-=0.016;
      if(hp.nextJump<=0)hp.nextJump=Math.max(0.7,2.4-hp.level*0.25)+Math.random();
      const jphase=Math.max(0,1-Math.abs(hp.nextJump-0.5)*3);
      defender.position.y=jphase*Math.min(2.2,0.9+hp.level*0.18);
      dArmL.rotation.z=0.4+jphase*2.2;dArmR.rotation.z=-0.4-jphase*2.2;
      if(hp.flying&&!hp.scored){
        const dd=hp.pos.clone().sub(defender.position);
        if(Math.abs(dd.x)<0.7&&Math.abs(dd.z)<0.5&&hp.pos.y>defender.position.y+0.3&&hp.pos.y<defender.position.y+3.4){
          hp.vel.z*=-0.55;hp.vel.x+=(Math.random()-.5)*0.05;hp.vel.y*=0.4;hp.touched=true;
          sndBad();defender.position.y+=0.1;
        }
      }
    }
    // wild animals invade on level 3+
    if(hp.level>=3&&Math.random()<0.004&&critters.length<3){
      const bird=hp.level>=4&&Math.random()<0.5;
      const c=bird?pigeonMesh():raccoonMesh();
      const dir=Math.random()<0.5?1:-1;
      c.position.set(-dir*13, bird?2.6+Math.random()*0.8:0, RIMZ+3+Math.random()*8);
      c.rotation.y=dir>0?0:Math.PI;
      c.userData.vx=dir*(bird?0.11:0.06)*(1+hp.level*0.08);
      scene.add(c);critters.push(c);
    }
    for(const c of [...critters]){
      c.position.x+=c.userData.vx;
      if(c.userData.wings){c.userData.wings.forEach((w,i)=>w.rotation.x=Math.sin(t*10)*(i?1:-1)*0.8)}
      else c.rotation.z=Math.sin(t*8)*0.08;
      if(hp.flying&&!hp.scored&&c.position.distanceTo(hp.pos)<0.75){
        hp.vel.x+=Math.sign(c.userData.vx)*0.06;hp.vel.z*=-0.4;hp.touched=true;
        sfxTone(500,0.1,'square',0.14);c.position.y+=0.15;
      }
      if(Math.abs(c.position.x)>13.5){scene.remove(c);critters=critters.filter(z=>z!==c)}
    }
    if(hp.flying&&!hp.over){
      hp.vel.y-=0.0058;
      hp.pos.add(hp.vel);
      ball.rotation.x-=hp.vel.length()*1.6;
      // every basket checks backboard, rim, and scoring — higher basket, bigger points
      for(const H of HOOPS){
        const hx=H.grp.position.x, hy=H.y;
        if(hp.pos.z<RIMZ-0.55&&hp.pos.z>RIMZ-0.75&&hp.pos.y>hy-0.2&&hp.pos.y<hy+1.6&&Math.abs(hp.pos.x-hx)<1.3){
          hp.vel.z*=-0.5;hp.pos.z=RIMZ-0.55;hp.touched=true;sfxTone(150,0.06,'square',0.12);
        }
        const flat=Math.hypot(hp.pos.x-hx,hp.pos.z-RIMZ);
        if(Math.abs(hp.pos.y-hy)<0.14&&Math.abs(flat-RIMR)<0.14&&!hp.scored){
          const nx=(hp.pos.x-hx)/flat, nz=(hp.pos.z-RIMZ)/flat;
          const dot=hp.vel.x*nx+hp.vel.z*nz;
          hp.vel.x-=1.4*dot*nx;hp.vel.z-=1.4*dot*nz;hp.vel.y*=0.4;
          hp.touched=true;sfxTone(210,0.05,'square',0.14);
        }
        if(!hp.scored&&hp.vel.y<0&&hp.pos.y<hy&&hp.pos.y>hy-0.3&&flat<RIMR-0.12){
          hp.scored=true;
          const pts=H.pts*(hp.fire?2:1)+(hp.touched?0:1);
          hp.score+=pts;hp.streak++;
          const se=$('#hpscore');if(se)se.textContent=hp.score;
          const popEl=document.createElement('div');popEl.className='chomppop';
          popEl.style.color='#ffe14d';popEl.textContent='+'+pts+(hp.touched?'':' SWISH!');
          wrap.appendChild(popEl);setTimeout(()=>popEl.remove(),900);
          const lvl=hp.score>=75?4:hp.score>=40?3:hp.score>=16?2:1;
          if(lvl>hp.level){hp.level=lvl;const le=$('#hplvl');if(le)le.textContent='LVL '+lvl;
            syncHoops(lvl);burst('storm');sndWin()}
          H.net.scale.set(1.25,1.35,1.25);setTimeout(()=>H.net.scale.set(1,1,1),260);
          if(!hp.touched)sfxTone(720,0.24,'triangle',0.22,0,1350);
          sndBlast(1);burst('pop');
          if(hp.streak===3&&!hp.fire){hp.fire=true;$('#hpfire')?.classList.remove('hide');
            sphere.material.emissive.set(0xff3300);fireLight.intensity=1.4;burst('storm');sndWin()}
          break;
        }
      }
      // walls keep the ball in the room
      if(Math.abs(hp.pos.x)>11.1){hp.pos.x=Math.sign(hp.pos.x)*11.1;hp.vel.x*=-0.55;sfxTone(120,0.05,'square',0.1)}
      if(hp.pos.z<-15.1){hp.pos.z=-15.1;hp.vel.z*=-0.55;sfxTone(120,0.05,'square',0.1)}
      if(hp.pos.z>8.1){hp.pos.z=8.1;hp.vel.z*=-0.55}
      // landed
      if(hp.pos.y<0.32){
        if(!hp.scored){hp.streak=0;
          if(hp.fire){hp.fire=false;$('#hpfire')?.classList.add('hide');
            sphere.material.emissive.set(0x000000);fireLight.intensity=0}
          sndBad()}
        newSpot();
      }
    }
    ball.position.copy(hp.pos);
    if(hp.fire)sphere.scale.setScalar(1+Math.sin(t*8)*0.06);
    // camera: over the shoulder behind the ball spot, looking at the rim
    const back=new THREE.Vector3(hp.spot.x*1.18,2.6,hp.spot.z+((hp.spot.z-RIMZ)*0.32+2.4));
    cam.position.lerp(back,0.07);
    cam.lookAt(HOOPS[0].grp.position.x*0.6,2.65+(HOOPS.length-1)*0.55,RIMZ); // camera lifts as baskets stack
    renderer.render(scene,cam);
    __raf=requestAnimationFrame(loop);
  };
  __raf=requestAnimationFrame(loop);
}

// ---- CLUB CHAT ----
let chatPoll=null,chatLastId=0;
function stopChat(){if(chatPoll){clearInterval(chatPoll);chatPoll=null}}
let MENTIONABLES=[];
function renderMentions(text){
  let html=esc(text);
  // longest names first so "DJ Nova" wins over "DJ"
  const names=[...MENTIONABLES].sort((a,b)=>b.name.length-a.name.length);
  for(const m of names){
    const pat=new RegExp('@'+m.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    const self=m.name===ME.display_name;
    html=html.replace(pat,`<span class="mention ${self?'me':''}">@${esc(m.name)}</span>`);
  }
  return html;
}
function chatMsgHtml(m){
  const isCast=!!m.cast_name;
  const judge=m.cast_tier==='judge';
  const mine=!isCast&&m.user_name===ME.display_name;
  const who=isCast?`${esc(m.cast_name)}${judge?' · '+esc(m.specialty||''):''}`:esc(m.user_name);
  return `<div class="cmsg ${judge?'judge':''} ${mine?'mine':''}" data-id="${m.id}">
    ${avHtml(m)}
    <div class="bub">
      <div class="cwho"><span class="mname" onclick="tagUser('${esc(isCast?m.cast_name:m.user_name).replace(/'/g,"\\'")}')">${who}</span>${isCast?'':shim(m)}${pillHtml(m)}
        ${ME.role==='admin'?`<button class="del" onclick="delChat(${m.id})">✕</button>`:''}</div>
      ${m.body?`<div class="ctext">${renderMentions(m.body)}</div>`:''}
      ${m.has_image?`<img src="/api/chat/${m.id}/image" loading="lazy">`:''}
    </div></div>`;
}
function tagUser(name){$('#chatIn').value=($('#chatIn').value+' @'+name+' ').replace(/^ /,'');$('#chatIn').focus()}
async function chat(){
  stopChat();chatLastId=0;
  MENTIONABLES=await api('/api/chat/mentionables').catch(()=>[]);
  const msgs=await api('/api/chat').catch(()=>[]);
  const box=$('#chatBox');
  box.innerHTML=msgs.map(chatMsgHtml).join('')||'<p style="color:#b678a8">Say hi — the club is listening! 👋</p>';
  if(msgs.length){chatLastId=msgs[msgs.length-1].id;setChatSeen(chatLastId)}
  box.scrollTop=box.scrollHeight;
  chatPoll=setInterval(async()=>{
    if(document.hidden)return;
    const fresh=await api('/api/chat?after='+chatLastId).catch(()=>[]);
    if(!fresh.length)return;
    chatLastId=fresh[fresh.length-1].id;setChatSeen(chatLastId);
    const nearBottom=box.scrollHeight-box.scrollTop-box.clientHeight<120;
    box.insertAdjacentHTML('beforeend',fresh.map(chatMsgHtml).join(''));
    if(nearBottom)box.scrollTop=box.scrollHeight;
  },5000);
}
function mentionHint(inp){
  const drop=$('#mentionDrop');
  const m=inp.value.match(/@([\w ]{0,20})$/);
  if(!m){drop.classList.add('hide');return}
  const q=m[1].toLowerCase();
  const hits=MENTIONABLES.filter(x=>x.name.toLowerCase().startsWith(q)&&x.name!==ME.display_name).slice(0,6);
  if(!hits.length){drop.classList.add('hide');return}
  drop.innerHTML=hits.map(h=>`<button onclick="pickMention('${esc(h.name).replace(/'/g,"\\'")}')">
    ${esc(h.emoji||'⭐')} ${esc(h.name)} ${h.kind==='cast'?mentionCastTag():''}</button>`).join('');
  drop.classList.remove('hide');
}
function pickMention(name){
  const inp=$('#chatIn');
  inp.value=inp.value.replace(/@[\w ]{0,20}$/,'@'+name+' ');
  $('#mentionDrop').classList.add('hide');inp.focus();
}
async function sendChat(){
  const t=$('#chatIn').value.trim();if(!t)return;
  $('#chatIn').value='';$('#mentionDrop').classList.add('hide');
  try{await api('/api/chat',{method:'POST',body:{body:t}});
    const fresh=await api('/api/chat?after='+chatLastId);
    if(fresh.length){chatLastId=fresh[fresh.length-1].id;
      $('#chatBox').insertAdjacentHTML('beforeend',fresh.map(chatMsgHtml).join(''));
      $('#chatBox').scrollTop=$('#chatBox').scrollHeight}
  }catch(e){$('#chatErr').textContent=e.message}
}
async function sendChatImage(){
  const f=$('#chatImg').files[0];if(!f)return;
  $('#chatErr').textContent='Sending photo… 📷';
  try{
    const p=await api('/api/chat/presign-image',{method:'POST'});
    const r=await fetch(p.put_url,{method:'PUT',headers:{'content-type':f.type||'image/jpeg'},body:f});
    if(!r.ok)throw new Error('Photo upload failed.');
    await api('/api/chat',{method:'POST',body:{body:$('#chatIn').value.trim(),image_key:p.image_key}});
    $('#chatIn').value='';$('#chatImg').value='';$('#chatErr').textContent='';
    chat();
  }catch(e){$('#chatErr').textContent=e.message}
}
async function delChat(id){
  if(!confirm('Remove this message for everyone?'))return;
  await api(`/api/admin/chat/${id}/remove`,{method:'POST',body:{}});
  document.querySelector(`.cmsg[data-id="${id}"]`)?.remove();
}

// ---- Chat notifications: badge + bing! ----
let audioCtx=null,chatSeenId=parseInt(localStorage.getItem('ksc_chat_seen')||'0'),chatUnread=0;
addEventListener('pointerdown',()=>{if(!audioCtx)try{audioCtx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}},{once:true});
function bing(){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime;
    [[880,0],[1318.5,.12]].forEach(([f,dt])=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.001,t+dt);
      g.gain.exponentialRampToValueAtTime(0.25,t+dt+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.5);
      o.connect(g);g.connect(audioCtx.destination);
      o.start(t+dt);o.stop(t+dt+0.55);
    });
  }catch(e){}
}
function setChatSeen(id){chatSeenId=Math.max(chatSeenId,id);localStorage.setItem('ksc_chat_seen',chatSeenId);
  chatUnread=0;$('#chatBadge').classList.add('hide')}
// ---- club record banner ----
let evSeen=parseInt(localStorage.getItem('ksc_ev_seen')||'0'),cbQueue=[],cbBusy=false;
function crownText(p){
  const line2=p.old_name
    ?`<b>${esc(p.new_name)}</b> SLAMMED <s>${esc(p.old_name)}'s</s> crown — <b>${p.new_score}</b> beats ${p.old_score}!`
    :p.defended
      ?`<b>${esc(p.new_name)}</b> raised their own record to <b>${p.new_score}</b>!`
      :`<b>${esc(p.new_name)}</b> set the first record — <b>${p.new_score}</b>! Who's coming for it?`;
  return `<div class="cb1">🏆 NEW ${esc(p.title)} CLUB RECORD! 🏆</div><div class="cb2">${line2}</div>`;
}
function queueCrown(ev){
  if(ev.id<=evSeen)return;
  evSeen=Math.max(evSeen,ev.id);localStorage.setItem('ksc_ev_seen',evSeen);
  cbQueue.push(ev.payload);cbNext();
}
function cbNext(){
  if(cbBusy||!cbQueue.length)return;
  cbBusy=true;
  const p=cbQueue.shift();
  const el=$('#crownBanner');
  el.innerHTML=crownText(p);
  el.classList.remove('hide','boom');
  void el.offsetWidth;
  el.classList.add('slam');
  document.body.animate([{translate:'0 0'},{translate:'-5px 2px'},{translate:'5px -2px'},{translate:'0 0'}],{duration:350});
  sndBlast(2);
  setTimeout(()=>burst('pop'),250);
  setTimeout(()=>{
    el.classList.remove('slam');el.classList.add('boom');
    burst('storm');sndBlast(3);
    const r=el.getBoundingClientRect();
    for(let i=0;i<10;i++){
      const z=document.createElement('div');z.className='zap';z.textContent=['⭐','👑','⚡'][i%3];
      z.style.position='fixed';z.style.zIndex=96;
      z.style.left=(r.left+Math.random()*r.width)+'px';
      z.style.top=(r.top+Math.random()*r.height)+'px';
      document.body.appendChild(z);setTimeout(()=>z.remove(),900);
    }
    setTimeout(()=>{el.classList.add('hide');el.classList.remove('boom');cbBusy=false;cbNext()},520);
  },4200);
}
setInterval(async()=>{
  if(!ME||document.hidden)return;
  const inChat=!$('#v-chat').classList.contains('hide');
  const [r,evs]=await Promise.all([
    api('/api/chat/latest').catch(()=>null),
    api('/api/events?after='+evSeen).catch(()=>[])
  ]);
  (evs||[]).forEach(ev=>{if(ev.kind==='crown')queueCrown(ev)});
  if(!r)return;
  if(inChat){setChatSeen(r.id);return}
  if(r.id>chatSeenId){
    const fresh=r.id-chatSeenId;
    if(fresh>chatUnread)bing();
    chatUnread=fresh;
    const b=$('#chatBadge');b.querySelector('b').textContent=fresh>9?'9+':fresh;b.classList.remove('hide');
  }
},20000);

// scroll pop-in: stickers spring into view
const popObs=new IntersectionObserver(es=>es.forEach(e=>{
  if(e.isIntersecting){e.target.classList.add('in');popObs.unobserve(e.target)}
}),{threshold:.08});
function popScan(){
  document.querySelectorAll('.sticker:not(.in):not([data-obs])').forEach(el=>{
    el.dataset.obs=1;popObs.observe(el);
  });
}
popScan(); // static stickers (login/join, upload, studio, chat) present before any mutation
new MutationObserver(popScan).observe(document.querySelector('main'),{childList:true,subtree:true});

boot();
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
